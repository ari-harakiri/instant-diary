<!doctype html>
<html>
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
<title>My Notepad</title>
<link rel="manifest" href="notebook-manifest.json" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="My Notepad" />
<link rel="apple-touch-icon" href="notepad1.png" />
<meta name="theme-color" content="#0054e3" />
<style>
  @font-face {
    font-family: 'DiaryMinecraft';
    src: url(assets/fonts/diary-minecraft.ttf) format('truetype');
    font-display: swap;
  }
  @font-face {
    font-family: 'DiaryComicSans';
    src: url(assets/fonts/diary-comic-sans.ttf) format('truetype');
    font-display: swap;
  }
  @font-face {
    font-family: 'DiaryEmoji';
    src: url(assets/fonts/diary-emoji.ttf) format('truetype');
    font-display: swap;
  }
  @font-face {
    font-family: 'DiaryOldEnglish';
    src: url(assets/fonts/diary-old-english.otf) format('opentype');
    font-display: swap;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {

    background: url('app-background.jpg') center / cover no-repeat;
    font-family: Tahoma, Arial, sans-serif;
  }
  #stage {
    position: fixed; inset: 0;
    display: flex; flex-direction: column;
    padding: env(safe-area-inset-top, 0px) 0 env(safe-area-inset-bottom, 0px);
  }
  #app-header {
    flex: 0 0 auto;
    display: flex; align-items: center; justify-content: space-between;
    padding: 10px 16px;

  }
  #app-title { font-size: 15px; font-weight: 700; letter-spacing: .3px; }
  #sync-panel {
    display: none;
    position: fixed;
    left: 50%;
    top: 50%;
    transform: translate(-50%, -50%);
    width: calc(100% - 40px);
    max-width: 402px;
    box-sizing: border-box;
    z-index: 200;
    padding: 14px 16px;
    background: rgba(255,255,255,.97);
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
    border-radius: 14px;
    box-shadow: 0 8px 30px rgba(0,0,0,.4);
    font-size: 12px;
    color: #1a3350;
  }
  #sync-panel.open { display: block; }
  #sync-panel-backdrop {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,.35);
    z-index: 190;
  }
  #sync-panel-backdrop.open { display: block; }
  #sync-panel-status { margin-bottom: 8px; font-weight: 600; }
  #sync-panel-actions { display: flex; gap: 8px; }
  .sync-action-btn {
    flex: 1;
    border: 1px solid #99a;
    background: #fff;
    border-radius: 8px;
    padding: 8px 6px;
    font-size: 12px;
    cursor: pointer;
  }
  .sync-action-btn:active { background: #eef2fb; }
  .sync-action-btn:disabled { opacity: .5; cursor: default; }
  #notebook-stage {
    flex: 1;
    display: flex; align-items: center; justify-content: center;
    padding: 8px 16px;
    min-height: 0;
  }
  #app-footer {
    position: relative;
    flex: 0 0 auto;
    width: 100%;
    max-width: none;
    margin: 0 auto;
    padding: 5px 8px calc(5px + env(safe-area-inset-bottom, 0px));
    background: rgba(20,30,50,.35);
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
    border-radius: 10px 10px 0 0;
    box-sizing: border-box;
    display: flex;
    flex-direction: column;
    gap: 3px;
  }
  .dock-section-label {
    font-size: 9px;
    font-weight: 700;
    letter-spacing: .5px;
    text-transform: uppercase;
    color: rgba(255,255,255,.55);
    margin: 0;
    text-shadow: 0 1px 2px rgba(0,0,0,.4);
  }
  .dock-section { display: flex; flex-direction: column; gap: 3px; }
  .dock-select {
    -webkit-appearance: none;
    appearance: none;
    flex: 0 0 auto;

    background: rgba(255,255,255,.25) url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="10" height="6"><polygon points="0,0 10,0 5,6" fill="white"/></svg>') no-repeat right 10px center;
    color: #fff;
    border-radius: 8px;
    padding: 6px 26px 6px 10px;
    font-size: 12px;
    cursor: pointer;

  #size-select { width: 82px; }
  .dock-select option { color: #1a3350; }
  .dock-section + .dock-section {

  }
  .dock-row {

  #format-toolbar {

    background: rgba(255,255,255,.25);

  #format-toolbar > * {

    border-radius: 0;
    background: transparent;
    color: #fff;
  }
  #format-toolbar > :first-child { border-left: 0; }
  #format-toolbar .fmt-btn {

  #format-toolbar .fmt-btn.active { background: rgba(255,255,255,.25); border-color: rgba(255,255,255,.55); }
  .format-controls-row .dock-select {
    flex: 0 0 auto;

    height: 24px;
    margin: 0 4px;
    padding: 4px 22px 4px 8px;
    font-size: 11px;
    border: 1px solid rgba(255,255,255,.78);
    border-radius: 7px;
    background: rgba(255,255,255,.18) url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="10" height="6"><polygon points="0,0 10,0 5,6" fill="white"/></svg>') no-repeat right 8px center;
  }
  .format-controls-row #size-select { width: 78px; }
  #format-toolbar #highlight-color-picker {
    width: 28px;
    padding: 3px;
  }
  .dock-divider {
    flex: 0 0 auto;
    width: 1px; height: 20px;
    background: rgba(255,255,255,.5);
    margin: 0 2px;
  }
  .font-pill {
    flex: 0 0 auto;
    border: 1px solid rgba(255,255,255,.7);
    background: rgba(255,255,255,.25);
    color: #1a3350;
    border-radius: 14px;
    padding: 7px 14px;
    font-size: 13px;
    cursor: pointer;
    white-space: nowrap;
  }
  .font-pill.active {
    background: #fff;
    border-color: #fff;
    font-weight: 700;
  }
  .bg-pill, .size-pill {
    flex: 0 0 auto;
    border: 1px solid rgba(255,255,255,.7);
    background: rgba(255,255,255,.25);
    color: #1a3350;
    border-radius: 8px;
    padding: 5px 10px;
    font-size: 11px;
    cursor: pointer;
    white-space: nowrap;
  }
  .bg-pill.active, .size-pill.active {
    background: #fff; border-color: #fff; font-weight: 700;
  }
  #color-picker {
    flex: 0 0 auto;
    -webkit-appearance: none;
    appearance: none;
    width: 34px; height: 34px;
    border: 2px solid #fff;
    border-radius: 50%;
    padding: 0;
    background: conic-gradient(red, yellow, lime, cyan, blue, magenta, red);

  }

    inset: 10% 3% 3% 3%;
    mix-blend-mode: hue;
    pointer-events: none;
    z-index: 1;
    border-radius: 6px;
  }
  #sticker-layer {
    position: absolute;
    inset: 0;
    z-index: 6;
    overflow: visible;
    pointer-events: none;
  }
  .placed-sticker {
    position: absolute;
    width: 15%;
    touch-action: none;
    pointer-events: auto;
    cursor: grab;
    filter: drop-shadow(0 2px 3px rgba(0,0,0,.3));
  }
  .placed-sticker.dragging { cursor: grabbing; z-index: 999; }

    position: absolute;
    top: -8px; right: -8px;
    width: 18px; height: 18px;
    border-radius: 50%;
    background: #c62828;
    color: #fff;
    font-size: 11px;
    line-height: 18px;
    text-align: center;
    display: none;
    border: 1px solid #fff;
  }
  .placed-sticker.selected .sticker-remove { display: block; }
  #sticker-picker {
    display: none;
    position: absolute;
    inset: 0;
    z-index: 5;
    padding: 32px 8px 8px;
    background: rgba(20,30,50,.92);
    border-radius: 10px 10px 0 0;
  }
  #sticker-picker.open { display: block; }
  #close-stickers-btn {
    position: absolute;
    top: 6px;
    right: 8px;
    width: 24px;
    height: 22px;
    border: 1px solid rgba(255,255,255,.7);
    border-radius: 5px;
    background: rgba(255,255,255,.16);
    color: #fff;
    cursor: pointer;
  }
  #sticker-grid {
    display: grid;
    grid-auto-flow: column;
    grid-template-rows: 52px;
    grid-auto-columns: 52px;
    overflow-x: auto;
    overflow-y: hidden;
    overscroll-behavior-inline: contain;
    -webkit-overflow-scrolling: touch;
    gap: 7px;
    padding: 3px 1px;
  }
  #sticker-grid::-webkit-scrollbar { display: none; }
  .sticker-grid-item {
    background: rgba(255,255,255,.9);
    border-radius: 7px;
    padding: 5px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
  }
  .sticker-grid-item img { width: 100%; height: 100%; object-fit: contain; }
  #desktop-sticker-layer {
    position: fixed;
    inset: 0;
    z-index: 30;
    overflow: hidden;
    pointer-events: none;
  }
  .loose-sticker {
    position: fixed;
    width: 64px;
    touch-action: none;
    pointer-events: auto;
    cursor: grab;
    filter: drop-shadow(0 2px 3px rgba(0,0,0,.3));
  }
  .loose-sticker.dragging { cursor: grabbing; z-index: 31; }
  #trash-btn.sticker-drop-target {
    border-radius: 5px;
    background: rgba(198,40,40,.2);
    outline: 1px dashed #c62828;
  }
  #hue-row { gap: 10px; }
  #hue-slider {
    flex: 1;
    -webkit-appearance: none;
    appearance: none;
    height: 22px;
    border-radius: 11px;
    background: linear-gradient(to right,

      hsl(180,70%,55%), hsl(240,70%,55%), hsl(300,70%,55%), hsl(360,70%,55%));
  }
  #hue-slider::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 24px; height: 24px;
    border-radius: 50%;
    background: #fff;
    border: 2px solid rgba(0,0,0,.3);
    box-shadow: 0 1px 3px rgba(0,0,0,.4);
  }
  #save-btn {
    position: absolute;
    top: 35px; right: 16px;
    z-index: 5;
    width: 34px; height: 30px;
    border: none;
    background: transparent;
    cursor: pointer;
  }
  #edit-area {
    position: absolute;
    z-index: 5;
    inset: 12% 6% 13.7% 10%;
    display: flex;
    flex-direction: column;
    gap: 8px;
    border-radius: 4px;
  }
  #title-input {
    border: none !important;
    box-shadow: none !important;
    background: transparent !important;
    outline: none;
    font-size: 17px;
    font-weight: 700;
    font-family: Tahoma, Arial, sans-serif;
    padding: 2px 4px;
    color: #262626;
    transform: translate(15px, 25px);
  }
  #title-input::placeholder { color: #7a7a7a; }
  .menu-title-field {
    display: flex;
    flex-direction: column;
    gap: 4px;
    margin: 0 0 10px;
    color: #1a3350;
    font-size: 11px;
    font-weight: 700;
  }
  #menu-title-input {
    width: 100%;
    border: 1px solid #99a;
    border-radius: 7px;
    padding: 7px 8px;
    color: #1a3350;
    font: inherit;
  }
  #body-input {
    border: none !important;
    box-shadow: none !important;
    background: transparent !important;
    outline: none;
    flex: 1;
    overflow-y: auto;
    white-space: pre-wrap;
    word-wrap: break-word;
    font-size: 16px;
    font-family: "DiaryComicSans", "Comic Sans MS", "Comic Sans", cursive;
    color: #262626;
    padding: 2px 4px;
    line-height: 1.4;
    transform: translate(15px, 16px);
  }
  #body-input[data-placeholder]:empty:before {
    content: attr(data-placeholder);
    color: #8a8a8a;
    pointer-events: none;
  }

  .fmt-btn {
    width: 22px; height: 20px;
    border: 1px solid #99a;
    background: #fff;
    border-radius: 4px;
    font-size: 11px;
    line-height: 1;
    cursor: pointer;
    padding: 0;
  }
  .fmt-btn.active { background: #cfe0ff; border-color: #0054e3; }
  #highlight-color-picker {

    border: 1px solid #99a;
    border-radius: 4px;

  }

  }

</style>
</head>
<body>
<div id="stage">
  <div id="app-header">
    <span id="app-title">My Notepad</span>
  </div>
  <div id="sync-panel-backdrop"></div>
  <div id="sync-panel">
    <div id="sync-panel-status">Not signed in — local only</div>
    <label class="menu-title-field">Page title
      <input id="menu-title-input" type="text" placeholder="Title" maxlength="120" autocomplete="off" />
    </label>
    <div id="sync-panel-actions">
      <button id="export-image-btn" class="sync-action-btn">💾 Save as Image</button>
    </div>
    <div id="sync-panel-actions">
      <button id="signin-btn" class="sync-action-btn">🔑 Sign in to Cloud</button>
    </div>
    <div id="sync-panel-actions">
      <button id="push-btn" class="sync-action-btn">⬆ Push to Cloud</button>
      <button id="pull-btn" class="sync-action-btn">⬇ Pull from Cloud</button>
    </div>
  </div>
  <div id="notebook-stage">
    <div id="notebook">
      <div id="paper-hue-overlay"></div>
      <div id="sticker-layer"></div>
      <button id="save-btn" title="Save & settings"></button>
      <div id="edit-area">
        <input id="title-input" type="text" placeholder="Title" maxlength="120" autocomplete="off" />
        <div id="body-input" contenteditable="true" data-placeholder=""></div>
      </div>
      <div id="footer">
        <span id="page-label"></span>
        <div id="nav">
          <button id="prev-btn" title="Previous page">‹</button>
          <button id="next-btn" title="Next page">›</button>
        </div>
        <button id="trash-btn" title="Delete this page">🗑</button>
      </div>
      <div id="sync-dot" title="Sync status"></div>
    </div>
  </div>
  <div id="desktop-sticker-layer" aria-hidden="true"></div>
  <div id="app-footer">
    <div class="dock-section">
      <div class="dock-section-label">Format</div>
      <div class="format-controls-row dock-row">
      <div id="format-toolbar">
        <button class="fmt-btn" data-cmd="bold" title="Bold"><b>B</b></button>
        <button class="fmt-btn" data-cmd="italic" title="Italic"><i>I</i></button>
        <button class="fmt-btn" data-cmd="underline" title="Underline"><u>U</u></button>
        <button class="fmt-btn" data-cmd="strikeThrough" title="Strikethrough"><s>S</s></button>
        <button class="fmt-btn" id="fmt-highlight-btn" title="Highlight selected text">🖍</button>
        <input type="color" id="highlight-color-picker" value="#fff59d" title="Highlight color" />
        <button class="fmt-btn" id="fmt-date-btn" title="Insert date">📅</button>
      </div>
      <select id="font-select" class="dock-select">
        <option value="inherit" selected>Default font</option>
        <option value="Arial">Arial</option>
        <option value="Times New Roman">Times</option>
        <option value="Georgia">Georgia</option>
        <option value="Courier New">Courier</option>
        <option value="DiaryOldEnglish">Old English</option>
        <option value="DiaryMinecraft">Minecraft</option>
        <option value="DiaryEmoji">Artsy Cypher</option>
      </select>
      <select id="size-select" class="dock-select">
        <option value="13">Small</option>
        <option value="16" selected>Medium</option>
        <option value="20">Large</option>
        <option value="25">X-Large</option>
      </select>
      </div>
    </div>
    <div class="dock-section">
      <div id="color-dock" class="dock-row">
        <input type="color" id="color-picker" value="#262626" title="Pick a text color" />
        <div id="recent-colors"></div>
      </div>
    </div>
    <div class="dock-section">
      <div id="hue-row" class="dock-row">
        <span style="color:#fff;font-size:11px;">Hue</span>
        <input type="range" id="hue-slider" min="0" max="360" value="0" />
      </div>
    </div>
    <div class="dock-section">
      <div id="sticker-border-row" class="dock-row">
        <button id="open-stickers-btn" class="bg-pill">🏷 Stickers</button>
      </div>
    </div>
    <div id="sticker-picker" aria-label="Sticker picker">
      <button id="close-stickers-btn" type="button" title="Close stickers">✕</button>
      <div id="sticker-grid"></div>
    </div>
  </div>
</div>

  var sizeSelect = document.getElementById('size-select');
  var bgRow = document.getElementById('hue-row');
  var colorPicker = document.getElementById('color-picker');
  var hueSlider = document.getElementById('hue-slider');
  var paperHueOverlay = document.getElementById('paper-hue-overlay');
  var hueSaveTimer = null;
  var recentColorsEl = document.getElementById('recent-colors');

  function getCurrentPage(){
    if(!state.pages.length) state.pages = freshPages();
    if(state.currentPageIndex >= state.pages.length) state.currentPageIndex = state.pages.length - 1;
    if(state.currentPageIndex < 0) state.currentPageIndex = 0;
    return state.pages[state.currentPageIndex];
  }

  function applyPreferences(){
    var fontValue = state.font || 'DiaryComicSans';
    bodyInput.style.fontFamily = fontValue === 'inherit'
      ? ''
      : '"' + fontValue + '", "Comic Sans MS", "Comic Sans", cursive';
    fontSelect.value = fontValue === 'DiaryComicSans' ? 'inherit' : fontValue;

    var paperValue = state.paper || 'notepad1.png';
    notebookEl.style.backgroundImage = "url('" + paperValue + "')";
    Array.prototype.forEach.call(bgRow.querySelectorAll('.bg-pill'), function(btn){
      btn.classList.toggle('active', btn.getAttribute('data-bg') === paperValue);
    });

    var sizeValue = state.fontSize || 16;
    bodyInput.style.fontSize = sizeValue + 'px';
    sizeSelect.value = String(sizeValue);

    var colorValue = state.fontColor || '#262626';
    bodyInput.style.color = colorValue;
    colorPicker.value = colorValue;
    renderRecentColors();

    var hueValue = Number.isFinite(state.paperHue) ? state.paperHue : 0;
    hueSlider.value = hueValue;
    paperHueOverlay.style.background = hueValue === 0 ? 'transparent' : 'hsl(' + hueValue + ', 65%, 55%)';
  }

  function renderRecentColors(){
    recentColorsEl.innerHTML = '';
    (state.recentColors || []).forEach(function(c){
      var swatch = document.createElement('button');
      swatch.className = 'recent-swatch';
      swatch.style.background = c;
      swatch.title = c;
      swatch.addEventListener('mousedown', function(e){
        cacheTextSelection();
        e.preventDefault();
      });
      swatch.addEventListener('click', function(){
        restoreTextSelection();
        document.execCommand('foreColor', false, c);
        queueSave();
      });
      recentColorsEl.appendChild(swatch);
    });
  }

  function setColor(c){
    state.fontColor = c;
    if(!state.recentColors) state.recentColors = [];
    state.recentColors = [c].concat(state.recentColors.filter(function(x){ return x !== c; })).slice(0, 6);
    applyPreferences();
    persistLocal();
    pushToCloudIfSignedIn();
  }

  function renderCurrentPage(){
    var page = getCurrentPage();
    titleInput.value = page.title || '';
    if(menuTitleInput) menuTitleInput.value = page.title || '';
    bodyInput.innerHTML = page.text || '';
    cachedSelectionRange = null;
    pageLabel.textContent = 'pg ' + (state.currentPageIndex + 1);
    if(prevBtn) prevBtn.disabled = state.currentPageIndex === 0;
    if(nextBtn) nextBtn.disabled = false;
    renderStickers();
  }

  function renderStickers(){
    var page = getCurrentPage();
    if(!Array.isArray(page.stickers)) page.stickers = [];
    stickerLayer.innerHTML = '';
    page.stickers.forEach(function(st){
      var wrap = document.createElement('div');
      wrap.className = 'placed-sticker';
      wrap.style.left = st.x + '%';
      wrap.style.top = st.y + '%';
      wrap.style.width = (st.size || 15) + '%';

      var img = document.createElement('img');
      img.src = st.src;
      img.style.width = '100%';
      img.style.display = 'block';
      img.draggable = false;
      wrap.appendChild(img);

      var removeBtn = document.createElement('button');
      removeBtn.className = 'sticker-remove';
      removeBtn.textContent = '✕';
      removeBtn.addEventListener('click', function(e){
        e.stopPropagation();
        page.stickers = page.stickers.filter(function(s){ return s.id !== st.id; });
        renderStickers();
        persistLocal();
        pushToCloudIfSignedIn();
      });
      wrap.appendChild(removeBtn);

      wireStickerDrag(wrap, st);
      stickerLayer.appendChild(wrap);
    });
  }

  function wireStickerDrag(wrap, st){
    var dragging = false, startX = 0, startY = 0, startLeft = 0, startTop = 0;

    wrap.addEventListener('pointerdown', function(e){
      e.preventDefault();
      Array.prototype.forEach.call(stickerLayer.querySelectorAll('.placed-sticker'), function(el){
        el.classList.remove('selected');
      });
      wrap.classList.add('selected');
      dragging = true;
      wrap.classList.add('dragging');
      startX = e.clientX;
      startY = e.clientY;
      startLeft = st.x;
      startTop = st.y;
      wrap.setPointerCapture(e.pointerId);
    });

    wrap.addEventListener('pointermove', function(e){
      if(!dragging) return;
      var rect = notebookEl.getBoundingClientRect();
      var dxPct = ((e.clientX - startX) / rect.width) * 100;
      var dyPct = ((e.clientY - startY) / rect.height) * 100;
      st.x = Math.max(0, Math.min(90, startLeft + dxPct));
      st.y = Math.max(0, Math.min(90, startTop + dyPct));
      wrap.style.left = st.x + '%';
      wrap.style.top = st.y + '%';
      updateTrashDropTarget(e.clientX, e.clientY);
    });

    function endDrag(e){
      if(!dragging) return;
      dragging = false;
      wrap.classList.remove('dragging');
      trashBtn.classList.remove('sticker-drop-target');
      if(e && isOverTrash(e.clientX, e.clientY)){
        var page = getCurrentPage();
        page.stickers = page.stickers.filter(function(s){ return s.id !== st.id; });
        renderStickers();
        persistLocal();
        pushToCloudIfSignedIn();
        return;
      }
      if(e && !isOverNotebook(e.clientX, e.clientY)){
        var currentPage = getCurrentPage();
        currentPage.stickers = currentPage.stickers.filter(function(s){ return s.id !== st.id; });
        renderStickers();
        addLooseSticker(st.src, e.clientX - (wrap.offsetWidth / 2), e.clientY - (wrap.offsetHeight / 2), wrap.offsetWidth);
        persistLocal();
        pushToCloudIfSignedIn();
        return;
      }
      persistLocal();
      pushToCloudIfSignedIn();
    }
    wrap.addEventListener('pointerup', endDrag);
    wrap.addEventListener('pointercancel', endDrag);
  }

  function isOverNotebook(x, y){
    var rect = notebookEl.getBoundingClientRect();
    return x >= rect.left && x <= rect.right && y >= rect.top && y <= rect.bottom;
  }

  function isOverTrash(x, y){
    var rect = trashBtn.getBoundingClientRect();
    return x >= rect.left - 12 && x <= rect.right + 12 && y >= rect.top - 12 && y <= rect.bottom + 12;
  }

  function updateTrashDropTarget(x, y){
    trashBtn.classList.toggle('sticker-drop-target', isOverTrash(x, y));
  }

  function addLooseSticker(src, left, top, width){
    var wrap = document.createElement('div');
    wrap.className = 'loose-sticker';
    wrap.style.left = (Number.isFinite(left) ? left : ((window.innerWidth - 64) / 2)) + 'px';
    wrap.style.top = (Number.isFinite(top) ? top : ((window.innerHeight - 64) / 2)) + 'px';
    if(width) wrap.style.width = width + 'px';

    var img = document.createElement('img');
    img.src = src;
    img.style.width = '100%';
    img.style.display = 'block';
    img.draggable = false;
    wrap.appendChild(img);
    desktopStickerLayer.appendChild(wrap);

    var dragging = false, startX = 0, startY = 0, startLeft = 0, startTop = 0;
    wrap.addEventListener('pointerdown', function(e){
      e.preventDefault();
      dragging = true;
      wrap.classList.add('dragging');
      startX = e.clientX;
      startY = e.clientY;
      startLeft = parseFloat(wrap.style.left) || 0;
      startTop = parseFloat(wrap.style.top) || 0;
      wrap.setPointerCapture(e.pointerId);
    });
    wrap.addEventListener('pointermove', function(e){
      if(!dragging) return;
      wrap.style.left = (startLeft + e.clientX - startX) + 'px';
      wrap.style.top = (startTop + e.clientY - startY) + 'px';
      updateTrashDropTarget(e.clientX, e.clientY);
    });
    function finishLooseDrag(e){
      if(!dragging) return;
      dragging = false;
      wrap.classList.remove('dragging');
      trashBtn.classList.remove('sticker-drop-target');
      if(e && isOverTrash(e.clientX, e.clientY)){
        wrap.remove();
        return;
      }
      if(e && isOverNotebook(e.clientX, e.clientY)){
        var rect = notebookEl.getBoundingClientRect();
        var page = getCurrentPage();
        if(!Array.isArray(page.stickers)) page.stickers = [];
        page.stickers.push({
          id: 'st-' + Date.now() + '-' + Math.floor(Math.random() * 1000),
          src: src,
          x: Math.max(0, Math.min(90, ((e.clientX - rect.left) / rect.width * 100) - 7)),
          y: Math.max(0, Math.min(90, ((e.clientY - rect.top) / rect.height * 100) - 7)),
          size: Math.max(6, Math.min(35, (wrap.offsetWidth / rect.width) * 100))
        });
        wrap.remove();
        renderStickers();
        persistLocal();
        pushToCloudIfSignedIn();
      }
    }
    wrap.addEventListener('pointerup', finishLooseDrag);
    wrap.addEventListener('pointercancel', finishLooseDrag);
  }

  function addStickerToPage(src){
    addLooseSticker(src);
  }

  function populateStickerGrid(){
    stickerGrid.innerHTML = '';
    STICKER_FILES.forEach(function(src){
      var cell = document.createElement('div');
      cell.className = 'sticker-grid-item';
      var img = document.createElement('img');
      img.src = src;
      img.loading = 'lazy';
      cell.appendChild(img);
      cell.addEventListener('click', function(){
        addStickerToPage(src);
      });
      stickerGrid.appendChild(cell);
    });
  }

  function captureCurrentPage(){
    var page = getCurrentPage();
    page.title = menuTitleInput ? menuTitleInput.value : titleInput.value;
    page.text = bodyInput.innerHTML;
  }

  function persistLocal(){
    try{
      localStorage.setItem(LOCAL_KEY, JSON.stringify(state));
    } catch(e){}
  }

  function loadLocal(){
    try{
      var raw = localStorage.getItem(LOCAL_KEY);
      if(raw){
        var parsed = JSON.parse(raw);
        if(parsed && Array.isArray(parsed.pages) && parsed.pages.length){
          state = parsed;
        }
      }
    } catch(e){}
  }

  function setSyncStatus(mode){
    syncDot.className = mode;
    syncDot.title = mode === 'online' ? 'Synced to cloud' : (mode === 'saving' ? 'Saving…' : 'Local only (not signed in)');
    if(syncPanelStatus){
      if(mode === 'online') syncPanelStatus.textContent = cloudUser ? 'Signed in — synced to cloud' : 'Synced to cloud';
      else if(mode === 'saving') syncPanelStatus.textContent = 'Saving…';
      else syncPanelStatus.textContent = cloudUser ? 'Signed in — sync issue' : 'Not signed in — local only';
    }
    if(signinBtn) signinBtn.style.display = cloudUser ? 'none' : '';
  }

  function pushToCloudIfSignedIn(){
    if(!db || !cloudUser) { persistLocal(); return; }
    setSyncStatus('saving');
    var metaRef = db.collection('users').doc(cloudUser.uid).collection('diary').doc('meta');
    metaRef.set({
      notebook: { pages: state.pages, currentPageIndex: state.currentPageIndex, font: state.font, paper: state.paper, fontSize: state.fontSize, fontColor: state.fontColor, recentColors: state.recentColors, paperHue: state.paperHue },
      updatedAt: Date.now()
    }, { merge: true }).then(function(){
      setSyncStatus('online');
    }).catch(function(){
      setSyncStatus('offline');
    });
    persistLocal();
  }

  function queueSave(){
    captureCurrentPage();
    persistLocal();
    if(saveTimer) clearTimeout(saveTimer);
    saveTimer = setTimeout(pushToCloudIfSignedIn, 1500);
  }

  function pullFromCloud(){
    if(!db || !cloudUser) return;
    var metaRef = db.collection('users').doc(cloudUser.uid).collection('diary').doc('meta');
    metaRef.get().then(function(snap){
      if(!snap.exists) { setSyncStatus('online'); return; }
      var data = snap.data() || {};
      var nb = data.notebook;
      if(nb && Array.isArray(nb.pages) && nb.pages.length){
        state.pages = nb.pages;
        state.currentPageIndex = Number.isFinite(nb.currentPageIndex) ? nb.currentPageIndex : 0;
        if(nb.font) state.font = nb.font;
        if(nb.paper) state.paper = nb.paper;
        if(Number.isFinite(nb.fontSize)) state.fontSize = nb.fontSize;
        if(nb.fontColor) state.fontColor = nb.fontColor;
        if(Array.isArray(nb.recentColors)) state.recentColors = nb.recentColors;
        if(Number.isFinite(nb.paperHue)) state.paperHue = nb.paperHue;
        renderCurrentPage();
        applyPreferences();
      }
      setSyncStatus('online');
    }).catch(function(){
      setSyncStatus('offline');
    });
  }

  // --- Navigation ---
  prevBtn.addEventListener('click', function(){
    captureCurrentPage();
    if(state.currentPageIndex > 0){
      state.currentPageIndex--;
      renderCurrentPage();
      persistLocal();
    }
  });
  nextBtn.addEventListener('click', function(){
    captureCurrentPage();
    if(state.currentPageIndex < state.pages.length - 1){
      state.currentPageIndex++;
    } else {
      state.pages.push({ id: 'page-' + (state.pages.length + 1) + '-' + Date.now(), title: '', text: '', createdAt: Date.now(), stickers: [] });
      state.currentPageIndex = state.pages.length - 1;
    }
    renderCurrentPage();
    persistLocal();
  });
  trashBtn.addEventListener('click', function(){
    if(!window.confirm('Delete this page and its saved stickers?')) return;
    if(state.pages.length <= 1){
      state.pages = freshPages();
      state.currentPageIndex = 0;
    } else {
      state.pages.splice(state.currentPageIndex, 1);
      if(state.currentPageIndex >= state.pages.length) state.currentPageIndex = state.pages.length - 1;
    }
    renderCurrentPage();
    persistLocal();
    pushToCloudIfSignedIn();
  });

  function hasTextSelection(){
    var sel = window.getSelection();
    if(!sel || sel.rangeCount === 0 || sel.isCollapsed) return false;
    return bodyInput.contains(sel.anchorNode);
  }

  var cachedSelectionRange = null;
  function cacheTextSelection(){
    var sel = window.getSelection();
    if(sel && sel.rangeCount && sel.anchorNode && bodyInput.contains(sel.anchorNode)){
      cachedSelectionRange = sel.getRangeAt(0).cloneRange();
    }
  }
  function restoreTextSelection(){
    bodyInput.focus();
    var sel = window.getSelection();
    if(cachedSelectionRange){
      sel.removeAllRanges();
      sel.addRange(cachedSelectionRange);
      return;
    }
    if(!bodyInput.firstChild){
      var marker = document.createTextNode('\u200b');
      bodyInput.appendChild(marker);
      var emptyRange = document.createRange();
      emptyRange.selectNodeContents(marker);
      sel.removeAllRanges();
      sel.addRange(emptyRange);
      return;
    }
    var node = bodyInput;
    while(node.lastChild) node = node.lastChild;
    var endRange = document.createRange();
    if(node.nodeType === 3) endRange.setStart(node, node.nodeValue.length);
    else endRange.selectNodeContents(node);
    endRange.collapse(true);
    sel.removeAllRanges();
    sel.addRange(endRange);
  }

  fontSelect.addEventListener('change', function(){
    var fontValue = fontSelect.value;
    restoreTextSelection();
    document.execCommand('fontName', false, fontValue === 'inherit' ? 'inherit' : fontValue);
    queueSave();
  });

  Array.prototype.forEach.call(bgRow.querySelectorAll('.bg-pill'), function(btn){
    btn.addEventListener('click', function(){
      state.paper = btn.getAttribute('data-bg');
      applyPreferences();
      persistLocal();
      pushToCloudIfSignedIn();
    });
  });

  function wrapSelectionInSpan(styleProp, styleValue){
    var sel = window.getSelection();
    if(!sel.rangeCount) return;
    var range = sel.getRangeAt(0);
    var span = document.createElement('span');
    span.style[styleProp] = styleValue;
    try {
      range.surroundContents(span);
    } catch(e){
      var frag = range.extractContents();
      span.appendChild(frag);
      range.insertNode(span);
    }
    sel.removeAllRanges();
    var newRange = document.createRange();
    newRange.selectNodeContents(span);
    sel.addRange(newRange);
  }

  fontSelect.addEventListener('mousedown', cacheTextSelection);
  fontSelect.addEventListener('focus', cacheTextSelection);
  sizeSelect.addEventListener('mousedown', cacheTextSelection);
  sizeSelect.addEventListener('focus', cacheTextSelection);
  colorPicker.addEventListener('mousedown', cacheTextSelection);

  sizeSelect.addEventListener('change', function(){
    var sizeValue = Number(sizeSelect.value);
    restoreTextSelection();
    wrapSelectionInSpan('fontSize', sizeValue + 'px');
    queueSave();
  });

  Array.prototype.forEach.call(document.querySelectorAll('.fmt-btn[data-cmd]'), function(btn){
    btn.addEventListener('mousedown', function(e){ e.preventDefault(); });
    btn.addEventListener('click', function(){
      restoreTextSelection();
      document.execCommand(btn.getAttribute('data-cmd'), false, null);
      updateFormatButtonStates();
      queueSave();
    });
  });

  var highlightBtn = document.getElementById('fmt-highlight-btn');
  var highlightColorPicker = document.getElementById('highlight-color-picker');
  highlightColorPicker.addEventListener('mousedown', cacheTextSelection);
  highlightBtn.addEventListener('mousedown', function(e){ e.preventDefault(); });
  highlightBtn.addEventListener('click', function(){
    restoreTextSelection();
    document.execCommand('hiliteColor', false, highlightColorPicker.value);
    queueSave();
  });

  function updateFormatButtonStates(){
    Array.prototype.forEach.call(document.querySelectorAll('.fmt-btn[data-cmd]'), function(btn){
      try {
        btn.classList.toggle('active', document.queryCommandState(btn.getAttribute('data-cmd')));
      } catch(e){}
    });
  }
  document.addEventListener('selectionchange', function(){
    if(document.activeElement === bodyInput){
      updateFormatButtonStates();
      cacheTextSelection();
    }
  });

  var dateBtn = document.getElementById('fmt-date-btn');
  dateBtn.addEventListener('mousedown', function(e){ e.preventDefault(); });
  dateBtn.addEventListener('click', function(){
    restoreTextSelection();
    var dateStr = new Date().toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric', year: 'numeric' });
    document.execCommand('insertHTML', false, '<i>' + dateStr + '</i> ');
    queueSave();
  });

  openStickersBtn.addEventListener('click', function(){
    stickerPicker.classList.toggle('open');
    openStickersBtn.classList.toggle('active', stickerPicker.classList.contains('open'));
  });
  closeStickersBtn.addEventListener('click', function(){
    stickerPicker.classList.remove('open');
    openStickersBtn.classList.remove('active');
  });

  colorPicker.addEventListener('input', function(){
    restoreTextSelection();
    document.execCommand('foreColor', false, colorPicker.value);
    if(!state.recentColors) state.recentColors = [];
    state.recentColors = [colorPicker.value].concat(state.recentColors.filter(function(x){ return x !== colorPicker.value; })).slice(0, 6);
    renderRecentColors();
    queueSave();
  });

  hueSlider.addEventListener('input', function(){
    state.paperHue = Number(hueSlider.value);
    var hueValue = state.paperHue;
    paperHueOverlay.style.background = hueValue === 0 ? 'transparent' : 'hsl(' + hueValue + ', 65%, 55%)';
    persistLocal();
    if(hueSaveTimer) clearTimeout(hueSaveTimer);
    hueSaveTimer = setTimeout(pushToCloudIfSignedIn, 800);
  });

  saveBtn.addEventListener('click', function(){
    syncPanel.classList.toggle('open');
    syncPanelBackdrop.classList.toggle('open');
  });
  syncPanelBackdrop.addEventListener('click', function(){
    syncPanel.classList.remove('open');
    syncPanelBackdrop.classList.remove('open');
  });

  signinBtn.addEventListener('click', function(){
    window.open('desktop-diary.html', '_blank');
  });

  pushBtn.addEventListener('click', function(){
    if(!cloudUser){
      syncPanelStatus.textContent = 'Sign in on the main app first to push.';
      return;
    }
    captureCurrentPage();
    pushBtn.disabled = true;
    syncPanelStatus.textContent = 'Pushing…';
    var metaRef = db.collection('users').doc(cloudUser.uid).collection('diary').doc('meta');
    metaRef.set({
      notebook: { pages: state.pages, currentPageIndex: state.currentPageIndex, font: state.font, paper: state.paper, fontSize: state.fontSize, fontColor: state.fontColor, recentColors: state.recentColors, paperHue: state.paperHue },
      updatedAt: Date.now()
    }, { merge: true }).then(function(){
      persistLocal();
      setSyncStatus('online');
      syncPanelStatus.textContent = 'Pushed just now.';
      pushBtn.disabled = false;
    }).catch(function(){
      setSyncStatus('offline');
      syncPanelStatus.textContent = 'Push failed — try again.';
      pushBtn.disabled = false;
    });
  });

  pullBtn.addEventListener('click', function(){
    if(!cloudUser){
      syncPanelStatus.textContent = 'Sign in on the main app first to pull.';
      return;
    }
    pullBtn.disabled = true;
    syncPanelStatus.textContent = 'Pulling…';
    var metaRef = db.collection('users').doc(cloudUser.uid).collection('diary').doc('meta');
    metaRef.get().then(function(snap){
      pullBtn.disabled = false;
      if(!snap.exists){
        syncPanelStatus.textContent = 'Nothing found in the cloud yet.';
        return;
      }
      var data = snap.data() || {};
      var nb = data.notebook;
      if(nb && Array.isArray(nb.pages) && nb.pages.length){
        state.pages = nb.pages;
        state.currentPageIndex = Number.isFinite(nb.currentPageIndex) ? nb.currentPageIndex : 0;
        if(nb.font) state.font = nb.font;
        if(nb.paper) state.paper = nb.paper;
        if(Number.isFinite(nb.fontSize)) state.fontSize = nb.fontSize;
        if(nb.fontColor) state.fontColor = nb.fontColor;
        if(Array.isArray(nb.recentColors)) state.recentColors = nb.recentColors;
        if(Number.isFinite(nb.paperHue)) state.paperHue = nb.paperHue;
        renderCurrentPage();
        applyPreferences();
        persistLocal();
      }
      setSyncStatus('online');
      syncPanelStatus.textContent = 'Pulled just now.';
    }).catch(function(){
      pullBtn.disabled = false;
      setSyncStatus('offline');
      syncPanelStatus.textContent = 'Pull failed — try again.';
    });
  });

  titleInput.addEventListener('input', function(){
    if(menuTitleInput) menuTitleInput.value = titleInput.value;
    queueSave();
  });
  if(menuTitleInput){
    menuTitleInput.addEventListener('input', function(){
      titleInput.value = menuTitleInput.value;
      queueSave();
    });
  }
  bodyInput.addEventListener('input', queueSave);
  titleInput.addEventListener('keydown', function(e){
    if(e.key === 'Enter'){
      e.preventDefault();
      bodyInput.focus();
    }
  });

  // --- Mobile keyboard positioning ---
  // Keep the paper at the exact rendered size while the keyboard is open;
  // only the viewport position may move so typed text matches the page view.
  var lockedNotebookSize = null;
  function positionNotebookForKeyboard(){
    if(!lockedNotebookSize){
      var rect = notebookEl.getBoundingClientRect();
      lockedNotebookSize = { width: rect.width, height: rect.height };
      notebookEl.style.width = lockedNotebookSize.width + 'px';
      notebookEl.style.height = lockedNotebookSize.height + 'px';
      notebookEl.style.maxWidth = 'none';
    }
    notebookEl.scrollIntoView({ block: 'center', behavior: 'smooth' });
  }
  function releaseNotebookSizeAfterKeyboard(){
    setTimeout(function(){
      var typing = document.activeElement === titleInput || document.activeElement === bodyInput || document.activeElement === menuTitleInput;
      if(!typing && lockedNotebookSize){
        notebookEl.style.width = '';
        notebookEl.style.height = '';
        notebookEl.style.maxWidth = '';
        lockedNotebookSize = null;
      }
    }, 120);
  }
  titleInput.addEventListener('focus', function(){ setTimeout(positionNotebookForKeyboard, 60); });
  titleInput.addEventListener('blur', releaseNotebookSizeAfterKeyboard);
  bodyInput.addEventListener('focus', function(){ setTimeout(positionNotebookForKeyboard, 60); });
  bodyInput.addEventListener('blur', releaseNotebookSizeAfterKeyboard);
  if(menuTitleInput){
    menuTitleInput.addEventListener('focus', function(){ setTimeout(positionNotebookForKeyboard, 60); });
    menuTitleInput.addEventListener('blur', releaseNotebookSizeAfterKeyboard);
  }

  // --- Save as image ---
  var exportImageBtn = document.getElementById('export-image-btn');
  exportImageBtn.addEventListener('click', function(){
    syncPanel.classList.remove('open');
    syncPanelBackdrop.classList.remove('open');
    captureCurrentPage();
    var fontReady = (document.fonts && document.fonts.load)
      ? document.fonts.load('16px DiaryComicSans').catch(function(){})
      : Promise.resolve();
    fontReady.then(function(){
    var img = new Image();
    img.onload = function(){
      var canvas = document.createElement('canvas');
      canvas.width = img.naturalWidth;
      canvas.height = img.naturalHeight;
      var ctx = canvas.getContext('2d');
      ctx.drawImage(img, 0, 0);

      var scale = img.naturalWidth / 220;
      var editLeft = 22 * scale, editTop = 26 * scale;
      var editRight = canvas.width - (13 * scale);
      var editBottom = canvas.height - (34 * scale);
      var editWidth = editRight - editLeft;

      var page = getCurrentPage();
      var title = (page.title || '').trim();
      var titleY = editTop;
      var titleFontSize = 15 * scale;
      if(title){
        ctx.fillStyle = '#262626';
        ctx.font = 'bold ' + titleFontSize + 'px Tahoma, Arial, sans-serif';
        ctx.textBaseline = 'top';
        ctx.fillText(title, editLeft, titleY, editWidth);
      }

      var bodyY = titleY + titleFontSize + (10 * scale);
      var defaultFontSize = state.fontSize || 16;
      var defaultColor = state.fontColor || '#262626';

      function extractRuns(node, style, runs){
        Array.prototype.forEach.call(node.childNodes, function(child){
          if(child.nodeType === 3){
            if(child.textContent) runs.push({ text: child.textContent, style: style });
          } else if(child.nodeType === 1){
            var tag = child.tagName;
            if(tag === 'BR'){ runs.push({ brk: true }); return; }
            var cs = window.getComputedStyle(child);
            var s = {
              bold: style.bold || tag === 'B' || tag === 'STRONG' || parseInt(cs.fontWeight, 10) >= 600,
              italic: style.italic || tag === 'I' || tag === 'EM' || cs.fontStyle === 'italic',
              underline: style.underline || tag === 'U' || (cs.textDecorationLine || '').indexOf('underline') > -1,
              strike: style.strike || tag === 'S' || tag === 'STRIKE' || (cs.textDecorationLine || '').indexOf('line-through') > -1,
              color: (cs.color && cs.color !== 'rgb(0, 0, 0)') ? cs.color : style.color,
              bg: (cs.backgroundColor && cs.backgroundColor !== 'rgba(0, 0, 0, 0)' && cs.backgroundColor !== 'transparent') ? cs.backgroundColor : style.bg,
              size: style.size
            };
            extractRuns(child, s, runs);
            if(tag === 'DIV' || tag === 'P'){ runs.push({ brk: true }); }
          }
        });
      }

      var runs = [];
      extractRuns(bodyInput, { bold:false, italic:false, underline:false, strike:false, color: defaultColor, bg: null, size: defaultFontSize }, runs);

      var words = [];
      runs.forEach(function(run){
        if(run.brk){ words.push({ brk: true }); return; }
        run.text.split(/(\s+)/).forEach(function(tok){
          if(tok) words.push({ word: tok, style: run.style });
        });
      });

      function fontStringFor(style){
        var sz = (style.size || defaultFontSize) * scale;
        var weight = style.bold ? 'bold ' : '';
        var styleStr = style.italic ? 'italic ' : '';
        return styleStr + weight + sz + 'px "DiaryComicSans", "Comic Sans MS", "Comic Sans", cursive';
      }

      var x = editLeft, y = bodyY;
      var lineHeight = defaultFontSize * scale * 1.3;
      ctx.textBaseline = 'top';

      words.forEach(function(w){
        if(w.brk){
          x = editLeft;
          y += lineHeight;
          return;
        }
        ctx.font = fontStringFor(w.style);
        var wordWidth = ctx.measureText(w.word).width;
        if(x + wordWidth > editLeft + editWidth && w.word.trim()){
          x = editLeft;
          y += lineHeight;
        }
        if(y + lineHeight <= editBottom){
          var sz = (w.style.size || defaultFontSize) * scale;
          if(w.style.bg){
            ctx.fillStyle = w.style.bg;
            ctx.fillRect(x, y, wordWidth, sz * 1.2);
          }
          ctx.fillStyle = w.style.color || defaultColor;
          ctx.fillText(w.word, x, y);
          if(w.style.underline){
            ctx.beginPath();
            ctx.moveTo(x, y + sz);
            ctx.lineTo(x + wordWidth, y + sz);
            ctx.strokeStyle = ctx.fillStyle;
            ctx.lineWidth = Math.max(1, sz * 0.06);
            ctx.stroke();
          }
          if(w.style.strike){
            ctx.beginPath();
            ctx.moveTo(x, y + sz * 0.55);
            ctx.lineTo(x + wordWidth, y + sz * 0.55);
            ctx.strokeStyle = ctx.fillStyle;
            ctx.lineWidth = Math.max(1, sz * 0.06);
            ctx.stroke();
          }
        }
        x += wordWidth;
      });

      var titleForFile = title ? title.replace(/[^a-z0-9]+/gi, '-').toLowerCase().slice(0, 40) : 'page';

      var stickers = Array.isArray(page.stickers) ? page.stickers : [];
      var stickerLoads = stickers.map(function(st){
        return new Promise(function(resolve){
          var sImg = new Image();
          sImg.onload = function(){ resolve({ img: sImg, st: st }); };
          sImg.onerror = function(){ resolve(null); };
          sImg.src = st.src;
        });
      });

      Promise.all(stickerLoads).then(function(loaded){
        loaded.forEach(function(entry){
          if(!entry) return;
          var sw = (entry.st.size || 15) / 100 * canvas.width;
          var sh = sw * (entry.img.naturalHeight / entry.img.naturalWidth);
          var sx = (entry.st.x / 100) * canvas.width;
          var sy = (entry.st.y / 100) * canvas.height;
          ctx.drawImage(entry.img, sx, sy, sw, sh);
        });

        var a = document.createElement('a');
        a.download = 'notebook-' + titleForFile + '-' + new Date().toISOString().slice(0, 10) + '.png';
        a.href = canvas.toDataURL('image/png');
        document.body.appendChild(a);
        a.click();
        a.remove();
      });
    };
    img.src = 'notepad1.png';
    });
  });

  // --- Boot ---
  loadLocal();
  renderCurrentPage();
  applyPreferences();
  populateStickerGrid();
  setSyncStatus('offline');

  try {
    if(!window.firebase.apps || !window.firebase.apps.length){
      firebase.initializeApp(firebaseConfig);
    }
    firebase.auth().setPersistence(firebase.auth.Auth.Persistence.LOCAL).catch(function(){});
    db = firebase.firestore();
    firebase.auth().onAuthStateChanged(function(user){
      if(user){
        cloudUser = user;
        pullFromCloud();
      } else {
        cloudUser = null;
        setSyncStatus('offline');
      }
    });
  } catch(e){
    setSyncStatus('offline');
  }
})();
</script>
</body>
