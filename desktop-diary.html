  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html {
    -webkit-text-size-adjust: 100%; text-size-adjust: 100%;
    touch-action: manipulation;
  }
  html, body {
    margin: 0; padding: 0; width: 100%; height: 100%;
    font-family: Tahoma, "Segoe UI", Arial, sans-serif;
    background: #000;
    overflow: hidden;
    position: fixed;
    overscroll-behavior: none;
    -webkit-user-select: none; user-select: none;
  }
  #desktop {
    position: relative; width: 100%; height: 100vh; height: 100dvh;
    overflow: hidden;
    background: #000;
  }
  #bg-scene { position:absolute; inset:0; z-index:0; overflow:hidden; }
  #bg-scene svg { width:100%; height:100%; display:block; }

  /* ---------- XP Luna window chrome ---------- */
  .win {
    position: absolute;
    background: #ece9d8;
    border: 1px solid #0054e3;
    border-radius: 8px;
    box-shadow: 2px 3px 12px rgba(0,0,0,.45);
    font-size: 12px;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .titlebar {
    background: linear-gradient(180deg,#3d95ff 0%,#0058e6 45%,#0850d0 55%,#1a63d8 100%);
    color: #fff;
    font-weight: bold;
    font-size: 13px;
    padding: 5px 4px 5px 9px;
    display: flex; justify-content: space-between; align-items: center;
    cursor: move;
    letter-spacing: .2px;
    text-shadow: 1px 1px 1px rgba(0,0,0,.5);
  }
  .titlebar .t-title { display:flex; align-items:center; gap:6px; overflow:hidden; white-space:nowrap; text-overflow:ellipsis; }
  .titlebar .t-btns { display:flex; gap:3px; }
  .titlebar button.win-btn {
    width: 21px; height: 19px;
    border: 1px solid rgba(255,255,255,.5);
    border-radius: 3px;
    background: linear-gradient(180deg,#ff8a70,#e0301e 55%,#c11c0c);
    font-size: 11px; line-height: 1; font-weight:bold;
    color:#fff; cursor:pointer; padding:0;
    box-shadow: inset 0 1px 1px rgba(255,255,255,.5);
  }
  .titlebar button.win-btn:active { filter: brightness(0.85); }
  .menubar {
    background: #ece9d8; border-bottom: 1px solid #b0aca0;
    display: flex; font-size: 11px; padding: 2px 2px;
  }
  .menubar .m-item { position: relative; padding: 4px 9px; cursor: pointer; border-radius:3px; }
  .menubar .m-item:hover { background: #316ac5; color:#fff; }
  .menubar .m-drop {
    display: none; position: absolute; top: 100%; left: 0;
    background: #fff; border: 1px solid #888; box-shadow: 2px 2px 8px rgba(0,0,0,.35);
    min-width: 150px; z-index: 5; border-radius: 0 4px 4px 4px; overflow:hidden;
  }
  .menubar .m-item:hover .m-drop { display: block; }
  .menubar .m-item.open .m-drop { display: block; }
  .m-drop div { padding: 6px 12px; color: #000; white-space: nowrap; }
  .m-drop div:hover { background: #316ac5; color:#fff; }
  .m-drop div.mi-active { font-weight: bold; }
  .m-drop div.mi-active::after { content: ' \2713'; }
  .locked-content { filter:blur(4px); transition:filter 0.2s; cursor:pointer; user-select:none; }

<script>
window.onerror = function(msg, src, line, col, err){
  var d = document.createElement('div');
  d.style.cssText = 'position:fixed;top:0;left:0;right:0;background:#c0392b;color:#fff;padding:10px;font-size:12px;z-index:999999;font-family:monospace;white-space:pre-wrap;word-break:break-all;';
  d.textContent = 'Error: ' + msg + '\nLine: ' + line + '\nSource: ' + src;
  document.body.appendChild(d);
};
try {
(function(){

  var STORAGE_KEY = 'buddy-diary-data-v1';

  var state = {
    account: null,          // { screenName, password }
    savePassword: false,
    autoLogin: false,
    status: { label: '', html: '', ts: null },   // current status
    statusLog: [],                    // history: { label, html, ts }
    statusPresets: [],                // saved reusable statuses: { id, label, html }
    moodLog: [],                      // mood tracker history: { mood, ts }
    profile: { pic: '', html: '', header: '', aboutMe: '' },  // profile picture + two HTML sections
    blogPosts: [],          // blog posts: { id, title, html, ts, editedAt }
    background: { color: '', image: '' },  // custom desktop background (device-local, not synced)
    customFonts: [],        // user-uploaded fonts (device-local, not synced): { id, name, dataUrl }
    stickyNotes: [],        // desktop sticky notes (device-local): { id, text, color, x, y, w, h }
    customMoods: [],        // user-added moods: ['Grateful', 'Hopeful', ...]
    customMoodColors: {},   // mood name -> hex color override
    groups: [ { id: 'default', name: 'Buddies' } ],
    buddies: [],            // { id, name, addedAt, groupId }
    entries: {},            // buddyId -> [ { id, html, ts, kind:'entry'|'prompt' } ]
    drafts: {}              // buddyId -> [ { id, html, ts }, ... ] saved draft log
  };

  function normalizeState(){
    if(!Array.isArray(state.groups) || !state.groups.length){
      state.groups = [{ id: 'default', name: 'Buddies' }];
    }
    if(!Array.isArray(state.buddies)) state.buddies = [];
    state.buddies.forEach(function(b){ if(!b.groupId) b.groupId = 'default'; });
    if(!state.status) state.status = { label: '', html: '', ts: null };
    if(!Array.isArray(state.statusLog)) state.statusLog = [];
    state.statusLog.forEach(function(e){ if(!e.id) e.id = uid(); });
    if(!Array.isArray(state.statusPresets)) state.statusPresets = [];
    if(!Array.isArray(state.moodLog)) state.moodLog = [];
    if(!state.profile) state.profile = { pic: '', html: '', header: '', aboutMe: '' };
    if(!state.profile.header && !state.profile.aboutMe && state.profile.html){
      // migrate old single html field into aboutMe
      state.profile.aboutMe = state.profile.html;
    }
    if(state.profile.header === undefined) state.profile.header = '';
    if(state.profile.aboutMe === undefined) state.profile.aboutMe = '';
    if(!Array.isArray(state.blogPosts)) state.blogPosts = [];
    if(!state.background) state.background = { color: '', image: '' };
    if(!Array.isArray(state.customFonts)) state.customFonts = [];
    if(!Array.isArray(state.stickyNotes)) state.stickyNotes = [];
    if(!Array.isArray(state.customMoods)) state.customMoods = [];
    if(!state.customMoodColors || typeof state.customMoodColors !== 'object') state.customMoodColors = {};
    state.entries = state.entries || {};
    Object.keys(state.entries).forEach(function(bid){
      (state.entries[bid] || []).forEach(function(e){ if(!e.kind) e.kind = 'entry'; });
    });
    if(!state.drafts || typeof state.drafts !== 'object') state.drafts = {};
    Object.keys(state.drafts).forEach(function(bid){
      var d = state.drafts[bid];
      if(d && !Array.isArray(d)){
        // migrate old single-draft-per-buddy format into a one-item log
        state.drafts[bid] = d.html ? [{ id: uid(), html: d.html, ts: d.ts || Date.now() }] : [];
      }
      if(!Array.isArray(state.drafts[bid])) state.drafts[bid] = [];
      state.drafts[bid].forEach(function(entry){ if(!entry.id) entry.id = uid(); });
    });
  }

  var openWindows = [];     // { id, type, buddyId, el, tbEl }
  var logFilterByBuddy = {};       // buddyId -> 'photo'|'voice'|'prompt'|null
  var searchQueryByBuddy = {};     // buddyId -> string
  var zCounter = 100;
  var winCounter = 0;

  function isMobile(){
    return window.matchMedia('(max-width: 700px)').matches;
  }

  // ---------------- desktop background (Start menu options) ----------------
  // ---------------- custom fonts (uploaded by the user) ----------------
  function registerCustomFont(fontEntry){
    try{
      var face = new FontFace(fontEntry.name, 'url(' + fontEntry.dataUrl + ')');
      return face.load().then(function(loaded){
        document.fonts.add(loaded);
      }).catch(function(){});
    } catch(e){ return Promise.resolve(); }
  }

  // ---------------- sticky notes ----------------
  var STICKY_COLORS = ['#fff9a3','#ffd6a5','#b5ead7','#c9b1ff','#ffc8dd','#bde0fe'];

  function saveStickyNotes(){ saveState(); }

  function renderAllStickyNotes(){
    var layer = document.getElementById('sticky-layer');
    if(!layer) return;
    layer.innerHTML = '';
    (state.stickyNotes || []).forEach(function(note){ mountStickyNote(note); });
  }

  function mountStickyNote(note){
    var layer = document.getElementById('sticky-layer');
    if(!layer) return;
    var el = document.createElement('div');
    el.className = 'sticky';
    el.style.left = (note.x || 40) + 'px';
    el.style.top = (note.y || 60) + 'px';
    el.style.width = (note.w || 180) + 'px';
    el.style.height = (note.h || 160) + 'px';
    el.style.background = note.color || '#fff9a3';
    el.style.zIndex = (zCounter += 10); // always spawn above windows
    el.setAttribute('data-sid', note.id);

    var bar = document.createElement('div');
    bar.className = 'sticky-bar';
    bar.style.background = shadeColor(note.color || '#fff9a3', -18);

    var title = document.createElement('span');
    title.className = 'sticky-bar-title';
    title.textContent = '✎ Note';

    var colorBtn = document.createElement('button');
    colorBtn.className = 'sticky-color-btn';
    colorBtn.style.background = note.color || '#fff9a3';
    colorBtn.title = 'Change color';

    var closeBtn = document.createElement('button');
    closeBtn.className = 'sticky-close';
    closeBtn.innerHTML = '&times;';
    closeBtn.title = 'Delete note';

    bar.appendChild(title);
    bar.appendChild(colorBtn);
    bar.appendChild(closeBtn);

    var body = document.createElement('textarea');
    body.className = 'sticky-body';
    body.value = note.text || '';
    body.placeholder = 'Type a note\u2026';

    var resizeHandle = document.createElement('div');
    resizeHandle.className = 'sticky-resize-handle';

    el.appendChild(bar);
    el.appendChild(body);
    el.appendChild(resizeHandle);
    layer.appendChild(el);

    // touch resize via handle
    resizeHandle.addEventListener('touchstart', function(e){
      e.stopPropagation();
      var t = e.touches[0];
      var startX = t.clientX, startY = t.clientY;
      var startW = el.offsetWidth, startH = el.offsetHeight;
      function onMove(ev){
        var tt = ev.touches[0];
        var newW = Math.max(140, startW + (tt.clientX - startX));
        var newH = Math.max(100, startH + (tt.clientY - startY));
        el.style.width = newW + 'px';
        el.style.height = newH + 'px';
      }
      function onEnd(){
        note.w = el.offsetWidth; note.h = el.offsetHeight;
        saveStickyNotes();
        resizeHandle.removeEventListener('touchmove', onMove);
        resizeHandle.removeEventListener('touchend', onEnd);
      }
      resizeHandle.addEventListener('touchmove', onMove, { passive:false });
      resizeHandle.addEventListener('touchend', onEnd);
    }, { passive:true });

    // bring to front on any interaction
    el.addEventListener('mousedown', function(){ el.style.zIndex = ++zCounter; });
    el.addEventListener('touchstart', function(){ el.style.zIndex = ++zCounter; }, { passive:true });

    // drag via title bar
    makeStickyDraggable(el, bar, note);

    // resize observer to save dimensions
    var resizeTimer;
    var ro = new ResizeObserver(function(){
      clearTimeout(resizeTimer);
      resizeTimer = setTimeout(function(){
        note.w = el.offsetWidth; note.h = el.offsetHeight;
        saveStickyNotes();
      }, 400);
    });
    ro.observe(el);

    // text changes
    var textTimer;
    body.addEventListener('input', function(){
      clearTimeout(textTimer);
      textTimer = setTimeout(function(){
        note.text = body.value;
        saveStickyNotes();
      }, 600);
    });

    // color picker
    colorBtn.addEventListener('click', function(e){
      e.stopPropagation();
      showStickyColorPicker(el, note, colorBtn, bar);
    });

    // delete
    closeBtn.addEventListener('click', function(){
      ro.disconnect();
      el.remove();
      state.stickyNotes = state.stickyNotes.filter(function(n){ return n.id !== note.id; });
      saveStickyNotes();
    });
  }

  function shadeColor(hex, pct){
    // lighten/darken a hex color by pct (-100..100)
    var n = parseInt(hex.replace('#',''), 16);
    var r = Math.min(255, Math.max(0, (n>>16) + pct));
    var g = Math.min(255, Math.max(0, ((n>>8)&0xff) + pct));
    var b = Math.min(255, Math.max(0, (n&0xff) + pct));
    return '#' + [r,g,b].map(function(x){ return ('0'+x.toString(16)).slice(-2); }).join('');
  }

  function makeStickyDraggable(el, handle, note){
    var startX, startY, startL, startT, dragging = false;
    function onStart(cx, cy){
      dragging = true;
      startX = cx; startY = cy;
      startL = el.offsetLeft; startT = el.offsetTop;
      el.style.zIndex = ++zCounter;
    }
    function onMove(cx, cy){
      if(!dragging) return;
      var nx = startL + (cx - startX);
      var ny = startT + (cy - startY);
      var maxX = window.innerWidth - el.offsetWidth;
      var maxY = window.innerHeight - TASKBAR_H - el.offsetHeight;
      nx = Math.max(0, Math.min(nx, maxX));
      ny = Math.max(0, Math.min(ny, maxY));
      el.style.left = nx + 'px'; el.style.top = ny + 'px';
    }
    function onEnd(){
      if(!dragging) return;
      dragging = false;
      note.x = el.offsetLeft; note.y = el.offsetTop;
      saveStickyNotes();
    }
    handle.addEventListener('mousedown', function(e){
      if(e.target.tagName === 'BUTTON') return;
      e.preventDefault(); onStart(e.clientX, e.clientY);
      document.addEventListener('mousemove', onMouse);
      document.addEventListener('mouseup', onMouseUp);
    });
    function onMouse(e){ onMove(e.clientX, e.clientY); }
    function onMouseUp(){ onEnd(); document.removeEventListener('mousemove', onMouse); document.removeEventListener('mouseup', onMouseUp); }
    handle.addEventListener('touchstart', function(e){
      if(e.target.tagName === 'BUTTON') return;
      var t = e.touches[0]; onStart(t.clientX, t.clientY);
    }, { passive:true });
    handle.addEventListener('touchmove', function(e){
      var t = e.touches[0]; onMove(t.clientX, t.clientY); e.preventDefault();
    }, { passive:false });
    handle.addEventListener('touchend', onEnd);
  }

  var activeStickyPicker = null;
  function showStickyColorPicker(el, note, colorBtn, bar){
    if(activeStickyPicker){ activeStickyPicker.remove(); activeStickyPicker = null; }
    var picker = document.createElement('div');
    picker.style.cssText = 'position:fixed;z-index:999999;display:flex;gap:6px;background:#fff;border:1px solid #aaa;border-radius:8px;padding:7px;box-shadow:0 2px 10px rgba(0,0,0,.3);';
    STICKY_COLORS.forEach(function(c){
      var swatch = document.createElement('div');
      swatch.style.cssText = 'width:22px;height:22px;border-radius:50%;background:'+c+';border:2px solid rgba(0,0,0,'+(note.color===c?'.6':'.18')+';cursor:pointer;';
      swatch.addEventListener('click', function(){
        note.color = c;
        el.style.background = c;
        bar.style.background = shadeColor(c, -18);
        colorBtn.style.background = c;
        saveStickyNotes();
        picker.remove(); activeStickyPicker = null;
      });
      picker.appendChild(swatch);
    });
    var rect = colorBtn.getBoundingClientRect();
    picker.style.left = Math.min(rect.left, window.innerWidth - 200) + 'px';
    picker.style.top = (rect.bottom + 4) + 'px';
    document.body.appendChild(picker);
    activeStickyPicker = picker;
    setTimeout(function(){
      document.addEventListener('click', function dismiss(e){
        if(!picker.contains(e.target)){ picker.remove(); activeStickyPicker = null; document.removeEventListener('click', dismiss); }
      });
    }, 0);
  }

  var stickySpawnCounter = 0;
  function nextStickySpawnPos(w, h){
    // cascade each new note diagonally so they don't stack on top of each other;
    // wrap back to the start once the cascade would run off-screen
    var step = 28;
    var baseX = 50, baseY = 50;
    var maxSteps = Math.max(1, Math.floor((Math.max(window.innerWidth - baseX - w, 0)) / step));
    var idx = stickySpawnCounter % (maxSteps || 1);
    stickySpawnCounter++;
    var rawX = baseX + idx * step;
    var rawY = baseY + idx * step;
    // clampToViewport keeps the note fully on-screen and above the taskbar
    return clampToViewport(rawX, rawY, w, h);
  }

  function createStickyNote(){
    var w = 180, h = 160;
    var pos = nextStickySpawnPos(w, h);
    var note = {
      id: uid(),
      text: '',
      color: STICKY_COLORS[Math.floor(Math.random() * STICKY_COLORS.length)],
      x: pos.x,
      y: pos.y,
      w: w, h: h
    };
    state.stickyNotes = state.stickyNotes || [];
    state.stickyNotes.push(note);
    saveStickyNotes();
    mountStickyNote(note);
  }

  function applyBackground(){
    var desktop = document.getElementById('desktop');
    var scene = document.getElementById('bg-scene');
    if(state.background && state.background.image){
      scene.style.display = 'none';
      desktop.style.background = 'center / cover no-repeat url("' + state.background.image + '")';
    } else if(state.background && state.background.color){
      scene.style.display = 'none';
      desktop.style.background = state.background.color;
    } else {
      scene.style.display = 'block';
      desktop.style.background = '#bfe3fb';
    }
  }

  document.getElementById('tb-start').addEventListener('click', function(e){
    e.stopPropagation();
    document.getElementById('start-menu').classList.toggle('open');
  });
  document.addEventListener('click', function(e){
    var menu = document.getElementById('start-menu');
    if(menu.classList.contains('open') && !menu.contains(e.target) && !e.target.closest('#tb-start')){
      menu.classList.remove('open');
    }
  });

  document.getElementById('sm-stickynote').addEventListener('click', function(e){
    e.stopPropagation();
    document.getElementById('start-menu').classList.remove('open');
    createStickyNote();
  });
  document.getElementById('sm-bgedit').addEventListener('click', function(e){
    e.stopPropagation();
    document.getElementById('start-menu').classList.remove('open');
    openEditBackgroundWindow();
  });

  function openEditBackgroundWindow(){
    var COLORS = [
      '#3a6ea5','#1a3a5c','#2d7dd2','#0d3aa8','#5c3d99','#8e24aa',

  // ---------------- persistence ----------------
  // window.storage only exists inside Claude's own preview iframe. On the real
  // deployed site (GitHub Pages, etc.) there's no such API, so we fall back to
  // IndexedDB — this is what makes local saving (and full offline use) actually
  // work once this file is hosted for real.
  var localStore = null;
  function makeIndexedDBStore(){
    var dbPromise = new Promise(function(resolve, reject){
      try{
        var req = indexedDB.open('instant-diary-db', 1);
        req.onupgradeneeded = function(){ req.result.createObjectStore('kv'); };
        req.onsuccess = function(){ resolve(req.result); };
        req.onerror = function(){ reject(req.error); };
      } catch(e){ reject(e); }
    });
    function withStore(mode, fn){
      return dbPromise.then(function(db){
        return new Promise(function(resolve, reject){
          var tx = db.transaction('kv', mode);
          var store = tx.objectStore('kv');
          var request = fn(store);
          request.onsuccess = function(){ resolve(request.result); };
          request.onerror = function(){ reject(request.error); };
        });
      });
    }
    return {
      get: function(key){
        return withStore('readonly', function(store){ return store.get(key); })
          .then(function(value){ return (value === undefined) ? null : { key: key, value: value }; });
      },
      set: function(key, value){
        return withStore('readwrite', function(store){ return store.put(value, key); })
          .then(function(){ return { key: key, value: value }; });
      }
    };
  }
  function getLocalStore(){
    if(localStore) return localStore;
    if(typeof window.storage !== 'undefined' && window.storage &&
       typeof window.storage.get === 'function' && typeof window.storage.set === 'function'){
      localStore = window.storage;
      return localStore;
    }
    if(typeof indexedDB !== 'undefined'){
      try{ localStore = makeIndexedDBStore(); return localStore; } catch(e){}
    }
    return null;
  }
  function loadState(){
    return loadStateAttempt(4);

  function loadStateAttempt(retriesLeft){
    var store = getLocalStore();
    if(store){
      try{
        return store.get(STORAGE_KEY, false).then(function(res){
          if(res && res.value){
            try { state = JSON.parse(res.value); normalizeState(); } catch(e){}
          }
        }).catch(function(){ /* nothing saved yet */ });
      } catch(e){
        return Promise.resolve();
      }
    }
    if(retriesLeft > 0){
      return new Promise(function(resolve){
        setTimeout(function(){ resolve(loadStateAttempt(retriesLeft - 1)); }, 200);
      });
    }
    return Promise.resolve();
  }

  var saveInFlight = false, savePending = false;
  function saveState(){
    var store = getLocalStore();
    if(!store) return Promise.resolve();
    if(saveInFlight){ savePending = true; return Promise.resolve(); }
    saveInFlight = true;
    var payload = JSON.stringify(state);
    var attempt;
    try{
      attempt = store.set(STORAGE_KEY, payload, false);
    } catch(e){
      attempt = Promise.reject(e);
    }
    return attempt
      .catch(function(){
        // one quiet retry - transient hiccups shouldn't surface to the user
        try{
          return store.set(STORAGE_KEY, payload, false).catch(function(){ /* give up quietly */ });
        } catch(e){ /* give up quietly */ }
      })
      .then(function(){
        saveInFlight = false;
        if(savePending){ savePending = false; return saveState(); }
        if(cloudUser) scheduleCloudPush();
      });
  }

  // splits an entries array into chunks that stay comfortably under Firestore's 1MB doc limit
  function chunkEntries(arr, maxBytes){
    maxBytes = maxBytes || 700000;
    var chunks = [], current = [], size = 2;
    (arr || []).forEach(function(item){
      var itemSize = JSON.stringify(item).length + 1;
      if(current.length && size + itemSize > maxBytes){
        chunks.push(current); current = []; size = 2;
      }
      current.push(item); size += itemSize;
    });
    chunks.push(current); // always at least one (possibly empty) chunk
    return chunks;
  }

  function pushToCloud(){
    if(!db || !cloudUser) return Promise.reject(new Error('Not signed in.'));
    var uid = cloudUser.uid;
    var meta = {
      screenName: state.account ? state.account.screenName : '',
      groups: state.groups,
      buddies: state.buddies,
      status: state.status,
      statusLog: state.statusLog,
      statusPresets: state.statusPresets,
      moodLog: state.moodLog,
      drafts: state.drafts,
      profile: state.profile,
      blogPosts: state.blogPosts,
      bgColor: (state.background && state.background.color) || '',
      stickyNotes: (state.stickyNotes || []).map(function(n){
        return { id:n.id, text:n.text, color:n.color, x:n.x, y:n.y, w:n.w, h:n.h };
      }),
      chunkCounts: {},
      updatedAt: Date.now()
    };
    var writes = [];
    Object.keys(state.entries).forEach(function(buddyId){
      var chunks = chunkEntries(state.entries[buddyId]);
      meta.chunkCounts[buddyId] = chunks.length;
      chunks.forEach(function(chunk, i){
        writes.push(db.collection('users').doc(uid).collection('entries').doc(buddyId+'_'+i).set({ entries: chunk }));
      });
    });
    writes.push(db.collection('users').doc(uid).collection('diary').doc('meta').set(meta));
    return Promise.all(writes);
  }

  function pullFromCloud(){
    if(!db || !cloudUser) return Promise.reject(new Error('Not signed in.'));
    var uid = cloudUser.uid;
    return db.collection('users').doc(uid).collection('diary').doc('meta').get().then(function(snap){
      if(!snap.exists) return false;
      var meta = snap.data() || {};
      state.groups = meta.groups || state.groups;
      state.buddies = meta.buddies || [];
      state.status = meta.status || { label:'', html:'', ts:null };
      state.statusLog = meta.statusLog || [];
      state.statusPresets = meta.statusPresets || [];
      state.moodLog = meta.moodLog || [];
      state.drafts = meta.drafts || {};
      state.profile = meta.profile || { pic:'', html:'' };
      if(Array.isArray(meta.blogPosts)) state.blogPosts = meta.blogPosts;
      if(meta.bgColor) state.background = { color: meta.bgColor, image: (state.background && state.background.image) || '' };
      if(Array.isArray(meta.stickyNotes)) state.stickyNotes = meta.stickyNotes;
      if(state.account && meta.screenName) state.account.screenName = meta.screenName;
      var chunkCounts = meta.chunkCounts || {};
      var buddyIds = Object.keys(chunkCounts);
      state.entries = {};
      var fetches = buddyIds.map(function(buddyId){
        var n = chunkCounts[buddyId];
        var docFetches = [];
        for(var i=0;i<n;i++){
          docFetches.push(db.collection('users').doc(uid).collection('entries').doc(buddyId+'_'+i).get());
        }
        return Promise.all(docFetches).then(function(snaps){
          var all = [];
          snaps.forEach(function(s){ if(s.exists) all = all.concat((s.data()||{}).entries || []); });
          state.entries[buddyId] = all;
        });
      });
      return Promise.all(fetches).then(function(){
        normalizeState();
        return saveState().then(function(){ return true; });
      });
    });
  }

  // ---------------- sound ----------------
  function getCtx(){
    if(!window._actx){
      window._actx = new (window.AudioContext || window.webkitAudioContext)();
    }
    return window._actx;
  }
  function playDing(){
    try{
      var ctx = getCtx(); var now = ctx.currentTime;
      [[880,0],[1318.5,0.09]].forEach(function(pair){
        var freq = pair[0], delay = pair[1];
        var osc = ctx.createOscillator(); var gain = ctx.createGain();
        osc.type = 'sine'; osc.frequency.value = freq;
        gain.gain.setValueAtTime(0.0001, now+delay);
        gain.gain.exponentialRampToValueAtTime(0.28, now+delay+0.01);
        gain.gain.exponentialRampToValueAtTime(0.0001, now+delay+0.28);
        osc.connect(gain).connect(ctx.destination);
        osc.start(now+delay); osc.stop(now+delay+0.3);
      });
    }catch(e){}
  }
  function playDoorCreak(){
    try{
      var ctx = getCtx(); var now = ctx.currentTime;
      var osc = ctx.createOscillator(); var gain = ctx.createGain(); var filt = ctx.createBiquadFilter();
      osc.type = 'sawtooth';
      osc.frequency.setValueAtTime(90, now);
      osc.frequency.exponentialRampToValueAtTime(230, now+0.5);
      osc.frequency.exponentialRampToValueAtTime(120, now+0.95);
      filt.type = 'bandpass'; filt.frequency.value = 320; filt.Q.value = 6;
      gain.gain.setValueAtTime(0.0001, now);
      gain.gain.exponentialRampToValueAtTime(0.18, now+0.12);
      gain.gain.exponentialRampToValueAtTime(0.0001, now+1.0);
      osc.connect(filt).connect(gain).connect(ctx.destination);
      osc.start(now); osc.stop(now+1.05);
    }catch(e){}
  }

  function playDoorSlam(){
    try{
      var ctx = getCtx(); var now = ctx.currentTime;
      // low thud — body impact of the door
      var bufSize = ctx.sampleRate * 0.6;
      var buf = ctx.createBuffer(1, bufSize, ctx.sampleRate);
      var data = buf.getChannelData(0);
      for(var i=0; i<bufSize; i++){ data[i] = (Math.random()*2-1); }
      var noise = ctx.createBufferSource(); noise.buffer = buf;
      var nGain = ctx.createGain();
      var nFilt = ctx.createBiquadFilter();
      nFilt.type = 'lowpass'; nFilt.frequency.value = 140; nFilt.Q.value = 4;
      nGain.gain.setValueAtTime(0.0001, now);
      nGain.gain.linearRampToValueAtTime(0.7, now+0.008);
      nGain.gain.exponentialRampToValueAtTime(0.0001, now+0.55);
      noise.connect(nFilt); nFilt.connect(nGain); nGain.connect(ctx.destination);
      noise.start(now); noise.stop(now+0.6);
      // sharp high click — latch snap
      var click = ctx.createOscillator();
      var cGain = ctx.createGain();
      click.type = 'square'; click.frequency.value = 900;
      cGain.gain.setValueAtTime(0.0001, now);
      cGain.gain.linearRampToValueAtTime(0.35, now+0.004);
      cGain.gain.exponentialRampToValueAtTime(0.0001, now+0.06);
      click.connect(cGain); cGain.connect(ctx.destination);
      click.start(now); click.stop(now+0.07);
      // brief rattle after — frame vibration
      var rattleBuf = ctx.createBuffer(1, Math.floor(ctx.sampleRate*0.2), ctx.sampleRate);
      var rd = rattleBuf.getChannelData(0);
      for(var j=0; j<rd.length; j++){ rd[j] = (Math.random()*2-1); }
      var rattle = ctx.createBufferSource(); rattle.buffer = rattleBuf;
      var rGain = ctx.createGain();
      var rFilt = ctx.createBiquadFilter();
      rFilt.type = 'bandpass'; rFilt.frequency.value = 600; rFilt.Q.value = 3;
      rGain.gain.setValueAtTime(0.0001, now+0.04);
      rGain.gain.linearRampToValueAtTime(0.12, now+0.055);
      rGain.gain.exponentialRampToValueAtTime(0.0001, now+0.22);
      rattle.connect(rFilt); rFilt.connect(rGain); rGain.connect(ctx.destination);
      rattle.start(now+0.04); rattle.stop(now+0.25);
    }catch(e){}
  }

  function mascotSVG(size){
    size = size || 54;
    return '<img src="'+SMILEY_B64+'" width="'+size+'" height="'+size+'" style="object-fit:contain;image-rendering:auto;vertical-align:middle;">';
  }
  function diarySVG(size){
    size = size || 200;
    return '<div style="display:flex;flex-direction:column;align-items:center;gap:6px;">' +
           '<img src="'+DIARY_B64+'" width="'+size+'" height="'+size+'" style="object-fit:contain;image-rendering:auto;">' +
           '<span style="font-family:DSDigital,monospace;font-size:28px;color:#39ff14;letter-spacing:2px;text-shadow:2px 2px 4px #000,0 0 6px #39ff14,0 0 12px #39ff14;">Desktop Diary</span>' +
           '</div>';
  }
  document.getElementById('mascot-slot').innerHTML = diarySVG(180);
  document.getElementById('mascot-slot-2').innerHTML = mascotSVG(44);
  document.querySelectorAll('.ttl-icon').forEach(function(el){ el.innerHTML = mascotSVG(15); });
  document.getElementById('signon-go-icon').innerHTML = mascotSVG(16);

  function iconSVG(name){
    var stroke = 'stroke="#0850d0" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"';
    if(name === 'bulb'){
      return '<svg width="15" height="15" viewBox="0 0 24 24" '+stroke+'><path d="M9 18h6M10 22h4M12 2a6 6 0 00-3.5 10.9c.4.3.5.8.5 1.3V15h6v-.8c0-.5.1-1 .5-1.3A6 6 0 0012 2z"/></svg>';
    }
    if(name === 'clock'){
      return '<svg width="15" height="15" viewBox="0 0 24 24" '+stroke+'><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 3"/></svg>';
    }
    if(name === 'plus'){
      return '<svg width="15" height="15" viewBox="0 0 24 24" '+stroke+'><circle cx="9" cy="8" r="3"/><path d="M2 20c0-3.5 3-6 7-6s7 2.5 7 6"/><path d="M19 8v6M16 11h6"/></svg>';
    }
    if(name === 'send'){
      return '<svg width="15" height="15" viewBox="0 0 24 24" fill="#4a2e00"><path d="M3 11l18-8-8 18-2-8-8-2z"/></svg>';
    }
    if(name === 'calendar'){
      return '<svg width="15" height="15" viewBox="0 0 24 24" '+stroke+'><rect x="3" y="5" width="18" height="16" rx="2"/><path d="M8 3v4M16 3v4M3 10h18"/></svg>';
    }
    if(name === 'photo'){
      return '<svg width="15" height="15" viewBox="0 0 24 24" '+stroke+'><rect x="3" y="4" width="18" height="16" rx="2"/><circle cx="8.5" cy="9.5" r="1.8"/><path d="M4 18l5-5 4 4 3-3 4 4"/></svg>';
    }
    if(name === 'pencil'){
      return '<svg width="13" height="13" viewBox="0 0 24 24" stroke="#666" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"><path d="M12 20h9"/><path d="M16.5 3.5a2.1 2.1 0 013 3L7 19l-4 1 1-4z"/></svg>';
    }
    if(name === 'trash'){
      return '<svg width="13" height="13" viewBox="0 0 24 24" stroke="#b00" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"><path d="M3 6h18"/><path d="M8 6V4h8v2"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6M14 11v6"/></svg>';
    }
    if(name === 'mic'){
      return '<svg width="15" height="15" viewBox="0 0 24 24" '+stroke+'><rect x="9" y="2" width="6" height="12" rx="3"/><path d="M5 11a7 7 0 0014 0"/><path d="M12 18v4M8 22h8"/></svg>';
    }
    return '';
  }

  // ---------------- helpers ----------------
  function uid(){ return 'id' + Math.random().toString(36).slice(2) + Date.now().toString(36); }

  // Simple in-app info/alert — replaces alert() calls (blocked in some sandboxes).
  function openInfoWindow(message){
    var overlay = document.createElement('div');
    overlay.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:999999;display:flex;align-items:center;justify-content:center;';
    var box = document.createElement('div');
    box.style.cssText = 'background:#ece9d8;border:2px solid #0054e3;border-radius:6px;padding:18px 20px;max-width:260px;width:90%;font-size:13px;box-shadow:0 4px 18px rgba(0,0,0,.5);';
    box.innerHTML = '<div style="margin-bottom:14px;">'+escapeHtml(message)+'</div>' +
      '<div style="text-align:right;"><button class="btn" id="ai-ok">OK</button></div>';
    overlay.appendChild(box);
    document.body.appendChild(overlay);
    function close(){ document.body.removeChild(overlay); }
    box.querySelector('#ai-ok').addEventListener('click', close);

  function fmtTime(ts){
    var d = new Date(ts);
    var h = d.getHours(); var m = d.getMinutes();
    var ampm = h >= 12 ? 'PM' : 'AM';
    h = h % 12; if(h === 0) h = 12;
    return h + ':' + (m<10?'0':'') + m + ' ' + ampm;
  }
  function fmtDateShort(ts){
    return new Date(ts).toLocaleDateString(undefined, { month:'short', day:'numeric', year:'numeric' });
  }
  function sameDay(a,b){
    var da = new Date(a), db = new Date(b);
    return da.getFullYear()===db.getFullYear() && da.getMonth()===db.getMonth() && da.getDate()===db.getDate();
  }
  function fmtDayDivider(ts){
    var d = new Date(ts);
    var today = new Date();
    if(sameDay(ts, today.getTime())) return 'Today';
    var yest = new Date(today); yest.setDate(today.getDate()-1);
    if(sameDay(ts, yest.getTime())) return 'Yesterday';
    return d.toLocaleDateString(undefined, { weekday:'long', month:'long', day:'numeric', year:'numeric' });
  }
  function relTime(ts){
    var diff = Date.now() - ts;
    var mins = Math.floor(diff/60000);
    if(mins < 1) return 'just now';
    if(mins < 60) return mins + 'm ago';
    var hrs = Math.floor(mins/60);
    if(hrs < 24) return hrs + 'h ago';
    var days = Math.floor(hrs/24);
    if(days < 7) return days + 'd ago';
    return new Date(ts).toLocaleDateString(undefined,{month:'short', day:'numeric'});
  }
  function lastEntryTs(buddyId){
    var list = (state.entries[buddyId] || []).filter(function(e){ return e.kind !== 'prompt'; });
    if(!list.length) return null;
    return list[list.length-1].ts;
  }
  function statusFor(buddyId){
    var ts = lastEntryTs(buddyId);
    if(ts === null) return 'idle';
    var days = (Date.now()-ts)/86400000;
    if(sameDay(ts, Date.now())) return 'online';
    if(days < 7) return 'away';
    return 'idle';
  }
  function findBuddyByName(name){
    var n = name.trim().toLowerCase();
    for(var i=0;i<state.buddies.length;i++){
      if(state.buddies[i].name.toLowerCase() === n) return state.buddies[i];
    }
    return null;
  }
  function ensureBuddy(name, groupId){
    name = name.trim();
    if(!name) return null;
    var existing = findBuddyByName(name);
    if(existing) return existing;
    var b = { id: uid(), name: name, addedAt: Date.now(), groupId: groupId || 'default' };
    state.buddies.push(b);
    state.entries[b.id] = [];
    return b;
  }

  // conservative sanitizer for rich-text entries: only bold/italic/underline/line-break
  // and color/background-color styling on spans survive; everything else is unwrapped or dropped.
  function sanitizeHTML(html){
    var container = document.createElement('div');
    container.innerHTML = html;
    var allowed = { B:1, I:1, U:1, SPAN:1, BR:1, DIV:1, FONT:1, IMG:1, AUDIO:1 };
    (function clean(node){
      Array.prototype.slice.call(node.childNodes).forEach(function(child){
        if(child.nodeType === 1){
          var tag = child.tagName;
          if(!allowed[tag]){
            while(child.firstChild) node.insertBefore(child.firstChild, child);
            node.removeChild(child);
            return;
          }
          if(tag === 'IMG'){
            var src = child.getAttribute('src') || '';
            var chosenWidth = child.style ? child.style.width : '';
            while(child.attributes && child.attributes.length){ child.removeAttribute(child.attributes[0].name); }
            if(/^data:image\//.test(src)){
              child.setAttribute('src', src);
              var imgStyle = 'max-width:100%;border-radius:4px;';
              if(/^\d+px$/.test(chosenWidth)) imgStyle += 'width:' + chosenWidth + ';';
              child.setAttribute('style', imgStyle);
            } else {
              node.removeChild(child);
              return;
            }
            return; // no children to clean
          }
          if(tag === 'AUDIO'){
            var asrc = child.getAttribute('src') || '';
            while(child.attributes && child.attributes.length){ child.removeAttribute(child.attributes[0].name); }
            if(/^data:audio\//.test(asrc)){
              child.setAttribute('src', asrc);
              child.setAttribute('controls', '');
              child.setAttribute('style', 'max-width:100%;');
            } else {
              node.removeChild(child);
              return;
            }
            return; // no children to clean
          }
          var keepStyle = '';
          if(tag === 'SPAN' && child.style){
            var color = child.style.color, bg = child.style.backgroundColor;
            if(color) keepStyle += 'color:' + color + ';';
            if(bg) keepStyle += 'background-color:' + bg + ';';
          }
          var keepSize = (tag === 'FONT') ? child.getAttribute('size') : null;
          var keepFace = (tag === 'FONT') ? child.getAttribute('face') : null;
          while(child.attributes && child.attributes.length){
            child.removeAttribute(child.attributes[0].name);
          }
          if(keepStyle) child.setAttribute('style', keepStyle);
          if(keepSize) child.setAttribute('size', keepSize);
          if(keepFace) child.setAttribute('face', keepFace);
          clean(child);
        } else if(child.nodeType !== 3){
          node.removeChild(child);
        }
      });
    })(container);
    return container.innerHTML;
  }

  var TASKBAR_H = 34;

  function clampToViewport(x, y, w, h){
    var maxX = Math.max(0, window.innerWidth - w);
    var maxY = Math.max(0, window.innerHeight - TASKBAR_H - h);
    return { x: Math.min(Math.max(0, x), maxX), y: Math.min(Math.max(0, y), maxY) };
  }

  function createWindow(opts){
    // opts: title, bodyHtml, onMount(el), extraClass, type, buddyId
    var id = uid();
    var el = document.createElement('div');
    el.className = 'win ' + (opts.extraClass || '');
    el.style.visibility = 'hidden';
    el.style.zIndex = ++zCounter;

    el.innerHTML =
      '<div class="titlebar">' +
        '<span class="t-title">' + mascotSVG(15) + '<span>' + escapeHtml(opts.title) + '</span></span>' +
        '<span class="t-btns"><button class="win-btn max-btn" title="Maximize">&#9723;</button><button class="win-btn close-btn">X</button></span>' +
      '</div>' +
      (opts.menuHtml || '') +
      opts.bodyHtml;

    document.getElementById('windows-layer').appendChild(el);

    // position after layout so we know the real (CSS-driven) size
    var w = el.offsetWidth, h = el.offsetHeight;
    var pos;
    if(isMobile()){
      pos = clampToViewport((window.innerWidth - w) / 2, (window.innerHeight - TASKBAR_H - h) / 2, w, h);
    } else {
      winCounter++;
      var offset = (winCounter % 8) * 22;
      pos = clampToViewport(40 + offset, 40 + offset, w, h);
    }
    el.style.left = pos.x + 'px';
    el.style.top = pos.y + 'px';
    el.style.visibility = 'visible';

    var record = { id: id, el: el, type: opts.type, buddyId: opts.buddyId, maximized: false, prevRect: null };
    openWindows.push(record);
    addTaskbarItem(record, opts.title);

    el.querySelector('.close-btn').addEventListener('click', function(){ closeWindow(id); });
    el.querySelector('.max-btn').addEventListener('click', function(e){
      e.stopPropagation();
      toggleMaximize(record);
    });
    el.addEventListener('mousedown', function(){ focusWindow(id); });
    el.addEventListener('touchstart', function(){ focusWindow(id); }, { passive: true });
    makeDraggable(el, el.querySelector('.titlebar'));
    focusWindow(id);

    if(opts.onMount) opts.onMount(el, id);
    return { id: id, el: el };
  }

  function makeDraggable(winEl, handleEl){
    var dragging = false, offX = 0, offY = 0;

    function moveTo(clientX, clientY){
      var x = clientX - offX, y = clientY - offY;
      var clamped = clampToViewport(x, y, winEl.offsetWidth, winEl.offsetHeight);
      winEl.style.left = clamped.x + 'px';
      winEl.style.top = clamped.y + 'px';
    }

    // mouse (desktop / trackpad)
    handleEl.addEventListener('mousedown', function(e){
      dragging = true;
      offX = e.clientX - winEl.offsetLeft;
      offY = e.clientY - winEl.offsetTop;
      e.preventDefault();
    });
    document.addEventListener('mousemove', function(e){
      if(!dragging) return;
      moveTo(e.clientX, e.clientY);
    });
    document.addEventListener('mouseup', function(){ dragging = false; });

    // touch (mobile)
    handleEl.addEventListener('touchstart', function(e){
      var t = e.touches[0];
      dragging = true;
      offX = t.clientX - winEl.offsetLeft;
      offY = t.clientY - winEl.offsetTop;
    }, { passive: true });
    handleEl.addEventListener('touchmove', function(e){
      if(!dragging) return;
      var t = e.touches[0];
      moveTo(t.clientX, t.clientY);
      e.preventDefault();
    }, { passive: false });
    handleEl.addEventListener('touchend', function(){ dragging = false; });
  }

  // expands %t, %d when the user finishes a token (types a space).
  // Operates on the text node at the caret so existing formatting/images are untouched.
  function handleTokenExpansion(target){
    var sel = window.getSelection();
    if(!sel || !sel.rangeCount) return;
    var node = sel.anchorNode;
    if(!node || node.nodeType !== 3) return; // only within a text node
    var text = node.nodeValue;
    var caret = sel.anchorOffset;
    var before = text.slice(0, caret);
    var m = before.match(/%(t|d)\s$/i);
    if(!m) return;
    var token = m[0].trim().toLowerCase();
    var val;
    if(token === '%t') val = fmtTime(Date.now());
    else if(token === '%d') val = fmtDateShort(Date.now());
    else return;
    var start = caret - m[0].length;
    node.nodeValue = text.slice(0, start) + val + ' ' + text.slice(caret);
    var newCaret = start + val.length + 1;
    var range = document.createRange();
    range.setStart(node, Math.min(newCaret, node.nodeValue.length));
    range.collapse(true);
    sel.removeAllRanges(); sel.addRange(range);
  }

  function insertImageFile(target, file, savedRange){
    if(!file) return;
    var reader = new FileReader();
    reader.onload = function(e){
      var img = new Image();
      img.onload = function(){
        var maxDim = 720; // stored resolution — larger than the default preview size
        var w = img.width, h = img.height;
        if(w > maxDim || h > maxDim){
          if(w >= h){ h = Math.round(h * maxDim / w); w = maxDim; }
          else { w = Math.round(w * maxDim / h); h = maxDim; }
        }
        var canvas = document.createElement('canvas');
        canvas.width = w; canvas.height = h;
        canvas.getContext('2d').drawImage(img, 0, 0, w, h);
        var dataUrl = canvas.toDataURL('image/jpeg', 0.78);
        target.focus();
        if(savedRange){
          var sel = window.getSelection(); sel.removeAllRanges(); sel.addRange(savedRange);
        }
        document.execCommand('insertHTML', false, '<img src="'+dataUrl+'" style="width:220px;max-width:100%;border-radius:4px;">');
      };
      img.src = e.target.result;
    };
    reader.readAsDataURL(file);
  }

  function startVoiceRecording(target, anchorEl){
    if(!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia || typeof MediaRecorder === 'undefined'){
      openInfoWindow('Voice recording isn\'t supported in this browser.');
      return;
    }
    navigator.mediaDevices.getUserMedia({ audio: true }).then(function(stream){
      var widget = document.createElement('div');
      widget.className = 'voice-rec-widget';
      widget.innerHTML = '<span class="vr-dot"></span><span class="vr-time">0:00 / 0:10</span><button class="vr-stop">Stop</button><button class="vr-cancel">&times;</button>';
      document.body.appendChild(widget);
      var rect = (anchorEl || target).getBoundingClientRect();
      widget.style.left = Math.max(4, Math.min(window.innerWidth - 160, rect.left)) + 'px';
      widget.style.top = Math.max(4, rect.top - 36) + 'px';

      var MAX_SECONDS = 10;
      var chunks = [];
      var recorder;
      try{ recorder = new MediaRecorder(stream); }
      catch(e){ openInfoWindow('Could not start recording.'); stream.getTracks().forEach(function(t){ t.stop(); }); widget.remove(); return; }
      recorder.ondataavailable = function(e){ if(e.data && e.data.size > 0) chunks.push(e.data); };

      var startedAt = Date.now();
      var timerInt = setInterval(function(){
        var secs = Math.floor((Date.now() - startedAt) / 1000);
        var mm = Math.floor(secs / 60), ss = secs % 60;
        widget.querySelector('.vr-time').textContent = mm + ':' + (ss < 10 ? '0' : '') + ss + ' / 0:10';
        if(secs >= MAX_SECONDS && recorder.state === 'recording'){ recorder.stop(); }
      }, 250);

      var cancelled = false;
      function cleanup(){
        clearInterval(timerInt);
        stream.getTracks().forEach(function(t){ t.stop(); });
        widget.remove();
      }
      recorder.onstop = function(){
        if(cancelled){ cleanup(); return; }
        var blob = new Blob(chunks, { type: recorder.mimeType || 'audio/webm' });
        cleanup();
        if(blob.size === 0) return;
        var reader = new FileReader();
        reader.onload = function(e){ insertAudioIntoTarget(target, e.target.result); };
        reader.readAsDataURL(blob);
      };
      widget.querySelector('.vr-stop').addEventListener('click', function(){ recorder.stop(); });
      widget.querySelector('.vr-cancel').addEventListener('click', function(){ cancelled = true; recorder.stop(); });
      recorder.start();
    }).catch(function(err){
      openInfoWindow('Could not access the microphone: ' + (err && err.message ? err.message : err));
    });
  }

  function wireRichToolbar(scopeEl, targetId){
    var target = scopeEl.querySelector('#'+targetId);
    var savedRange = null;
    function saveSelection(){
      var sel = window.getSelection();
      if(sel && sel.rangeCount > 0 && sel.anchorNode && target.contains(sel.anchorNode)){
        savedRange = sel.getRangeAt(0).cloneRange();
      }
    }
    function restore(){
      target.focus();
      if(savedRange){
        var sel = window.getSelection(); sel.removeAllRanges(); sel.addRange(savedRange);
        return;
      }
      if(!target.firstChild){
        // box genuinely empty: create a real (invisible) anchor character and
        // SELECT it — not just collapse past it — so clicking Bold, Italic,
        // and Underline in a row before typing anything all actually apply
        // and combine, instead of only the last click sticking.
        var marker = document.createTextNode('\u200b');
        target.appendChild(marker);
        var range0 = document.createRange();
        range0.selectNodeContents(marker);
        var sel0 = window.getSelection();
        sel0.removeAllRanges();
        sel0.addRange(range0);
        return;
      }
      // box has existing content but selection was lost (e.g. a native
      // color/select picker stole focus) — place the caret at the very end,
      // nested inside the last element, so continuing formatting doesn't
      // reset color/size back to default.
      var node = target;
      while(node.lastChild) node = node.lastChild;
      var range = document.createRange();
      if(node.nodeType === 3){
        range.setStart(node, node.nodeValue.length);
      } else {
        range.selectNodeContents(node);
      }
      range.collapse(true);
      var sel2 = window.getSelection();
      sel2.removeAllRanges();
      sel2.addRange(range);
    }
    function updateToolbarState(){
      ['bold','italic','underline'].forEach(function(cmd){
        var btn = scopeEl.querySelector('.rich-toolbar button[data-cmd="'+cmd+'"]');
        if(!btn) return;
        var isActive = false;
        try{ isActive = document.queryCommandState(cmd); } catch(e){}
        btn.classList.toggle('active', isActive);
      });
    }
    scopeEl.querySelectorAll('.rich-toolbar button[data-cmd]').forEach(function(btn){
      btn.addEventListener('mousedown', function(e){ e.preventDefault(); saveSelection(); });
      btn.addEventListener('click', function(){
        restore();
        document.execCommand(btn.getAttribute('data-cmd'), false, null);
        updateToolbarState();
      });
    });
    var fontSel = scopeEl.querySelector('.rich-font');
    if(fontSel){
      fontSel.addEventListener('mousedown', saveSelection);
      fontSel.addEventListener('change', function(){ restore(); document.execCommand('fontName', false, fontSel.value); });
    }
    var sizeSel = scopeEl.querySelector('.rich-size');
    if(sizeSel){
      sizeSel.addEventListener('mousedown', saveSelection);
      sizeSel.addEventListener('change', function(){ restore(); document.execCommand('fontSize', false, sizeSel.value); });
    }
    scopeEl.querySelectorAll('.rich-swatch input[data-cmd]').forEach(function(inp){
      inp.addEventListener('mousedown', saveSelection);
      inp.addEventListener('input', function(){
        restore();
        var cmd = inp.getAttribute('data-cmd');
        if(cmd === 'hiliteColor'){
          // Safari doesn't support hiliteColor and often fails *silently*
          // (no thrown error), so a try/catch fallback never actually runs.
          // Check real support first and use backColor directly when needed.
          var supportsHilite = false;
          try{ supportsHilite = document.queryCommandSupported('hiliteColor'); } catch(e){}
          try{ document.execCommand(supportsHilite ? 'hiliteColor' : 'backColor', false, inp.value); } catch(e){}
        } else {
          try{ document.execCommand(cmd, false, inp.value); } catch(e){}
        }
        var swatch = inp.closest('.rich-swatch');
        if(swatch){
          if(swatch.classList.contains('hl') || swatch.classList.contains('bg')){
            swatch.style.background = inp.value;
          } else {
            var span = swatch.querySelector('span');
            if(span) span.style.color = inp.value;
          }
        }
      });
    });
    // live token expansion (fires after a token + space is typed)
    target.addEventListener('keyup', function(e){
      if(e.key === ' ' || e.code === 'Space' || e.key === 'Spacebar'){
        handleTokenExpansion(target);
      }
      updateToolbarState();
    });
    target.addEventListener('mouseup', updateToolbarState);
    target.addEventListener('click', updateToolbarState);
    // continuously track the live selection while the box is focused, so
    // controls that steal focus (native <select>, <input type=color>) still
    // have the correct selection to apply formatting to — this is what was
    // breaking the size dropdown.
    document.addEventListener('selectionchange', function(){
      if(document.activeElement === target){
        updateToolbarState();
        saveSelection();
      }
    });
    attachImageResize(target);
    // expose a photo-insert hook for the Insert menu
    target._insertPhoto = function(){
      saveSelection();
      var picker = document.createElement('input');
      picker.type = 'file'; picker.accept = 'image/*';
      picker.style.display = 'none';
      document.body.appendChild(picker);
      picker.addEventListener('change', function(){
        if(picker.files && picker.files[0]) insertImageFile(target, picker.files[0], savedRange);
        picker.remove();
      });
      picker.click();
    };
    target._saveSelection = saveSelection;
    target._restore = restore;
  }

    createWindow({

      onMount: function(el, id){
        renderLog(buddyId);

        var sendLabel = el.querySelector('#send-label-'+buddyId);
        var logEl = el.querySelector('#log-'+buddyId);

        var lockCheckbox = el.querySelector('#edit-lock-'+buddyId);
        function startEdit(entry){
          editingEntryId = entry.id;
          input.innerHTML = entry.html !== undefined ? entry.html : escapeHtml(entry.text || '');
          if(lockCheckbox) lockCheckbox.checked = !!entry.locked;
          input.focus();

                if(editingEntryId === entryId) cancelEdit();
                saveState();
                renderLog(buddyId);
                renderStats(buddyId);
                renderBuddyList();
              });
            }
            if(entry.locked){

            saveState();
            renderLog(buddyId);
            renderStats(buddyId);
            renderBuddyList();
            playDing();
          } else {
            sendFromIM(buddyId);
          }
        }

        el.querySelector('#send-'+buddyId).addEventListener('click', handleSendOrSave);
        input.addEventListener('keydown', function(e){
          if(e.key === 'Enter' && !e.shiftKey && !isMobile()){
            e.preventDefault();
            handleSendOrSave();
          }
        });

        el.querySelector('#prompt-'+buddyId).addEventListener('click', function(){
          insertPromptMessage(buddyId);
        });
        el.querySelector('#photo-'+buddyId).addEventListener('click', function(){
          input._insertPhoto && input._insertPhoto();
        });
        el.querySelector('#voice-'+buddyId).addEventListener('click', function(){
          startVoiceRecording(input, el.querySelector('#voice-'+buddyId));
        });

        el.querySelector('.mi-close').addEventListener('click', function(){ closeWindow(id); });

        el.querySelector('.mi-search').addEventListener('click', function(){
          appTextPrompt('Search this conversation (blank to clear)', searchQueryByBuddy[buddyId] || '', function(q){
            if(q === null) return;
            searchQueryByBuddy[buddyId] = q.trim();
            renderLog(buddyId);
          });
        });
        el.querySelector('.mi-export').addEventListener('click', function(){
          exportConversation(buddyId, buddy.name);
        });

        el.querySelector('.mi-filter-photo').addEventListener('click', function(){ toggleFilterForBuddy(buddyId, 'photo', el); });
        el.querySelector('.mi-filter-voice').addEventListener('click', function(){ toggleFilterForBuddy(buddyId, 'voice', el); });
        el.querySelector('.mi-filter-prompt').addEventListener('click', function(){ toggleFilterForBuddy(buddyId, 'prompt', el); });

        el.querySelector('.mi-editdraft').addEventListener('click', function(){
          openDraftsListWindowFor(buddyId, buddy.name, function(html){
            if(editingEntryId) cancelEdit();
            input.innerHTML = html;
            input.focus();
          }, buddy.name);
        });
        el.querySelector('.mi-clear').addEventListener('click', function(){ cancelEdit(); });
        el.querySelector('.mi-ts').addEventListener('click', function(){ appendPlainText(input, (isRichEmpty(input)?'':' ') + fmtTime(Date.now()) + ' '); });
        el.querySelector('.mi-date').addEventListener('click', function(){ appendPlainText(input, (isRichEmpty(input)?'':' ') + fmtDateShort(Date.now()) + ' '); });

        el.querySelector('.draft-save-link-'+buddyId).addEventListener('click', function(){
          if(isRichEmpty(input)){ openInfoWindow('Nothing to save \u2014 the compose box is empty.'); return; }
          saveDraftFor(buddyId, sanitizeHTML(input.innerHTML));
          openInfoWindow('Draft saved. Use View \u2192 Drafts to see everything you\'ve saved.');
        });

        refreshLogMenuLabels(buddyId, el);
      }
    });
  }

  function renderStats(buddyId){
    var el = document.getElementById('stats-'+buddyId);
    if(!el) return;
    var count = (state.entries[buddyId] || []).filter(function(e){ return e.kind !== 'prompt'; }).length;
    el.textContent = count + (count === 1 ? ' entry' : ' entries') + ' so far';
  }

  function refreshLogMenuLabels(buddyId, el){
    if(!el) return;
    var filter = logFilterByBuddy[buddyId] || null;
    ['photo','voice','prompt'].forEach(function(type){
      var item = el.querySelector('.mi-filter-'+type);
      if(item) item.classList.toggle('mi-active', filter === type);
    });
  }

  function toggleFilterForBuddy(buddyId, type, el){
    logFilterByBuddy[buddyId] = (logFilterByBuddy[buddyId] === type) ? null : type;
    refreshLogMenuLabels(buddyId, el);
    renderLog(buddyId);
  }

  function stripHtmlTags(html){
    var div = document.createElement('div');
    div.innerHTML = html || '';
    return div.textContent || '';
  }

  // Generic draft log, usable by any rich-text compose box (IM entries, new messages,
  // status edits, blog posts). `key` is a buddyId or a fixed scope like '__blog__'.
  function saveDraftFor(key, html, recipient){
    if(!html || !stripHtmlTags(html).trim()) return false;
    state.drafts[key] = state.drafts[key] || [];
    var draft = { id: uid(), html: html, ts: Date.now() };
    if(recipient) draft.recipient = recipient;
    state.drafts[key].push(draft);
    saveState();
    return true;
  }

  function openDraftsListWindowFor(key, scopeLabel, onLoad, impliedRecipient){
    function buildRows(){
      var list = (state.drafts[key] || []).slice().sort(function(a,b){ return b.ts - a.ts; });
      if(!list.length) return '<div class="bl-empty">No saved drafts yet.</div>';
      return list.map(function(d){
        var preview = stripHtmlTags(d.html).trim();
        if(preview.length > 80) preview = preview.slice(0, 80) + '\u2026';
        var recipient = impliedRecipient || d.recipient || null;
        var recipientHtml = recipient ? '<div class="draft-recipient">To: ' + escapeHtml(recipient) + '</div>' : '';
        return '<div class="status-log-row" data-draft-id="'+escapeHtml(d.id)+'">' +
          '<div class="slr-ts">' + fmtDayDivider(d.ts) + ' &middot; ' + fmtTime(d.ts) +
            '<span class="sl-actions"><span class="sl-edit" title="Load">&#9998;</span><span class="sl-del" title="Delete">&#10005;</span></span>' +
          '</div>' +
          recipientHtml +
          '<div class="sl-status-label">' + (escapeHtml(preview) || '<i>(empty)</i>') + '</div>' +
        '</div>';
      }).join('');
    }
    createWindow({
      title: 'Drafts' + (scopeLabel ? ' \u2014 ' + scopeLabel : ''),
      extraClass: 'help-win',
      bodyHtml: '<div class="win-body" id="drafts-body-wrap">' + buildRows() + '</div>',
      type: 'drafts',
      onMount: function(dEl, dId){
        function wireDraftActions(){
          dEl.querySelectorAll('.sl-edit').forEach(function(btn){
            btn.onclick = function(){
              var row = btn.closest('[data-draft-id]');
              var draftId = row && row.getAttribute('data-draft-id');
              var draft = (state.drafts[key] || []).find(function(d){ return d.id === draftId; });
              if(!draft) return;
              onLoad(draft.html);
              closeWindow(dId);
            };
          });
          dEl.querySelectorAll('.sl-del').forEach(function(btn){
            btn.onclick = function(){
              var row = btn.closest('[data-draft-id]');
              var draftId = row && row.getAttribute('data-draft-id');
              appConfirm('Delete this saved draft?', function(confirmed){
                if(!confirmed) return;
                state.drafts[key] = (state.drafts[key] || []).filter(function(d){ return d.id !== draftId; });
                saveState();
                dEl.querySelector('#drafts-body-wrap').innerHTML = buildRows();
                wireDraftActions();
              });
            };
          });
        }
        wireDraftActions();
      }
    });
  }

  // ================= ALL DRAFTS WINDOW (grouped by type: status, blog, messages) =================
  function openAllDraftsWindow(){
    function rowsFor(key, impliedRecipient){
      var list = (state.drafts[key] || []).slice().sort(function(a,b){ return b.ts - a.ts; });
      return list.map(function(d){
        var preview = stripHtmlTags(d.html).trim();
        if(preview.length > 70) preview = preview.slice(0, 70) + '\u2026';
        var recipient = impliedRecipient || d.recipient || null;
        var recipientHtml = recipient ? '<div class="draft-recipient">To: ' + escapeHtml(recipient) + '</div>' : '';
        return '<div class="status-log-row" data-draft-key="'+escapeHtml(key)+'" data-draft-id="'+escapeHtml(d.id)+'">' +
          '<div class="slr-ts">' + fmtDayDivider(d.ts) + ' &middot; ' + fmtTime(d.ts) +
            '<span class="sl-actions"><span class="sl-edit" title="Load">&#9998;</span><span class="sl-del" title="Delete">&#10005;</span></span>' +
          '</div>' +
          recipientHtml +
          '<div class="sl-status-label">' + (escapeHtml(preview) || '<i>(empty)</i>') + '</div>' +
        '</div>';
      }).join('');
    }
    function sectionHeader(label){
      return '<div style="font-weight:bold;padding:6px 8px 2px;border-bottom:1px solid #ccc;margin-top:6px;">' + escapeHtml(label) + '</div>';
    }
    function subHeader(label){
      return '<div style="font-size:11px;color:#555;padding:4px 8px 0;">' + escapeHtml(label) + '</div>';
    }
    function buildBody(){
      var blogRows = rowsFor('__blog__');
      var msgHtml = '';
      var nmRows = rowsFor('__newmessage__');
      if(nmRows) msgHtml += subHeader('New Message') + nmRows;
      state.buddies.forEach(function(b){
        var rows = rowsFor(b.id, b.name);
        if(rows) msgHtml += subHeader(b.name) + rows;
      });
      var html = '';
      html += sectionHeader('Posts') + (blogRows || '<div class="bl-empty">No post drafts.</div>');
      html += sectionHeader('Messages') + (msgHtml || '<div class="bl-empty">No message drafts.</div>');
      return html;
    }
    createWindow({
      title: 'Drafts',
      extraClass: 'help-win',
      bodyHtml: '<div class="win-body" id="alldrafts-body-wrap">' + buildBody() + '</div>',
      type: 'alldrafts',
      onMount: function(el, id){
        function wireActions(){
          el.querySelectorAll('.sl-edit').forEach(function(btn){
            btn.onclick = function(){
              var row = btn.closest('[data-draft-id]');
              var key = row && row.getAttribute('data-draft-key');
              var draftId = row && row.getAttribute('data-draft-id');
              var draft = (state.drafts[key] || []).find(function(d){ return d.id === draftId; });
              if(!draft) return;
              closeWindow(id);
              if(key === '__status__'){
                openEditStatusEntryWindow(null, null, draft.html);
              } else if(key === '__blog__'){
                openBlogPostEditor(null, null, draft.html);
              } else if(key === '__newmessage__'){
                openNewMessageWindow();
                var composeEl = document.getElementById('nm-body');
                if(composeEl) composeEl.innerHTML = draft.html;
              } else {
                openIMWindow(key);
                var input = document.getElementById('input-'+key);
                if(input) input.innerHTML = draft.html;
              }
            };
          });
          el.querySelectorAll('.sl-del').forEach(function(btn){
            btn.onclick = function(){
              var row = btn.closest('[data-draft-id]');
              var key = row && row.getAttribute('data-draft-key');
              var draftId = row && row.getAttribute('data-draft-id');
              appConfirm('Delete this saved draft?', function(confirmed){
                if(!confirmed) return;
                state.drafts[key] = (state.drafts[key] || []).filter(function(d){ return d.id !== draftId; });
                saveState();
                el.querySelector('#alldrafts-body-wrap').innerHTML = buildBody();
                wireActions();
              });
            };
          });
        }
        wireActions();
      }
    });
  }

  function entryMatchesTypeFilter(entry, filter){
    if(!filter) return true;
    var content = (entry.html !== undefined) ? entry.html : (entry.text || '');
    if(filter === 'photo') return /<img/i.test(content);
    if(filter === 'voice') return /<audio/i.test(content);
    if(filter === 'prompt') return entry.kind === 'prompt';
    return true;
  }

  function entryMatchesSearch(entry, query){
    if(!query) return true;
    var content = (entry.html !== undefined) ? entry.html : (entry.text || '');
    var haystack = stripHtmlTags(content).toLowerCase() + ' ' + (entry.statusLabel || '').toLowerCase();
    return haystack.indexOf(query.toLowerCase()) !== -1;
  }

  function exportConversation(buddyId, buddyName){
    var fullList = state.entries[buddyId] || [];
    var lockedCount = fullList.filter(function(e){ return e.locked; }).length;

    function proceed(includeLocked){
      var list = fullList.filter(function(e){ return includeLocked || !e.locked; });
      if(!list.length){ openInfoWindow('Nothing to export yet.'); return; }
      generateConversationPDF(list, buddyName);
    }

    if(lockedCount > 0){
      appConfirm('This conversation has ' + lockedCount + ' locked ' + (lockedCount === 1 ? 'entry' : 'entries') + '. Include ' + (lockedCount === 1 ? 'it' : 'them') + ' in the export?', function(includeYes){
        if(includeYes){
          appPasscodePrompt(function(ok){ proceed(!!ok); });
        } else {
          proceed(false);
        }
      });
    } else {
      proceed(false);
    }
  }

  function generateConversationPDF(list, buddyName){
    var entriesHtml = list.map(function(e){
      var sender = e.kind === 'prompt' ? 'Prompt' : (e.author || state.account.screenName);
      var content = (e.html !== undefined) ? e.html : escapeHtml(e.text || '');
      return '<div style="margin-bottom:14px;padding-bottom:10px;border-bottom:1px solid #ddd;">' +
        '<div style="font-size:11px;color:#666;margin-bottom:4px;"><b>' + escapeHtml(sender) + '</b> &middot; ' + fmtDayDivider(e.ts) + ' ' + fmtTime(e.ts) + '</div>' +
        '<div style="font-size:14px;line-height:1.5;">' + content + '</div>' +
      '</div>';
    }).join('');

    var printHtml =
      '<!DOCTYPE html><html><head><meta charset="utf-8"><title>' + escapeHtml(buddyName) + ' Export</title>' +
      '<style>' +
        'body{font-family:Georgia,serif;padding:24px;color:#222;}' +
        'h1{font-size:20px;margin:0 0 2px;}' +
        '.meta{font-size:11px;color:#888;margin-bottom:20px;}' +
        'img{max-width:100%;}' +
        '@media print{ body{padding:0;} }' +
      '</style>' +
      '</head><body>' +
        '<h1>' + escapeHtml(buddyName) + '</h1>' +
        '<div class="meta">Exported ' + escapeHtml(new Date().toLocaleString()) + '</div>' +
        entriesHtml +
      '</body></html>';

    var iframe = document.createElement('iframe');
    iframe.style.cssText = 'position:fixed;right:0;bottom:0;width:0;height:0;border:0;';
    document.body.appendChild(iframe);
    var doc = iframe.contentWindow.document;
    doc.open();
    doc.write(printHtml);
    doc.close();

    function cleanup(){ if(iframe.parentNode) iframe.parentNode.removeChild(iframe); }
    iframe.onload = function(){
      iframe.contentWindow.focus();
      iframe.contentWindow.print();
    };
    try{ iframe.contentWindow.addEventListener('afterprint', cleanup); }catch(e){}
    setTimeout(cleanup, 60000);
  }

  function renderLog(buddyId){
    var el = document.getElementById('log-'+buddyId);
    if(!el) return;
    var fullList = state.entries[buddyId] || [];
    var typeFilter = logFilterByBuddy[buddyId] || null;
    var query = searchQueryByBuddy[buddyId] || '';
    var list = fullList.filter(function(e){
      if(!entryMatchesTypeFilter(e, typeFilter)) return false;
      if(!entryMatchesSearch(e, query)) return false;
      return true;
    });
    var html = '';
    var lastDay = null;
    list.forEach(function(entry){
      var divider = fmtDayDivider(entry.ts);
      if(divider !== lastDay){
        html += '<div class="im-day-divider">&mdash; ' + divider + ' &mdash;</div>';
        lastDay = divider;
      }
      var isPrompt = entry.kind === 'prompt';
      var sender = isPrompt ? 'Prompt' : escapeHtml(entry.author || state.account.screenName);
      var content = (entry.html !== undefined) ? entry.html : escapeHtml(entry.text || '');
      var statusTag = entry.statusLabel !== undefined
        ? ('<span class="status-tag">Status' + (entry.statusLabel ? ': ' + escapeHtml(entry.statusLabel) : '') + '</span><br>')
        : '';
      var txtStyle = entry.bg ? (' style="background:' + escapeHtml(entry.bg) + '; padding:4px 6px; border-radius:4px;"') : '';
      html += '<div class="im-entry' + (isPrompt ? ' prompt-entry' : '') + '" data-entry-id="' + entry.id + '">' +
                '<span class="who' + (isPrompt ? ' prompt-who' : '') + '">' + sender + '</span> ' +
                '<span class="ts">(' + fmtTime(entry.ts) + '):</span> ' +
                '<span class="entry-actions">' +
                  '<span class="entry-action" data-action="edit">' + iconSVG('pencil') + '</span>' +
                  '<span class="entry-action" data-action="delete">' + iconSVG('trash') + '</span>' +
                '</span>' +
                (entry.locked
                  ? '<div class="txt locked-content"' + txtStyle + '>' + statusTag + content + '</div>'
                  : '<div class="txt"' + txtStyle + '>' + statusTag + content + '</div>') +
              '</div>';
    });
    if(!list.length){
      html = '<div class="im-day-divider">No entries yet &mdash; write the first one below.</div>';
    }
    el.innerHTML = html;
    el.scrollTop = el.scrollHeight;
  }

  function sendFromIM(buddyId){
    var input = document.getElementById('input-'+buddyId);
    if(!input) return;
    if(isRichEmpty(input)) return;
    var html = sanitizeHTML(input.innerHTML);
    var entry = { id: uid(), html: html, ts: Date.now(), kind: 'entry', author: state.account.screenName };
    state.entries[buddyId] = state.entries[buddyId] || [];
    state.entries[buddyId].push(entry);
    saveState();
    input.innerHTML = '';
    renderLog(buddyId);
    renderStats(buddyId);
    renderBuddyList();
    playDing();
  }

  function insertPromptMessage(buddyId){
    var p = WRITING_PROMPTS[Math.floor(Math.random()*WRITING_PROMPTS.length)];
    state.entries[buddyId] = state.entries[buddyId] || [];
    state.entries[buddyId].push({ id: uid(), html: escapeHtml(p), ts: Date.now(), kind: 'prompt', author: state.account.screenName });
    saveState();
    renderLog(buddyId);
    renderStats(buddyId);
  }

  // ================= NEW MESSAGE WINDOW =================

    var prefillMatch = prefillName ? findBuddyByName(prefillName) : null;
    var body =
      '<div class="win-body nm-body">' +
        '<div class="nm-row"><label>To:</label><select id="nm-to-select">' +

        richComposeHtml('nm-body', '') +
        '<div class="im-action-row" style="justify-content:flex-start;">' +
          '<button class="action-btn" title="Insert photo" id="nm-photo-btn">'+iconSVG('photo')+'<span>Photo</span></button>' +
          '<button class="action-btn" title="Record a voice note" id="nm-voice-btn">'+iconSVG('mic')+'<span>Voice</span></button>' +
        '</div>' +
        '<div class="pct-key" style="display:flex;justify-content:space-between;align-items:center;">' +
          '<span><span class="nm-ins-ts" style="cursor:pointer;text-decoration:underline;">%t = time</span> &nbsp; <span class="nm-ins-date" style="cursor:pointer;text-decoration:underline;">%d = date</span></span>' +
          '<span class="draft-save-link" style="color:#0850d0;text-decoration:underline;cursor:pointer;">Save Draft</span>' +
        '</div>' +
        '<div class="nm-send-row"><button class="btn" id="nm-send">Send</button></div>' +
      '</div>';

    createWindow({
      title: 'Send Message',
      extraClass: 'nm-win',
      bodyHtml: body,
      type: 'newmsg',
      onMount: function(el, id){
        wireRichToolbar(el, 'nm-body');
        var composeEl = el.querySelector('#nm-body');
        composeEl.focus();
        var toSelect = el.querySelector('#nm-to-select');
        var newRow = el.querySelector('#nm-newbuddy-row');
        var newInput = el.querySelector('#nm-to-new');

        if(prefillMatch){
          toSelect.value = prefillMatch.id;
        } else if(prefillName){
          toSelect.value = '__new__';
          newRow.style.display = 'flex';
        }
        toSelect.addEventListener('change', function(){
          newRow.style.display = (toSelect.value === '__new__') ? 'flex' : 'none';
        });

        el.querySelector('#nm-photo-btn').addEventListener('click', function(){ composeEl._insertPhoto && composeEl._insertPhoto(); });
        el.querySelector('#nm-voice-btn').addEventListener('click', function(){ startVoiceRecording(composeEl, el.querySelector('#nm-voice-btn')); });
        el.querySelector('.nm-ins-ts').addEventListener('click', function(){ appendPlainText(composeEl, (isRichEmpty(composeEl)?'':' ') + fmtTime(Date.now()) + ' '); });
        el.querySelector('.nm-ins-date').addEventListener('click', function(){ appendPlainText(composeEl, (isRichEmpty(composeEl)?'':' ') + fmtDateShort(Date.now()) + ' '); });
        el.querySelector('#nm-send').addEventListener('click', function(){
          var buddy = null;
          if(toSelect.value === '__new__'){
            var newName = newInput.value.trim();
            if(!newName){ newInput.focus(); return; }
            buddy = ensureBuddy(newName);
          } else if(toSelect.value){
            buddy = state.buddies.find(function(b){ return b.id === toSelect.value; });
          }
          if(!buddy){ toSelect.focus(); return; }
          if(isRichEmpty(composeEl)) { composeEl.focus(); return; }
          var html = sanitizeHTML(composeEl.innerHTML);
          state.entries[buddy.id] = state.entries[buddy.id] || [];
          state.entries[buddy.id].push({ id: uid(), html: html, ts: Date.now(), kind: 'entry', author: state.account.screenName });
          saveState();
          playDing();
          renderBuddyList();
          closeWindow(id);
          openIMWindow(buddy.id);
        });

        el.querySelector('.draft-save-link').addEventListener('click', function(){
          if(isRichEmpty(composeEl)){ openInfoWindow('Nothing to save \u2014 the compose box is empty.'); return; }
          var recipientName = null;
          if(toSelect.value === '__new__'){
            recipientName = newInput.value.trim() || null;
          } else if(toSelect.value){
            var b = state.buddies.find(function(x){ return x.id === toSelect.value; });
            recipientName = b ? b.name : null;
          }
          saveDraftFor('__newmessage__', sanitizeHTML(composeEl.innerHTML), recipientName);
          openInfoWindow('Draft saved. Find it later under Edit \u2192 Drafts on the Buddy List.');
        });
      }
    });
  }
