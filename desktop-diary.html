  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html {
    -webkit-text-size-adjust: 100%; text-size-adjust: 100%;
    touch-action: manipulation;
  }
  html, body {
    margin: 0; padding: 0; width: 100%; height: 100%;
    font-family: Tahoma, "Segoe UI", Arial, sans-serif;
    background: #000;
    overflow: hidden;
    position: fixed;
    overscroll-behavior: none;
    -webkit-user-select: none; user-select: none;
  }
  #desktop {
    position: relative; width: 100%; height: 100vh; height: 100dvh;
    overflow: hidden;
    background: #000;
  }

  /* ---------- XP Luna window chrome ---------- */
  .win {
    position: absolute;
    background: #ece9d8;
    border: 1px solid #0054e3;
    border-radius: 8px;
    box-shadow: 2px 3px 12px rgba(0,0,0,.45);
    font-size: 12px;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .titlebar {
    background: linear-gradient(var(--th-title-angle,180deg),var(--th-title-1) 0%,var(--th-title-2) 16%,var(--th-title-3) 33%,var(--th-title-4) 50%,var(--th-title-5) 66%,var(--th-title-6) 83%,var(--th-title-7) 100%);
    color: var(--th-font-color,#fff);
    font-weight: bold;
    font-size: 13px;
    padding: 5px 4px 5px 9px;
    display: flex; justify-content: space-between; align-items: center;
    cursor: move;
    letter-spacing: .2px;
    text-shadow: 1px 1px 1px rgba(0,0,0,.5);
  }
  .titlebar .t-title { display:flex; align-items:center; gap:6px; overflow:hidden; white-space:nowrap; text-overflow:ellipsis; }
  .titlebar .t-btns { display:flex; gap:3px; }
  .titlebar button.win-btn {
    width: 21px; height: 19px;
    border: 1px solid rgba(255,255,255,.5);
    border-radius: 3px;
    background: linear-gradient(180deg,#ff8a70,#e0301e 55%,#c11c0c);
    font-size: 11px; line-height: 1; font-weight:bold;
    color:#fff; cursor:pointer; padding:0;
    box-shadow: inset 0 1px 1px rgba(255,255,255,.5);
  }
  .titlebar button.win-btn:active { filter: brightness(0.85); }
  .titlebar button.min-btn, .titlebar button.max-btn {
    background: linear-gradient(180deg,var(--th-item-1,#7fb8ff),var(--th-item-2,#2f6fd8));
    border-color: var(--th-item-border, rgba(255,255,255,.5));
  }
  #taskbar .tb-item.minimized { opacity:.72; font-style:italic; }
  .menubar {
    background: #ece9d8; border-bottom: 1px solid #b0aca0;
    display: flex; font-size: 11px; padding: 2px 2px;
  }
  .menubar .m-item { position: relative; padding: 4px 9px; cursor: pointer; border-radius:3px; }
  .menubar .m-drop {
    display: none; position: absolute; top: 100%; left: 0;
    background: #fff; border: 1px solid #888; box-shadow: 2px 2px 8px rgba(0,0,0,.35);
    min-width: 150px; z-index: 5; border-radius: 0 4px 4px 4px; overflow:hidden;
  }
  .menubar .m-item.open .m-drop { display: block; }
  .m-drop div { padding: 6px 12px; color: #000; white-space: nowrap; }
  .m-drop div.mi-active { font-weight: bold; }

  /* Hover-to-open only for real mouse pointers — on touchscreens, :hover styles

     its own reliable tap-to-toggle handler below, so it doesn't need this. */

    .menubar .m-item:hover { background: #316ac5; color:#fff; }

window.onerror = function(msg, src, line, col, err){
  // Cross-origin scripts (Firebase, Google Sign-In) report errors as a blank
  // "Script error." with no line/source, per browser security rules. That's
  // never actionable and was alarming users for essentially no reason, so we
  // skip showing the banner for that specific unhelpful case.
  if(msg === 'Script error.' && !line && !src) return;
  // Chromium-based iOS browsers (Chrome, Brave, etc.) inject an internal
  // "__gCrWeb" bridge script into every page for autofill/password-manager
  // integration. When it fails to initialize in time, the browser blames it on
  // the page URL even though it's entirely the browser's own internal code —
  // nothing to do with this app, so it's not worth alarming anyone about.
  if(typeof msg === 'string' && msg.indexOf('__gCrWeb') !== -1) return;
  var d = document.createElement('div');
  d.style.cssText = 'position:fixed;top:0;left:0;right:0;background:#c0392b;color:#fff;padding:10px;font-size:12px;z-index:999999;font-family:monospace;white-space:pre-wrap;word-break:break-all;';
  d.textContent = 'Error: ' + msg + '\nLine: ' + line + '\nSource: ' + src;
  document.body.appendChild(d);
};

  function mountStickyNote(note){

    if(!layer) return;
    var el = document.createElement('div');
    el.className = 'sticky';
    el.style.left = (note.x || 40) + 'px';
    el.style.top = (note.y || 60) + 'px';
    el.style.width = (note.w || 180) + 'px';
    el.style.height = (note.h || 160) + 'px';
    el.style.background = note.color || '#fff9a3';
    el.style.zIndex = (zCounter += 10); // always spawn above windows
    el.setAttribute('data-sid', note.id);

    var bar = document.createElement('div');
    bar.className = 'sticky-bar';
    bar.style.background = shadeColor(note.color || '#fff9a3', -18);

    var title = document.createElement('span');
    title.className = 'sticky-bar-title';
    title.textContent = '✎ Note';

    var colorBtn = document.createElement('button');
    colorBtn.className = 'sticky-color-btn';
    colorBtn.style.background = note.color || '#fff9a3';
    colorBtn.title = 'Change color';

    var closeBtn = document.createElement('button');
    closeBtn.className = 'sticky-close';
    closeBtn.innerHTML = '&times;';
    closeBtn.title = 'Delete note';

    bar.appendChild(title);
    bar.appendChild(colorBtn);
    bar.appendChild(closeBtn);

    body.className = 'sticky-body';
    body.value = note.text || '';
    body.placeholder = 'Type a note\u2026';

    var resizeHandle = document.createElement('div');
    resizeHandle.className = 'sticky-resize-handle';

    el.appendChild(bar);
    el.appendChild(body);
    el.appendChild(resizeHandle);
    layer.appendChild(el);

    resizeHandle.addEventListener('touchstart', function(e){
      e.stopPropagation();
      var t = e.touches[0];
      var startX = t.clientX, startY = t.clientY;
      var startW = el.offsetWidth, startH = el.offsetHeight;
      function onMove(ev){
        var tt = ev.touches[0];
        var newW = Math.max(140, startW + (tt.clientX - startX));
        var newH = Math.max(100, startH + (tt.clientY - startY));
        el.style.width = newW + 'px';
        el.style.height = newH + 'px';
      }
      function onEnd(){
        note.w = el.offsetWidth; note.h = el.offsetHeight;
        saveStickyNotes();
        resizeHandle.removeEventListener('touchmove', onMove);
        resizeHandle.removeEventListener('touchend', onEnd);
      }
      resizeHandle.addEventListener('touchmove', onMove, { passive:false });
      resizeHandle.addEventListener('touchend', onEnd);
    }, { passive:true });

    // bring to front on any interaction
    el.addEventListener('mousedown', function(){ el.style.zIndex = ++zCounter; });
    el.addEventListener('touchstart', function(){ el.style.zIndex = ++zCounter; }, { passive:true });

      e.stopPropagation();

  function shadeColor(hex, pct){

  function makeStickyDraggable(el, handle, note){

    function onMove(cx, cy){
      if(!dragging) return;
      var nx = startL + (cx - startX);
      var ny = startT + (cy - startY);
      var maxX = window.innerWidth - el.offsetWidth;
      var maxY = window.innerHeight - TASKBAR_H - el.offsetHeight;
      nx = Math.max(0, Math.min(nx, maxX));
      ny = Math.max(0, Math.min(ny, maxY));

    }
    function onEnd(){
      if(!dragging) return;
      dragging = false;

    }

      if(e.target.tagName === 'BUTTON') return;

      if(e.target.tagName === 'BUTTON') return;
      var t = e.touches[0]; onStart(t.clientX, t.clientY);

    handle.addEventListener('touchmove', function(e){

    handle.addEventListener('touchend', onEnd);

  function openEditBackgroundWindow(){
    var COLORS = [
      '#3a6ea5','#1a3a5c','#2d7dd2','#0d3aa8','#5c3d99','#8e24aa',
      '#ff1493','#e57373','#f06292','#e91e63','#ff7043','#f4a261',
      '#fdd835','#aed581','#43a047','#1b5e20','#00838f','#00acc1',
      '#ffffff','#e0e0e0','#9e9e9e','#616161','#333333','#000000'
    ];
    var GRADIENTS = [
      ['#ff9a56','#ff6363'], ['#2193b0','#6dd5ed'], ['#654ea3','#eaafc8'],
      ['#134e5e','#71b280'], ['#0f2027','#2c5364'], ['#ff9a9e','#a18cd1']
    ];
    var bg = state.background || {};
    var startMode = bg.gradient ? 'gradient' : 'solid';

    var swatchesHtml = COLORS.map(function(c){
      var sel = bg.color === c;
      return '<div class="bg-swatch" data-color="'+c+'" title="'+c+'" style="width:28px;height:28px;border-radius:5px;background:'+c+';border:2px solid '+(sel?'#0054e3':'rgba(0,0,0,.2)')+';cursor:pointer;box-sizing:border-box;"></div>';
    }).join('');

    var gradFrom = bg.gradientFrom || GRADIENTS[0][0];
    var gradTo = bg.gradientTo || GRADIENTS[0][1];
    var gradientSwatchesHtml = GRADIENTS.map(function(pair){
      return '<div class="bg-grad-swatch" data-from="'+pair[0]+'" data-to="'+pair[1]+'" title="Gradient" style="height:38px;border-radius:5px;background:linear-gradient(135deg,'+pair[0]+','+pair[1]+');border:2px solid rgba(0,0,0,.2);cursor:pointer;box-sizing:border-box;"></div>';
    }).join('');

    var body =
      '<div class="win-body" style="padding:10px;">' +
        '<div style="display:flex;gap:4px;margin-bottom:8px;">' +
          '<button class="btn bg-mode-btn" data-mode="solid" style="flex:1;">Solid</button>' +
          '<button class="btn bg-mode-btn" data-mode="gradient" style="flex:1;">Gradient</button>' +
        '</div>' +
        '<div id="bg-mode-solid" style="display:grid;grid-template-columns:repeat(5,28px);gap:6px;justify-content:center;">' +
          swatchesHtml +
          '<input type="color" id="eb-custom-color" value="'+(bg.color||'#3a6ea5')+'" title="Custom color" style="width:28px;height:28px;border-radius:5px;border:2px solid rgba(0,0,0,.2);cursor:pointer;padding:0;">' +
        '</div>' +
        '<div id="bg-mode-gradient" style="display:none;">' +
          '<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-bottom:6px;">' + gradientSwatchesHtml + '</div>' +
          '<div style="display:flex;height:38px;border-radius:5px;overflow:hidden;border:2px solid rgba(0,0,0,.2);">' +
            '<input type="color" id="eb-grad-from" value="'+gradFrom+'" title="From" style="flex:1;border:none;padding:0;cursor:pointer;">' +
            '<input type="color" id="eb-grad-to" value="'+gradTo+'" title="To" style="flex:1;border:none;padding:0;cursor:pointer;">' +
          '</div>' +
        '</div>' +
        '<div style="display:flex;gap:6px;margin-top:10px;">' +
          '<button class="btn" id="eb-upload-photo" style="flex:1;">Photo&hellip;</button>' +
          '<button class="btn" id="eb-restore" style="flex:1;color:#c0392b;border-color:#c0392b;">Restore</button>' +
        '</div>' +
      '</div>';

    createWindow({
      title: 'Edit Background',
      extraClass: 'bgedit-win',
      bodyHtml: body,
      type: 'editbackground',
      onMount: function(el, id){
        var solidSection = el.querySelector('#bg-mode-solid');
        var gradientSection = el.querySelector('#bg-mode-gradient');
        function setMode(mode){
          el.querySelectorAll('.bg-mode-btn').forEach(function(b){
            var active = b.getAttribute('data-mode') === mode;
            b.style.background = active ? '#316ac5' : '';
            b.style.color = active ? '#fff' : '';
          });
          solidSection.style.display = mode === 'solid' ? 'grid' : 'none';
          gradientSection.style.display = mode === 'gradient' ? 'block' : 'none';
        }
        el.querySelectorAll('.bg-mode-btn').forEach(function(b){
          b.addEventListener('click', function(){ setMode(b.getAttribute('data-mode')); });
        });
        setMode(startMode);

        el.querySelectorAll('.bg-swatch').forEach(function(sw){
          sw.addEventListener('click', function(){
            state.background = { color: sw.getAttribute('data-color'), image: '', gradient: '' };
            applyBackground(); saveState();
            el.querySelectorAll('.bg-swatch').forEach(function(s){ s.style.borderColor = 'rgba(0,0,0,.2)'; });
            sw.style.borderColor = '#0054e3';
          });
        });
        el.querySelector('#eb-custom-color').addEventListener('input', function(e2){
          state.background = { color: e2.target.value, image: '', gradient: '' };
          applyBackground(); saveState();
        });

        function applyCustomGradient(){
          var from = el.querySelector('#eb-grad-from').value;
          var to = el.querySelector('#eb-grad-to').value;
          state.background = { color: '', image: '', gradient: 'linear-gradient(135deg,' + from + ',' + to + ')', gradientFrom: from, gradientTo: to };
          applyBackground(); saveState();
        }
        el.querySelectorAll('.bg-grad-swatch').forEach(function(sw){
          sw.addEventListener('click', function(){
            var from = sw.getAttribute('data-from'), to = sw.getAttribute('data-to');
            el.querySelector('#eb-grad-from').value = from;
            el.querySelector('#eb-grad-to').value = to;
            applyCustomGradient();
          });
        });
        el.querySelector('#eb-grad-from').addEventListener('input', applyCustomGradient);
        el.querySelector('#eb-grad-to').addEventListener('input', applyCustomGradient);

        el.querySelector('#eb-upload-photo').addEventListener('click', function(){
          var input = document.createElement('input');
          input.type = 'file'; input.accept = 'image/*'; input.style.display = 'none';
          document.body.appendChild(input);
          input.addEventListener('change', function(){
            var file = input.files && input.files[0];
            if(file){
              var reader = new FileReader();
              reader.onload = function(e3){
                var img = new Image();
                img.onload = function(){
                  var maxDim = 1600;
                  var w = img.width, h = img.height;
                  if(w > maxDim || h > maxDim){
                    if(w >= h){ h = Math.round(h * maxDim / w); w = maxDim; }
                    else { w = Math.round(w * maxDim / h); h = maxDim; }
                  }
                  var canvas = document.createElement('canvas');
                  canvas.width = w; canvas.height = h;
                  canvas.getContext('2d').drawImage(img, 0, 0, w, h);
                  state.background = { color: '', image: canvas.toDataURL('image/jpeg', 0.8), gradient: '' };
                  applyBackground();
                  saveState();
                };
                img.src = e3.target.result;
              };
              reader.readAsDataURL(file);
            }
            input.remove();
          });
          input.click();
        });
        el.querySelector('#eb-restore').addEventListener('click', function(){
          state.background = { color: '', image: '', gradient: '' };
          applyBackground(); saveState();
          closeWindow(id);
        });
      }
    });
  }

  function openEditThemeWindow(){
    var t = state.theme || {};
    var colors = (t.customColors && t.customColors.length) ? t.customColors : ['#3d95ff'];
    var use2Init = colors.length >= 2;
    var use3Init = colors.length >= 3;

    var body =
      '<div class="win-body" style="padding:10px;">' +
        '<select id="th-lineitem" style="width:100%;padding:5px;margin-bottom:8px;font-size:12px;border:1px solid #aaa;border-radius:4px;"></select>' +
        '<div id="th-caldays-row" style="display:none;margin-bottom:8px;">' +
          '<div style="display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-bottom:6px;">' +
            ['S','M','T','W','T','F','S'].map(function(w, i){
              return '<button class="btn th-day-btn" data-day="' + i + '" style="padding:4px 0;font-size:10px;"><span class="th-day-letter">' + w + '</span><span class="th-day-swatch" style="display:block;width:100%;height:10px;border-radius:2px;margin-top:2px;"></span></button>';
            }).join('') +
          '</div>' +
          '<button class="btn" id="th-caldays-fill-rainbow" style="width:100%;font-size:11px;">Fill All with Rainbow</button>' +
        '</div>' +
        '<div style="display:flex;align-items:center;gap:8px;margin-bottom:12px;">' +
          '<span id="th-dropper-icon" style="flex-shrink:0;width:24px;height:24px;display:flex;align-items:center;justify-content:center;background:#ece9d8;border:1px solid #aaa;border-radius:4px;"></span>' +
          '<input type="color" id="th-swatch" style="flex:1;height:48px;border-radius:6px;border:2px solid rgba(0,0,0,.2);cursor:pointer;padding:0;">' +
        '</div>' +
        '<div style="font-size:11px;color:#555;font-weight:bold;margin-bottom:4px;">Gradient</div>' +
        '<div style="display:flex;gap:10px;margin-bottom:8px;font-size:11px;color:#555;">' +
          '<label><input type="checkbox" id="th-use2" ' + (use2Init ? 'checked' : '') + '> 2 colors</label>' +
          '<label><input type="checkbox" id="th-use3" ' + (use3Init ? 'checked' : '') + ' ' + (use2Init ? '' : 'disabled') + '> 3 colors</label>' +
        '</div>' +
        '<div style="display:flex;gap:4px;margin-bottom:12px;">' +
          '<button class="btn th-dir-btn" data-dir="vertical" style="flex:1;">Vertical</button>' +
          '<button class="btn th-dir-btn" data-dir="horizontal" style="flex:1;">Horizontal</button>' +
        '</div>' +
        '<button class="btn" id="th-save-preset" style="width:100%;margin-bottom:12px;">Save as Preset</button>' +
        '<div style="font-size:11px;color:#555;font-weight:bold;border-top:1px solid #ccc;padding-top:8px;margin-bottom:4px;">Presets</div>' +
        '<div id="th-presets-container" style="display:flex;gap:6px;flex-wrap:wrap;"></div>' +
      '</div>';

    createWindow({
      title: 'Edit Theme',
      extraClass: 'themeedit-win',
      bodyHtml: body,
      type: 'edittheme',
      onMount: function(el, id){
        el.querySelector('#th-dropper-icon').innerHTML = iconSVG('dropper');
        var DEFAULT_CALDAYS = ['#8f8b7a','#8f8b7a','#8f8b7a','#8f8b7a','#8f8b7a','#8f8b7a','#8f8b7a'];
        var RAINBOW_FILL = ['#e74c3c','#e67e22','#f1c40f','#2ecc71','#3498db','#5b2c9d','#9b59b6'];
        var values = {
          c1: colors[0] || '#3d95ff',
          c2: colors[1] || '#0058e6',
          c3: colors[2] || '#1a63d8',
          start: t.startColor || '#7ed957',
          clock: t.clockColor || '#1a4fc4',
          caldaysColors: (t.calDaysColors && t.calDaysColors.length === 7) ? t.calDaysColors.slice() : DEFAULT_CALDAYS.slice(),
          font: t.fontColor || '#ffffff'
        };
        var selectedDay = 0;
        var select = el.querySelector('#th-lineitem');
        var swatch = el.querySelector('#th-swatch');
        var caldaysRow = el.querySelector('#th-caldays-row');
        var dayBtns = el.querySelectorAll('.th-day-btn');
        var use2Box = el.querySelector('#th-use2');
        var use3Box = el.querySelector('#th-use3');
        var presetsContainer = el.querySelector('#th-presets-container');

        function builtInSwatchHtml(key){
          var sample = key === 'classic' ? CLASSIC_THEME.title2
            : key === 'rainbow' ? 'linear-gradient(135deg,#ff4d4d,#ff9d3d,#3ddc84,#3b82f6,#a855f7)'
            : THEME_PRESET_BASE[key];
          var sel = (state.theme && state.theme.preset) === key;
          return '<div class="theme-swatch" data-preset="' + key + '" title="' + THEME_PRESET_LABELS[key] + '" ' +
            'style="width:34px;height:34px;border-radius:4px;background:' + sample + ';border:2px solid ' + (sel ? '#0054e3' : 'rgba(0,0,0,.2)') + ';cursor:pointer;box-sizing:border-box;"></div>';
        }
        function customSwatchHtml(p){
          var cols = (p.theme.customColors && p.theme.customColors.length) ? p.theme.customColors : ['#3d95ff'];
          var sample = cols.length > 1 ? 'linear-gradient(135deg,' + cols.join(',') + ')' : cols[0];
          var sel = state.theme.preset === 'custom-' + p.id;
          return '<div class="theme-swatch-wrap" style="position:relative;">' +
            '<div class="custom-theme-swatch" data-custom-id="' + p.id + '" title="' + escapeHtml(p.name) + '" ' +
              'style="width:34px;height:34px;border-radius:4px;background:' + sample + ';border:2px solid ' + (sel ? '#0054e3' : 'rgba(0,0,0,.2)') + ';cursor:pointer;box-sizing:border-box;"></div>' +
            '<span class="custom-theme-del" data-custom-id="' + p.id + '" style="position:absolute;top:-6px;right:-6px;width:16px;height:16px;background:#c0392b;color:#fff;border-radius:50%;font-size:10px;line-height:16px;text-align:center;cursor:pointer;">&times;</span>' +
          '</div>';
        }

        function refreshSelection(){
          el.querySelectorAll('.theme-swatch').forEach(function(sw){
            var isSel = sw.getAttribute('data-preset') === state.theme.preset;
            sw.style.borderColor = isSel ? '#0054e3' : 'rgba(0,0,0,.2)';
          });
          el.querySelectorAll('.custom-theme-swatch').forEach(function(sw){
            var isSel = state.theme.preset === 'custom-' + sw.getAttribute('data-custom-id');
            sw.style.borderColor = isSel ? '#0054e3' : 'rgba(0,0,0,.2)';
          });
          el.querySelectorAll('.th-dir-btn').forEach(function(b){
            var active = b.getAttribute('data-dir') === (state.theme.gradientDirection || 'vertical');
            b.style.background = active ? '#316ac5' : '';
            b.style.color = active ? '#fff' : '';
          });
        }

        function renderPresets(){
          var builtIn = Object.keys(THEME_PRESET_LABELS).map(builtInSwatchHtml).join('');
          var custom = (state.customThemePresets || []).map(customSwatchHtml).join('');
          presetsContainer.innerHTML = builtIn + custom;
          wirePresetClicks();
          refreshSelection();
        }

        function wirePresetClicks(){
          el.querySelectorAll('.theme-swatch').forEach(function(sw){
            sw.addEventListener('click', function(){
              var preset = sw.getAttribute('data-preset');
              state.theme = Object.assign({}, state.theme, { preset: preset });
              applyTheme(); saveState(); refreshSelection();
            });
          });
          el.querySelectorAll('.custom-theme-swatch').forEach(function(sw){
            sw.addEventListener('click', function(){
              var pid = sw.getAttribute('data-custom-id');
              var saved = (state.customThemePresets || []).find(function(p){ return p.id === pid; });
              if(!saved) return;
              state.theme = Object.assign({ preset: 'custom-' + pid }, JSON.parse(JSON.stringify(saved.theme)));
              applyTheme(); saveState(); refreshSelection();
            });
          });
          el.querySelectorAll('.custom-theme-del').forEach(function(delBtn){
            delBtn.addEventListener('click', function(e){
              e.stopPropagation();
              var pid = delBtn.getAttribute('data-custom-id');
              appConfirm('Delete this saved theme?', function(ok){
                if(!ok) return;
                state.customThemePresets = (state.customThemePresets || []).filter(function(p){ return p.id !== pid; });
                saveState();
                renderPresets();
              });
            });
          });
        }

        el.querySelectorAll('.th-dir-btn').forEach(function(b){
          b.addEventListener('click', function(){
            state.theme = Object.assign({}, state.theme, { gradientDirection: b.getAttribute('data-dir') });
            applyTheme(); saveState(); refreshSelection();
          });
        });

        el.querySelector('#th-save-preset').addEventListener('click', function(){
          appTextPrompt('Name this theme:', '', function(name){
            if(!name || !name.trim()) return;
            var newColors = [values.c1];
            if(use2Box.checked) newColors.push(values.c2);
            if(use2Box.checked && use3Box.checked) newColors.push(values.c3);
            state.customThemePresets = state.customThemePresets || [];
            state.customThemePresets.push({
              id: uid(),
              name: name.trim(),
              theme: {
                customColors: newColors,
                startColor: values.start,
                clockColor: values.clock,
                calDaysColors: values.caldaysColors,
                fontColor: values.font,
                gradientDirection: state.theme.gradientDirection || 'vertical'
              }
            });
            saveState();
            renderPresets();
          });
        });

        function lineItems(){
          var items = [{ key:'c1', label:'Color' }];
          if(use2Box.checked) items.push({ key:'c2', label:'Color 2' });
          if(use2Box.checked && use3Box.checked) items.push({ key:'c3', label:'Color 3' });
          items.push({ key:'start', label:'Start Button' });
          items.push({ key:'clock', label:'Clock' });
          items.push({ key:'caldays', label:'Calendar Days' });
          items.push({ key:'font', label:'Font Color' });
          return items;
        }
        function refreshDayBtns(){
          dayBtns.forEach(function(b){
            var i = parseInt(b.getAttribute('data-day'), 10);
            b.querySelector('.th-day-swatch').style.background = values.caldaysColors[i];
            b.style.borderColor = (i === selectedDay) ? '#0054e3' : '';
            b.style.borderWidth = (i === selectedDay) ? '2px' : '';
          });
        }
        dayBtns.forEach(function(b){
          b.addEventListener('click', function(){
            selectedDay = parseInt(b.getAttribute('data-day'), 10);
            refreshDayBtns();
            if(select.value === 'caldays') swatch.value = values.caldaysColors[selectedDay];
          });
        });
        el.querySelector('#th-caldays-fill-rainbow').addEventListener('click', function(){
          values.caldaysColors = RAINBOW_FILL.slice();
          refreshDayBtns();
          if(select.value === 'caldays') swatch.value = values.caldaysColors[selectedDay];
          commit();
        });
        function updateCaldaysRow(){
          caldaysRow.style.display = select.value === 'caldays' ? 'block' : 'none';
          if(select.value === 'caldays') refreshDayBtns();
        }
        function rebuildOptions(){
          var items = lineItems();
          var prevVal = select.value;
          select.innerHTML = items.map(function(it){ return '<option value="' + it.key + '">' + it.label + '</option>'; }).join('');
          select.value = items.some(function(it){ return it.key === prevVal; }) ? prevVal : items[0].key;
          swatch.value = select.value === 'caldays' ? values.caldaysColors[selectedDay] : values[select.value];
          updateCaldaysRow();
        }
        function commit(){
          var newColors = [values.c1];
          if(use2Box.checked) newColors.push(values.c2);
          if(use2Box.checked && use3Box.checked) newColors.push(values.c3);
          state.theme = {
            preset: 'custom',
            customColors: newColors,
            startColor: values.start,
            clockColor: values.clock,
            calDaysColors: values.caldaysColors,
            fontColor: values.font,
            gradientDirection: state.theme.gradientDirection || 'vertical'
          };
          applyTheme(); saveState(); refreshSelection();
        }

        select.addEventListener('change', function(){
          swatch.value = select.value === 'caldays' ? values.caldaysColors[selectedDay] : values[select.value];
          updateCaldaysRow();
        });
        swatch.addEventListener('input', function(){
          if(select.value === 'caldays'){
            values.caldaysColors[selectedDay] = swatch.value;
            refreshDayBtns();
          } else {
            values[select.value] = swatch.value;
          }
          commit();
        });
        use2Box.addEventListener('change', function(){
          use3Box.disabled = !use2Box.checked;
          if(!use2Box.checked) use3Box.checked = false;
          rebuildOptions();
          commit();
        });
        use3Box.addEventListener('change', function(){ rebuildOptions(); commit(); });

        rebuildOptions();
        renderPresets();
      }
    });
  }

  // ---------------- DesktopDiary Paint ----------------
// DesktopDiary Paint v0.1 — self-contained application object.
  var DesktopDiaryPaint = {
    version: '1.7',
    open: function(){

  // ---------------- persistence ----------------
  // window.storage only exists inside Claude's own preview iframe. On the real
  // deployed site (GitHub Pages, etc.) there's no such API, so we fall back to
  // IndexedDB — this is what makes local saving (and full offline use) actually
  // work once this file is hosted for real.
  var localStore = null;
  function makeIndexedDBStore(){
    var dbPromise = new Promise(function(resolve, reject){
      try{
        var req = indexedDB.open('instant-diary-db', 1);
        req.onupgradeneeded = function(){ req.result.createObjectStore('kv'); };
        req.onsuccess = function(){ resolve(req.result); };
        req.onerror = function(){ reject(req.error); };
      } catch(e){ reject(e); }
    });
    function withStore(mode, fn){
      return dbPromise.then(function(db){
        return new Promise(function(resolve, reject){
          var tx = db.transaction('kv', mode);
          var store = tx.objectStore('kv');
          var request = fn(store);
          request.onsuccess = function(){ resolve(request.result); };
          request.onerror = function(){ reject(request.error); };
        });
      });
    }
    return {
      get: function(key){
        return withStore('readonly', function(store){ return store.get(key); })
          .then(function(value){ return (value === undefined) ? null : { key: key, value: value }; });
      },
      set: function(key, value){
        return withStore('readwrite', function(store){ return store.put(value, key); })
          .then(function(){ return { key: key, value: value }; });
      }
    };
  }
  function getLocalStore(){
    if(localStore) return localStore;
    if(typeof window.storage !== 'undefined' && window.storage &&
       typeof window.storage.get === 'function' && typeof window.storage.set === 'function'){
      localStore = window.storage;
      return localStore;
    }
    if(typeof indexedDB !== 'undefined'){
      try{ localStore = makeIndexedDBStore(); return localStore; } catch(e){}
    }
    return null;
  }
  function loadState(){

  function loadStateAttempt(retriesLeft){
    var store = getLocalStore();
    if(store){
      try{
        return store.get(STORAGE_KEY, false).then(function(res){
          if(res && res.value){
            try { state = JSON.parse(res.value); normalizeState(); } catch(e){}
          }
        }).catch(function(){ /* nothing saved yet */ });
      } catch(e){
        return Promise.resolve();
      }
    }
    if(retriesLeft > 0){
      return new Promise(function(resolve){
        setTimeout(function(){ resolve(loadStateAttempt(retriesLeft - 1)); }, 200);
      });
    }
    return Promise.resolve();
  }

  var saveInFlight = false, savePending = false;
  function saveState(){
    var store = getLocalStore();
    if(!store) return Promise.resolve();
    if(saveInFlight){ savePending = true; return Promise.resolve(); }
    saveInFlight = true;
    var payload = JSON.stringify(state);
    var attempt;
    try{
      attempt = store.set(STORAGE_KEY, payload, false);
    } catch(e){
      attempt = Promise.reject(e);
    }
    return attempt
      .catch(function(){
        // one quiet retry - transient hiccups shouldn't surface to the user
        try{
          return store.set(STORAGE_KEY, payload, false).catch(function(){ /* give up quietly */ });
        } catch(e){ /* give up quietly */ }
      })
      .then(function(){
        saveInFlight = false;
        if(savePending){ savePending = false; return saveState(); }
        if(cloudUser) scheduleCloudPush();
      });
  }

  // splits an entries array into chunks that stay comfortably under Firestore's 1MB doc limit
  function chunkEntries(arr, maxBytes){
    maxBytes = maxBytes || 700000;
    var chunks = [], current = [], size = 2;
    (arr || []).forEach(function(item){
      var itemSize = JSON.stringify(item).length + 1;
      if(current.length && size + itemSize > maxBytes){
        chunks.push(current); current = []; size = 2;
      }
      current.push(item); size += itemSize;
    });
    chunks.push(current); // always at least one (possibly empty) chunk
    return chunks;
  }

  function pushToCloud(){
    if(!db || !cloudUser) return Promise.reject(new Error('Not signed in.'));
    var uid = cloudUser.uid;
    var meta = {
      screenName: state.account ? state.account.screenName : '',
      groups: state.groups,
      buddies: state.buddies,
      status: state.status,
      statusLog: state.statusLog,
      statusPresets: state.statusPresets,
      moodLog: state.moodLog,
      drafts: state.drafts,
      profile: state.profile,
      blogPosts: state.blogPosts,
      bgColor: (state.background && state.background.color) || '',
      hasBgImage: !!(state.background && state.background.image),
      customFonts: state.customFonts,
      customMoods: state.customMoods,
      customMoodColors: state.customMoodColors,
      theme: state.theme,
      customThemePresets: state.customThemePresets,
      stickyNotes: (state.stickyNotes || []).map(function(n){
        return { id:n.id, text:n.text, color:n.color, x:n.x, y:n.y, w:n.w, h:n.h };
      }),
      chunkCounts: {},
      updatedAt: Date.now()
    };
    var writes = [];
    Object.keys(state.entries).forEach(function(buddyId){
      var chunks = chunkEntries(state.entries[buddyId]);
      meta.chunkCounts[buddyId] = chunks.length;
      chunks.forEach(function(chunk, i){
        writes.push(db.collection('users').doc(uid).collection('entries').doc(buddyId+'_'+i).set({ entries: chunk }));
      });
    });
    // background image lives in its own doc (can be a large data URI) so it never
    // risks pushing the meta doc over Firestore's ~1MB document size limit
    if(state.background && state.background.image){
      writes.push(db.collection('users').doc(uid).collection('diary').doc('background').set({ image: state.background.image }));
    } else {
      writes.push(db.collection('users').doc(uid).collection('diary').doc('background').delete().catch(function(){}));
    }
    writes.push(db.collection('users').doc(uid).collection('diary').doc('meta').set(meta));
    return Promise.all(writes);
  }

  function pullFromCloud(){
    if(!db || !cloudUser) return Promise.reject(new Error('Not signed in.'));
    var uid = cloudUser.uid;
    return db.collection('users').doc(uid).collection('diary').doc('meta').get().then(function(snap){
      if(!snap.exists) return false;
      var meta = snap.data() || {};
      state.groups = meta.groups || state.groups;
      state.buddies = meta.buddies || [];
      state.status = meta.status || { label:'', html:'', ts:null };
      state.statusLog = meta.statusLog || [];
      state.statusPresets = meta.statusPresets || [];
      state.moodLog = meta.moodLog || [];
      state.drafts = meta.drafts || {};
      state.profile = meta.profile || { pic:'', html:'' };
      if(Array.isArray(meta.blogPosts)) state.blogPosts = meta.blogPosts;
      if(Array.isArray(meta.customFonts)) state.customFonts = meta.customFonts;
      if(Array.isArray(meta.customMoods)) state.customMoods = meta.customMoods;
      if(meta.customMoodColors && typeof meta.customMoodColors === 'object') state.customMoodColors = meta.customMoodColors;
      if(meta.theme && typeof meta.theme === 'object') state.theme = meta.theme;
      if(Array.isArray(meta.customThemePresets)) state.customThemePresets = meta.customThemePresets;
      if(Array.isArray(meta.stickyNotes)) state.stickyNotes = meta.stickyNotes;
      if(state.account && meta.screenName) state.account.screenName = meta.screenName;
      var chunkCounts = meta.chunkCounts || {};
      var buddyIds = Object.keys(chunkCounts);
      state.entries = {};
      var fetches = buddyIds.map(function(buddyId){
        var n = chunkCounts[buddyId];
        var docFetches = [];
        for(var i=0;i<n;i++){
          docFetches.push(db.collection('users').doc(uid).collection('entries').doc(buddyId+'_'+i).get());
        }
        return Promise.all(docFetches).then(function(snaps){
          var all = [];
          snaps.forEach(function(s){ if(s.exists) all = all.concat((s.data()||{}).entries || []); });
          state.entries[buddyId] = all;
        });
      });
      // background image lives in its own doc; only fetch it if push indicated one exists
      var bgFetch = meta.hasBgImage
        ? db.collection('users').doc(uid).collection('diary').doc('background').get().then(function(bgSnap){
            state.background = { color: meta.bgColor || '', image: (bgSnap.exists && bgSnap.data().image) || '' };
          }).catch(function(){
            state.background = { color: meta.bgColor || '', image: '' };
          })
        : Promise.resolve().then(function(){
            state.background = { color: meta.bgColor || '', image: '' };
          });
      return Promise.all(fetches.concat([bgFetch])).then(function(){
        normalizeState();
        return saveState().then(function(){ return true; });
      });
    });
  }

  function playDoorSlam(){
    try{
      var ctx = getCtx(); var now = ctx.currentTime;
      // low thud — body impact of the door
      var bufSize = ctx.sampleRate * 0.6;
      var buf = ctx.createBuffer(1, bufSize, ctx.sampleRate);
      var data = buf.getChannelData(0);
      for(var i=0; i<bufSize; i++){ data[i] = (Math.random()*2-1); }
      var noise = ctx.createBufferSource(); noise.buffer = buf;
      var nGain = ctx.createGain();
      var nFilt = ctx.createBiquadFilter();
      nFilt.type = 'lowpass'; nFilt.frequency.value = 140; nFilt.Q.value = 4;
      nGain.gain.setValueAtTime(0.0001, now);
      nGain.gain.linearRampToValueAtTime(0.7, now+0.008);
      nGain.gain.exponentialRampToValueAtTime(0.0001, now+0.55);
      noise.connect(nFilt); nFilt.connect(nGain); nGain.connect(ctx.destination);
      noise.start(now); noise.stop(now+0.6);
      // sharp high click — latch snap
      var click = ctx.createOscillator();
      var cGain = ctx.createGain();
      click.type = 'square'; click.frequency.value = 900;
      cGain.gain.setValueAtTime(0.0001, now);
      cGain.gain.linearRampToValueAtTime(0.35, now+0.004);
      cGain.gain.exponentialRampToValueAtTime(0.0001, now+0.06);
      click.connect(cGain); cGain.connect(ctx.destination);
      click.start(now); click.stop(now+0.07);
      // brief rattle after — frame vibration
      var rattleBuf = ctx.createBuffer(1, Math.floor(ctx.sampleRate*0.2), ctx.sampleRate);
      var rd = rattleBuf.getChannelData(0);
      for(var j=0; j<rd.length; j++){ rd[j] = (Math.random()*2-1); }
      var rattle = ctx.createBufferSource(); rattle.buffer = rattleBuf;
      var rGain = ctx.createGain();
      var rFilt = ctx.createBiquadFilter();
      rFilt.type = 'bandpass'; rFilt.frequency.value = 600; rFilt.Q.value = 3;
      rGain.gain.setValueAtTime(0.0001, now+0.04);
      rGain.gain.linearRampToValueAtTime(0.12, now+0.055);
      rGain.gain.exponentialRampToValueAtTime(0.0001, now+0.22);
      rattle.connect(rFilt); rFilt.connect(rGain); rGain.connect(ctx.destination);
      rattle.start(now+0.04); rattle.stop(now+0.25);
    }catch(e){}
  }

  function mascotSVG(size){
    size = size || 54;
    return '<img src="'+SMILEY_B64+'" width="'+size+'" height="'+size+'" style="object-fit:contain;image-rendering:auto;vertical-align:middle;">';
  }
  function diarySVG(size){
    size = size || 200;
    return '<div style="display:flex;flex-direction:column;align-items:center;gap:6px;">' +
           '<img src="'+DIARY_B64+'" width="'+size+'" height="'+size+'" style="object-fit:contain;image-rendering:auto;border:3px solid var(--th-title-3,#0850d0);border-radius:8px;box-shadow:0 2px 8px rgba(0,0,0,.35);">' +
           '</div>';
  }
  document.getElementById('mascot-slot').innerHTML = diarySVG(180);
  document.getElementById('mascot-slot-2').innerHTML = mascotSVG(44);
  document.querySelectorAll('.ttl-icon').forEach(function(el){ el.innerHTML = mascotSVG(15); });
  document.getElementById('signon-go-icon').innerHTML = mascotSVG(16);
  document.getElementById('signon-icon-img').src = SIGNON_ICON_B64;

  document.getElementById('signon-close').addEventListener('click', function(){
    document.getElementById('signon-wrap').style.display = 'none';
    document.getElementById('signon-icon').style.display = 'flex';
  });
  document.getElementById('signon-icon').addEventListener('click', function(){
    document.getElementById('signon-icon').style.display = 'none';
    showSignon();
  });

  function iconSVG(name){
    var stroke = 'stroke="#0850d0" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"';
    if(name === 'bulb'){
      return '<svg width="15" height="15" viewBox="0 0 24 24" '+stroke+'><path d="M9 18h6M10 22h4M12 2a6 6 0 00-3.5 10.9c.4.3.5.8.5 1.3V15h6v-.8c0-.5.1-1 .5-1.3A6 6 0 0012 2z"/></svg>';
    }
    if(name === 'clock'){
      return '<svg width="15" height="15" viewBox="0 0 24 24" '+stroke+'><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 3"/></svg>';
    }
    if(name === 'plus'){
      return '<svg width="15" height="15" viewBox="0 0 24 24" '+stroke+'><circle cx="9" cy="8" r="3"/><path d="M2 20c0-3.5 3-6 7-6s7 2.5 7 6"/><path d="M19 8v6M16 11h6"/></svg>';
    }
    if(name === 'send'){
      return '<svg width="15" height="15" viewBox="0 0 24 24" fill="#4a2e00"><path d="M3 11l18-8-8 18-2-8-8-2z"/></svg>';
    }
    if(name === 'photo'){
      return '<svg width="15" height="15" viewBox="0 0 24 24" '+stroke+'><rect x="3" y="4" width="18" height="16" rx="2"/><circle cx="8.5" cy="9.5" r="1.8"/><path d="M4 18l5-5 4 4 3-3 4 4"/></svg>';
    }
    if(name === 'pencil'){
      return '<svg width="13" height="13" viewBox="0 0 24 24" stroke="#666" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"><path d="M12 20h9"/><path d="M16.5 3.5a2.1 2.1 0 013 3L7 19l-4 1 1-4z"/></svg>';
    }
    if(name === 'trash'){
      return '<svg width="13" height="13" viewBox="0 0 24 24" stroke="#b00" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"><path d="M3 6h18"/><path d="M8 6V4h8v2"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6M14 11v6"/></svg>';
    }
    if(name === 'mic'){
      return '<svg width="15" height="15" viewBox="0 0 24 24" '+stroke+'><rect x="9" y="2" width="6" height="12" rx="3"/><path d="M5 11a7 7 0 0014 0"/><path d="M12 18v4M8 22h8"/></svg>';
    }
    if(name === 'dropper'){
      return '<svg width="18" height="18" viewBox="0 0 24 24" '+stroke+'><path d="M17 3l4 4-3 3-4-4z"/><path d="M15.5 6.5L5 17l-2 4 4-2L17.5 8.5z"/><path d="M9 13l2 2"/></svg>';
    }
    return '';
  }

  // ---------------- helpers ----------------
  function uid(){ return 'id' + Math.random().toString(36).slice(2) + Date.now().toString(36); }

  // Simple in-app info/alert — replaces alert() calls (blocked in some sandboxes).
  function openInfoWindow(message){
    var overlay = document.createElement('div');
    overlay.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:999999;display:flex;align-items:center;justify-content:center;';
    var box = document.createElement('div');
    box.style.cssText = 'background:#ece9d8;border:2px solid #0054e3;border-radius:6px;padding:18px 20px;max-width:260px;width:90%;font-size:13px;box-shadow:0 4px 18px rgba(0,0,0,.5);';
    box.innerHTML = '<div style="margin-bottom:14px;">'+escapeHtml(message)+'</div>' +
      '<div style="text-align:right;"><button class="btn" id="ai-ok">OK</button></div>';
    overlay.appendChild(box);
    document.body.appendChild(overlay);
    function close(){ document.body.removeChild(overlay); }
    box.querySelector('#ai-ok').addEventListener('click', close);
    overlay.addEventListener('click', function(e){ if(e.target===overlay) close(); });
  }
  // cb(true) fires if confirmed, cb(false) if cancelled.
  function appConfirm(message, cb){
    var overlay = document.createElement('div');
    overlay.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:999999;display:flex;align-items:center;justify-content:center;';
    var box = document.createElement('div');
    box.style.cssText = 'background:#ece9d8;border:2px solid #0054e3;border-radius:6px;padding:18px 20px;max-width:280px;width:90%;font-size:13px;box-shadow:0 4px 18px rgba(0,0,0,.5);';
    box.innerHTML = '<div style="margin-bottom:14px;">'+escapeHtml(message)+'</div>' +
      '<div style="display:flex;gap:8px;justify-content:flex-end;">' +
        '<button class="btn" id="ac-cancel">Cancel</button>' +
        '<button class="btn" id="ac-ok" style="background:#c0392b;color:#fff;border-color:#a93226;">Delete</button>' +
      '</div>';
    overlay.appendChild(box);
    document.body.appendChild(overlay);
    function done(result){ document.body.removeChild(overlay); cb(result); }
    box.querySelector('#ac-ok').addEventListener('click', function(){ done(true); });
    box.querySelector('#ac-cancel').addEventListener('click', function(){ done(false); });
    overlay.addEventListener('click', function(e){ if(e.target === overlay) done(false); });
  }

  function fmtTime(ts){
    var d = new Date(ts);
    var h = d.getHours(); var m = d.getMinutes();
    var ampm = h >= 12 ? 'PM' : 'AM';
    h = h % 12; if(h === 0) h = 12;
    return h + ':' + (m<10?'0':'') + m + ' ' + ampm;
  }
  function fmtDateShort(ts){
    return new Date(ts).toLocaleDateString(undefined, { month:'short', day:'numeric', year:'numeric' });
  }
  function sameDay(a,b){
    var da = new Date(a), db = new Date(b);
    return da.getFullYear()===db.getFullYear() && da.getMonth()===db.getMonth() && da.getDate()===db.getDate();
  }
  function fmtDayDivider(ts){
    var d = new Date(ts);
    var today = new Date();
    if(sameDay(ts, today.getTime())) return 'Today';
    var yest = new Date(today); yest.setDate(today.getDate()-1);
    if(sameDay(ts, yest.getTime())) return 'Yesterday';
    return d.toLocaleDateString(undefined, { weekday:'long', month:'long', day:'numeric', year:'numeric' });
  }
  function relTime(ts){
    var diff = Date.now() - ts;
    var mins = Math.floor(diff/60000);
    if(mins < 1) return 'just now';
    if(mins < 60) return mins + 'm ago';
    var hrs = Math.floor(mins/60);
    if(hrs < 24) return hrs + 'h ago';
    var days = Math.floor(hrs/24);
    if(days < 7) return days + 'd ago';
    return new Date(ts).toLocaleDateString(undefined,{month:'short', day:'numeric'});
  }
  function lastEntryTs(buddyId){
    var list = (state.entries[buddyId] || []).filter(function(e){ return e.kind !== 'prompt'; });
    if(!list.length) return null;
    return list[list.length-1].ts;
  }
  function statusFor(buddyId){
    var ts = lastEntryTs(buddyId);
    if(ts === null) return 'idle';
    var days = (Date.now()-ts)/86400000;
    if(sameDay(ts, Date.now())) return 'online';
    if(days < 7) return 'away';
    return 'idle';
  }
  function findBuddyByName(name){
    var n = name.trim().toLowerCase();

  function ensureBuddy(name, groupId){

  // conservative sanitizer for rich-text entries: only bold/italic/underline/line-break
  // and color/background-color styling on spans survive; everything else is unwrapped or dropped.
  function sanitizeHTML(html){
    var container = document.createElement('div');
    container.innerHTML = html;
    var allowed = { B:1, I:1, U:1, SPAN:1, BR:1, DIV:1, FONT:1, IMG:1, AUDIO:1 };
    (function clean(node){
      Array.prototype.slice.call(node.childNodes).forEach(function(child){
        if(child.nodeType === 1){
          var tag = child.tagName;
          if(!allowed[tag]){
            while(child.firstChild) node.insertBefore(child.firstChild, child);
            node.removeChild(child);
            return;
          }
          if(tag === 'IMG'){
            var src = child.getAttribute('src') || '';
            var chosenWidth = child.style ? child.style.width : '';
            while(child.attributes && child.attributes.length){ child.removeAttribute(child.attributes[0].name); }
            if(/^data:image\//.test(src)){
              child.setAttribute('src', src);
              var imgStyle = 'max-width:100%;border-radius:4px;';
              if(/^\d+px$/.test(chosenWidth)) imgStyle += 'width:' + chosenWidth + ';';
              child.setAttribute('style', imgStyle);
            } else {
              node.removeChild(child);
              return;
            }
            return; // no children to clean
          }
          if(tag === 'AUDIO'){
            var asrc = child.getAttribute('src') || '';
            while(child.attributes && child.attributes.length){ child.removeAttribute(child.attributes[0].name); }
            if(/^data:audio\//.test(asrc)){
              child.setAttribute('src', asrc);
              child.setAttribute('controls', '');
              child.setAttribute('style', 'max-width:100%;');
            } else {
              node.removeChild(child);
              return;
            }
            return; // no children to clean
          }
          var keepStyle = '';
          if(tag === 'SPAN' && child.style){
            var color = child.style.color, bg = child.style.backgroundColor;
            if(color) keepStyle += 'color:' + color + ';';
            if(bg) keepStyle += 'background-color:' + bg + ';';
          }
          var keepSize = (tag === 'FONT') ? child.getAttribute('size') : null;
          var keepFace = (tag === 'FONT') ? child.getAttribute('face') : null;
          while(child.attributes && child.attributes.length){
            child.removeAttribute(child.attributes[0].name);
          }
          if(keepStyle) child.setAttribute('style', keepStyle);
          if(keepSize) child.setAttribute('size', keepSize);
          if(keepFace) child.setAttribute('face', keepFace);
          clean(child);
        } else if(child.nodeType !== 3){
          node.removeChild(child);
        }
      });
    })(container);
    return container.innerHTML;
  }

  // ================= GENERIC WINDOW SYSTEM =================
  var TASKBAR_H = 34;

  function clampToViewport(x, y, w, h){
    var maxX = Math.max(0, window.innerWidth - w);
    var maxY = Math.max(0, window.innerHeight - TASKBAR_H - h);
    return { x: Math.min(Math.max(0, x), maxX), y: Math.min(Math.max(0, y), maxY) };
  }

  function createWindow(opts){
    // opts: title, bodyHtml, onMount(el), extraClass, type, buddyId
    var id = uid();
    var el = document.createElement('div');
    el.className = 'win ' + (opts.extraClass || '');
    el.style.visibility = 'hidden';
    el.style.zIndex = ++zCounter;

    el.innerHTML =
      '<div class="titlebar">' +
        '<span class="t-title">' + mascotSVG(15) + '<span>' + escapeHtml(opts.title) + '</span></span>' +
        '<span class="t-btns"><button class="win-btn min-btn" title="Minimize">&#8211;</button><button class="win-btn max-btn" title="Maximize">&#9723;</button><button class="win-btn close-btn">X</button></span>' +
      '</div>' +
      (opts.menuHtml || '') +
      opts.bodyHtml;

    document.getElementById('windows-layer').appendChild(el);

    // position after layout so we know the real (CSS-driven) size
    var w = el.offsetWidth, h = el.offsetHeight;
    var pos;
    if(isMobile()){
      pos = clampToViewport((window.innerWidth - w) / 2, (window.innerHeight - TASKBAR_H - h) / 2, w, h);
    } else {
      winCounter++;
      var offset = (winCounter % 8) * 22;
      pos = clampToViewport(40 + offset, 40 + offset, w, h);
    }
    el.style.left = pos.x + 'px';
    el.style.top = pos.y + 'px';
    el.style.visibility = 'visible';

    var record = { id: id, el: el, type: opts.type, buddyId: opts.buddyId, maximized: false, prevRect: null, minimized: false };
    openWindows.push(record);
    addTaskbarItem(record, opts.title);

    el.querySelector('.close-btn').addEventListener('click', function(){ closeWindow(id); });
    el.querySelector('.min-btn').addEventListener('click', function(e){
      e.stopPropagation();
      minimizeWindow(record);
    });
    el.querySelector('.max-btn').addEventListener('click', function(e){
      e.stopPropagation();
      toggleMaximize(record);
    });
    el.addEventListener('mousedown', function(){ focusWindow(id); });
    el.addEventListener('touchstart', function(){ focusWindow(id); }, { passive: true });
    makeDraggable(el, el.querySelector('.titlebar'));
    focusWindow(id);

    if(opts.onMount) opts.onMount(el, id);
    return { id: id, el: el };
  }

  function toggleMaximize(rec){
    var el = rec.el;
    var btn = el.querySelector('.max-btn');
    if(!rec.maximized){
      rec.prevRect = { left: el.style.left, top: el.style.top, width: el.style.width, height: el.style.height };
      el.style.left = '4px';
      el.style.top = '4px';
      el.style.width = 'calc(100% - 8px)';
      el.style.height = 'calc(100% - ' + (TASKBAR_H + 8) + 'px)';
      rec.maximized = true;
      if(btn) btn.title = 'Restore';
    } else {
      el.style.left = rec.prevRect.left;
      el.style.top = rec.prevRect.top;

  function closeWindow(id){

    rec.el.remove();

    openWindows = openWindows.filter(function(w){ return w.id !== id; });
    if(activeWindowId === id) activeWindowId = null;
    showDesktopHidden = showDesktopHidden.filter(function(wid){ return wid !== id; });

    rec.minimized = true;
    if(rec.tbEl){ rec.tbEl.classList.remove('active'); rec.tbEl.classList.add('minimized'); }
    if(activeWindowId === rec.id) activeWindowId = null;

    var rec = openWindows.find(function(w){ return w.id === id; });
    if(!rec) return;
    if(rec.minimized){
      rec.el.style.display = '';
      rec.minimized = false;
      if(rec.tbEl) rec.tbEl.classList.remove('minimized');

  // Minimizes every open window (classic "Show Desktop"); pressing it again
  // restores only the windows that this action minimized, leaving windows the
  // user had already minimized by hand untouched.
  function showDesktop(){
    if(showDesktopHidden.length){
      var ids = showDesktopHidden.slice();
      showDesktopHidden = [];
      ids.forEach(function(wid){
        var rec = openWindows.find(function(w){ return w.id === wid; });
        if(rec && rec.minimized) focusWindow(rec.id);
      });
    } else {
      var hidden = [];
      openWindows.forEach(function(rec){
        if(!rec.minimized){
          minimizeWindow(rec);
          hidden.push(rec.id);
        }
      });
      showDesktopHidden = hidden;
    }
  }

  function makeDraggable(winEl, handleEl){
    var dragging = false, offX = 0, offY = 0;

    function moveTo(clientX, clientY){
      var x = clientX - offX, y = clientY - offY;
      var clamped = clampToViewport(x, y, winEl.offsetWidth, winEl.offsetHeight);
      winEl.style.left = clamped.x + 'px';
      winEl.style.top = clamped.y + 'px';
    }

    // mouse (desktop / trackpad)
    handleEl.addEventListener('mousedown', function(e){
      dragging = true;
      offX = e.clientX - winEl.offsetLeft;
      offY = e.clientY - winEl.offsetTop;
      e.preventDefault();
    });
    document.addEventListener('mousemove', function(e){
      if(!dragging) return;
      moveTo(e.clientX, e.clientY);
    });
    document.addEventListener('mouseup', function(){ dragging = false; });

    // touch (mobile)
    handleEl.addEventListener('touchstart', function(e){
      var t = e.touches[0];
      dragging = true;
      offX = t.clientX - winEl.offsetLeft;
      offY = t.clientY - winEl.offsetTop;
    }, { passive: true });
    handleEl.addEventListener('touchmove', function(e){
      if(!dragging) return;
      var t = e.touches[0];
      moveTo(t.clientX, t.clientY);
      e.preventDefault();
    }, { passive: false });
    handleEl.addEventListener('touchend', function(){ dragging = false; });
  }

  // expands %t, %d when the user finishes a token (types a space).
  // Operates on the text node at the caret so existing formatting/images are untouched.
  function handleTokenExpansion(target){
    var sel = window.getSelection();
    if(!sel || !sel.rangeCount) return;
    var node = sel.anchorNode;
    if(!node || node.nodeType !== 3) return; // only within a text node
    var text = node.nodeValue;
    var caret = sel.anchorOffset;
    var before = text.slice(0, caret);
    var m = before.match(/%(t|d)\s$/i);
    if(!m) return;
    var token = m[0].trim().toLowerCase();
    var val;
    if(token === '%t') val = fmtTime(Date.now());
    else if(token === '%d') val = fmtDateShort(Date.now());
    else return;
    var start = caret - m[0].length;
    node.nodeValue = text.slice(0, start) + val + ' ' + text.slice(caret);
    var newCaret = start + val.length + 1;
    var range = document.createRange();
    range.setStart(node, Math.min(newCaret, node.nodeValue.length));
    range.collapse(true);
    sel.removeAllRanges(); sel.addRange(range);
  }

  function insertImageFile(target, file, savedRange){
    if(!file) return;
    var reader = new FileReader();
    reader.onload = function(e){
      var img = new Image();
      img.onload = function(){
        var maxDim = 720; // stored resolution — larger than the default preview size
        var w = img.width, h = img.height;
        if(w > maxDim || h > maxDim){
          if(w >= h){ h = Math.round(h * maxDim / w); w = maxDim; }
          else { w = Math.round(w * maxDim / h); h = maxDim; }
        }
        var canvas = document.createElement('canvas');
        canvas.width = w; canvas.height = h;
        canvas.getContext('2d').drawImage(img, 0, 0, w, h);
        var dataUrl = canvas.toDataURL('image/jpeg', 0.78);
        target.focus();
        if(savedRange){
          var sel = window.getSelection(); sel.removeAllRanges(); sel.addRange(savedRange);
        }
        document.execCommand('insertHTML', false, '<img src="'+dataUrl+'" style="width:220px;max-width:100%;border-radius:4px;">');
      };
      img.src = e.target.result;
    };
    reader.readAsDataURL(file);
  }

  function startVoiceRecording(target, anchorEl){
    if(!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia || typeof MediaRecorder === 'undefined'){
      openInfoWindow('Voice recording isn\'t supported in this browser.');
      return;
    }
    navigator.mediaDevices.getUserMedia({ audio: true }).then(function(stream){
      var widget = document.createElement('div');
      widget.className = 'voice-rec-widget';
      widget.innerHTML = '<span class="vr-dot"></span><span class="vr-time">0:00 / 0:10</span><button class="vr-stop">Stop</button><button class="vr-cancel">&times;</button>';
      document.body.appendChild(widget);
      var rect = (anchorEl || target).getBoundingClientRect();
      widget.style.left = Math.max(4, Math.min(window.innerWidth - 160, rect.left)) + 'px';
      widget.style.top = Math.max(4, rect.top - 36) + 'px';

      var MAX_SECONDS = 10;
      var chunks = [];
      var recorder;
      try{ recorder = new MediaRecorder(stream); }
      catch(e){ openInfoWindow('Could not start recording.'); stream.getTracks().forEach(function(t){ t.stop(); }); widget.remove(); return; }
      recorder.ondataavailable = function(e){ if(e.data && e.data.size > 0) chunks.push(e.data); };

      var startedAt = Date.now();
      var timerInt = setInterval(function(){
        var secs = Math.floor((Date.now() - startedAt) / 1000);
        var mm = Math.floor(secs / 60), ss = secs % 60;
        widget.querySelector('.vr-time').textContent = mm + ':' + (ss < 10 ? '0' : '') + ss + ' / 0:10';
        if(secs >= MAX_SECONDS && recorder.state === 'recording'){ recorder.stop(); }
      }, 250);

      var cancelled = false;
      function cleanup(){
        clearInterval(timerInt);
        stream.getTracks().forEach(function(t){ t.stop(); });
        widget.remove();
      }
      recorder.onstop = function(){
        if(cancelled){ cleanup(); return; }
        var blob = new Blob(chunks, { type: recorder.mimeType || 'audio/webm' });
        cleanup();
        if(blob.size === 0) return;
        var reader = new FileReader();
        reader.onload = function(e){ insertAudioIntoTarget(target, e.target.result); };
        reader.readAsDataURL(blob);
      };
      widget.querySelector('.vr-stop').addEventListener('click', function(){ recorder.stop(); });
      widget.querySelector('.vr-cancel').addEventListener('click', function(){ cancelled = true; recorder.stop(); });
      recorder.start();
    }).catch(function(err){
      openInfoWindow('Could not access the microphone: ' + (err && err.message ? err.message : err));
    });
  }

  function wireRichToolbar(scopeEl, targetId){
    var target = scopeEl.querySelector('#'+targetId);
    var savedRange = null;
    function saveSelection(){
      var sel = window.getSelection();
      if(sel && sel.rangeCount > 0 && sel.anchorNode && target.contains(sel.anchorNode)){
        savedRange = sel.getRangeAt(0).cloneRange();
      }
    }
    function restore(){
      target.focus();
      if(savedRange){
        var sel = window.getSelection(); sel.removeAllRanges(); sel.addRange(savedRange);
        return;
      }
      if(!target.firstChild){
        // box genuinely empty: create a real (invisible) anchor character and
        // SELECT it — not just collapse past it — so clicking Bold, Italic,
        // and Underline in a row before typing anything all actually apply
        // and combine, instead of only the last click sticking.
        var marker = document.createTextNode('\u200b');
        target.appendChild(marker);
        var range0 = document.createRange();
        range0.selectNodeContents(marker);
        var sel0 = window.getSelection();
        sel0.removeAllRanges();
        sel0.addRange(range0);
        return;
      }
      // box has existing content but selection was lost (e.g. a native
      // color/select picker stole focus) — place the caret at the very end,
      // nested inside the last element, so continuing formatting doesn't
      // reset color/size back to default.
      var node = target;
      while(node.lastChild) node = node.lastChild;
      var range = document.createRange();
      if(node.nodeType === 3){
        range.setStart(node, node.nodeValue.length);
      } else {
        range.selectNodeContents(node);
      }
      range.collapse(true);
      var sel2 = window.getSelection();
      sel2.removeAllRanges();
      sel2.addRange(range);
    }
    function updateToolbarState(){
      ['bold','italic','underline'].forEach(function(cmd){
        var btn = scopeEl.querySelector('.rich-toolbar button[data-cmd="'+cmd+'"]');
        if(!btn) return;
        var isActive = false;
        try{ isActive = document.queryCommandState(cmd); } catch(e){}
        btn.classList.toggle('active', isActive);
      });
    }
    scopeEl.querySelectorAll('.rich-toolbar button[data-cmd]').forEach(function(btn){
      btn.addEventListener('mousedown', function(e){ e.preventDefault(); saveSelection(); });
      btn.addEventListener('click', function(){
        restore();
        document.execCommand(btn.getAttribute('data-cmd'), false, null);
        updateToolbarState();
      });
    });
    var fontSel = scopeEl.querySelector('.rich-font');
    if(fontSel){
      fontSel.addEventListener('mousedown', saveSelection);
      fontSel.addEventListener('change', function(){ restore(); document.execCommand('fontName', false, fontSel.value); });
    }
    var sizeSel = scopeEl.querySelector('.rich-size');
    if(sizeSel){
      sizeSel.addEventListener('mousedown', saveSelection);
      sizeSel.addEventListener('change', function(){ restore(); document.execCommand('fontSize', false, sizeSel.value); });
    }
    scopeEl.querySelectorAll('.rich-swatch input[data-cmd]').forEach(function(inp){
      inp.addEventListener('mousedown', saveSelection);
      inp.addEventListener('input', function(){
        restore();
        var cmd = inp.getAttribute('data-cmd');
        if(cmd === 'hiliteColor'){
          // Safari doesn't support hiliteColor and often fails *silently*
          // (no thrown error), so a try/catch fallback never actually runs.
          // Check real support first and use backColor directly when needed.
          var supportsHilite = false;
          try{ supportsHilite = document.queryCommandSupported('hiliteColor'); } catch(e){}
          try{ document.execCommand(supportsHilite ? 'hiliteColor' : 'backColor', false, inp.value); } catch(e){}
        } else {
          try{ document.execCommand(cmd, false, inp.value); } catch(e){}
        }
        var swatch = inp.closest('.rich-swatch');
        if(swatch){
          if(swatch.classList.contains('hl') || swatch.classList.contains('bg')){
            swatch.style.background = inp.value;
          } else {
            var span = swatch.querySelector('span');
            if(span) span.style.color = inp.value;
          }
        }
      });
    });
    // live token expansion (fires after a token + space is typed)
    target.addEventListener('keyup', function(e){
      if(e.key === ' ' || e.code === 'Space' || e.key === 'Spacebar'){
        handleTokenExpansion(target);
      }
      updateToolbarState();
    });
    target.addEventListener('mouseup', updateToolbarState);
    target.addEventListener('click', updateToolbarState);
    // continuously track the live selection while the box is focused, so
    // controls that steal focus (native <select>, <input type=color>) still
    // have the correct selection to apply formatting to — this is what was
    // breaking the size dropdown.
    document.addEventListener('selectionchange', function(){
      if(document.activeElement === target){
        updateToolbarState();
        saveSelection();
      }
    });
    attachImageResize(target);
    // expose a photo-insert hook for the Insert menu
    target._insertPhoto = function(){
      saveSelection();
      var picker = document.createElement('input');
      picker.type = 'file'; picker.accept = 'image/*';
      picker.style.display = 'none';
      document.body.appendChild(picker);
      picker.addEventListener('change', function(){
        if(picker.files && picker.files[0]) insertImageFile(target, picker.files[0], savedRange);
        picker.remove();
      });
      picker.click();
    };
    target._saveSelection = saveSelection;
    target._restore = restore;
  }

          if(e.key === 'Enter' && !e.shiftKey && !isMobile()){
