            handleSendOrSave();
          }
        });

        el.querySelector('#prompt-'+buddyId).addEventListener('click', function(){
          insertPromptMessage(buddyId);
        });
        el.querySelector('#photo-'+buddyId).addEventListener('click', function(){
          input._insertPhoto && input._insertPhoto();
        });
        el.querySelector('#voice-'+buddyId).addEventListener('click', function(){
          startVoiceRecording(input, el.querySelector('#voice-'+buddyId));
        });

        el.querySelector('.mi-close').addEventListener('click', function(){ closeWindow(id); });

        el.querySelector('.mi-search').addEventListener('click', function(){
          appTextPrompt('Search this conversation (blank to clear)', searchQueryByBuddy[buddyId] || '', function(q){
            if(q === null) return;
            searchQueryByBuddy[buddyId] = q.trim();
            renderLog(buddyId);
          });
        });
        el.querySelector('.mi-export').addEventListener('click', function(){
          exportConversation(buddyId, buddy.name);
        });

        el.querySelector('.mi-filter-photo').addEventListener('click', function(){ toggleFilterForBuddy(buddyId, 'photo', el); });
        el.querySelector('.mi-filter-voice').addEventListener('click', function(){ toggleFilterForBuddy(buddyId, 'voice', el); });
        el.querySelector('.mi-filter-prompt').addEventListener('click', function(){ toggleFilterForBuddy(buddyId, 'prompt', el); });

        el.querySelector('.mi-editdraft').addEventListener('click', function(){
          openDraftsListWindowFor(buddyId, buddy.name, function(html){
            if(editingEntryId) cancelEdit();
            input.innerHTML = html;
            input.focus();
          }, buddy.name);
        });
        el.querySelector('.mi-clear').addEventListener('click', function(){ cancelEdit(); });
        el.querySelector('.mi-ts').addEventListener('click', function(){ appendPlainText(input, (isRichEmpty(input)?'':' ') + fmtTime(Date.now()) + ' '); });
        el.querySelector('.mi-date').addEventListener('click', function(){ appendPlainText(input, (isRichEmpty(input)?'':' ') + fmtDateShort(Date.now()) + ' '); });

        el.querySelector('.draft-save-link-'+buddyId).addEventListener('click', function(){
          if(isRichEmpty(input)){ openInfoWindow('Nothing to save \u2014 the compose box is empty.'); return; }
          saveDraftFor(buddyId, sanitizeHTML(input.innerHTML));
          openInfoWindow('Draft saved. Use View \u2192 Drafts to see everything you\'ve saved.');
        });

        refreshLogMenuLabels(buddyId, el);
      }
    });
  }

  function renderStats(buddyId){
    var el = document.getElementById('stats-'+buddyId);
    if(!el) return;
    var count = (state.entries[buddyId] || []).filter(function(e){ return e.kind !== 'prompt'; }).length;
    el.textContent = count + (count === 1 ? ' entry' : ' entries') + ' so far';
  }

  function refreshLogMenuLabels(buddyId, el){
    if(!el) return;
    var filter = logFilterByBuddy[buddyId] || null;
    ['photo','voice','prompt'].forEach(function(type){
      var item = el.querySelector('.mi-filter-'+type);
      if(item) item.classList.toggle('mi-active', filter === type);
    });
  }

  function toggleFilterForBuddy(buddyId, type, el){
    logFilterByBuddy[buddyId] = (logFilterByBuddy[buddyId] === type) ? null : type;
    refreshLogMenuLabels(buddyId, el);
    renderLog(buddyId);
  }

  function stripHtmlTags(html){
    var div = document.createElement('div');
    div.innerHTML = html || '';
    return div.textContent || '';
  }

  // Generic draft log, usable by any rich-text compose box (IM entries, new messages,
  // status edits, blog posts). `key` is a buddyId or a fixed scope like '__blog__'.
  function saveDraftFor(key, html, recipient){
    if(!html || !stripHtmlTags(html).trim()) return false;
    state.drafts[key] = state.drafts[key] || [];
    var draft = { id: uid(), html: html, ts: Date.now() };
    if(recipient) draft.recipient = recipient;
    state.drafts[key].push(draft);
    saveState();
    return true;
  }

  function openDraftsListWindowFor(key, scopeLabel, onLoad, impliedRecipient){
    function buildRows(){
      var list = (state.drafts[key] || []).slice().sort(function(a,b){ return b.ts - a.ts; });
      if(!list.length) return '<div class="bl-empty">No saved drafts yet.</div>';
      return list.map(function(d){
        var preview = stripHtmlTags(d.html).trim();
        if(preview.length > 80) preview = preview.slice(0, 80) + '\u2026';
        var recipient = impliedRecipient || d.recipient || null;
        var recipientHtml = recipient ? '<div class="draft-recipient">To: ' + escapeHtml(recipient) + '</div>' : '';
        return '<div class="status-log-row" data-draft-id="'+escapeHtml(d.id)+'">' +
          '<div class="slr-ts">' + fmtDayDivider(d.ts) + ' &middot; ' + fmtTime(d.ts) +
            '<span class="sl-actions"><span class="sl-edit" title="Load">&#9998;</span><span class="sl-del" title="Delete">&#10005;</span></span>' +
          '</div>' +
          recipientHtml +
          '<div class="sl-status-label">' + (escapeHtml(preview) || '<i>(empty)</i>') + '</div>' +
        '</div>';
      }).join('');
    }
    createWindow({
      title: 'Drafts' + (scopeLabel ? ' \u2014 ' + scopeLabel : ''),
      extraClass: 'help-win',
      bodyHtml: '<div class="win-body" id="drafts-body-wrap">' + buildRows() + '</div>',
      type: 'drafts',
      onMount: function(dEl, dId){
        function wireDraftActions(){
          dEl.querySelectorAll('.sl-edit').forEach(function(btn){
            btn.onclick = function(){
              var row = btn.closest('[data-draft-id]');
              var draftId = row && row.getAttribute('data-draft-id');
              var draft = (state.drafts[key] || []).find(function(d){ return d.id === draftId; });
              if(!draft) return;
              onLoad(draft.html);
              closeWindow(dId);
            };
          });
          dEl.querySelectorAll('.sl-del').forEach(function(btn){
            btn.onclick = function(){
              var row = btn.closest('[data-draft-id]');
              var draftId = row && row.getAttribute('data-draft-id');
              appConfirm('Delete this saved draft?', function(confirmed){
                if(!confirmed) return;
                state.drafts[key] = (state.drafts[key] || []).filter(function(d){ return d.id !== draftId; });
                saveState();
                dEl.querySelector('#drafts-body-wrap').innerHTML = buildRows();
                wireDraftActions();
              });
            };
          });
        }
        wireDraftActions();
      }
    });
  }

  // ================= ALL DRAFTS WINDOW (grouped by type: status, blog, messages) =================
  function openAllDraftsWindow(){
    function rowsFor(key, impliedRecipient){
      var list = (state.drafts[key] || []).slice().sort(function(a,b){ return b.ts - a.ts; });
      return list.map(function(d){
        var preview = stripHtmlTags(d.html).trim();
        if(preview.length > 70) preview = preview.slice(0, 70) + '\u2026';
        var recipient = impliedRecipient || d.recipient || null;
        var recipientHtml = recipient ? '<div class="draft-recipient">To: ' + escapeHtml(recipient) + '</div>' : '';
        return '<div class="status-log-row" data-draft-key="'+escapeHtml(key)+'" data-draft-id="'+escapeHtml(d.id)+'">' +
          '<div class="slr-ts">' + fmtDayDivider(d.ts) + ' &middot; ' + fmtTime(d.ts) +
            '<span class="sl-actions"><span class="sl-edit" title="Load">&#9998;</span><span class="sl-del" title="Delete">&#10005;</span></span>' +
          '</div>' +
          recipientHtml +
          '<div class="sl-status-label">' + (escapeHtml(preview) || '<i>(empty)</i>') + '</div>' +
        '</div>';
      }).join('');
    }
    function sectionHeader(label){
      return '<div style="font-weight:bold;padding:6px 8px 2px;border-bottom:1px solid #ccc;margin-top:6px;">' + escapeHtml(label) + '</div>';
    }
    function subHeader(label){
      return '<div style="font-size:11px;color:#555;padding:4px 8px 0;">' + escapeHtml(label) + '</div>';
    }
    function buildBody(){
      var blogRows = rowsFor('__blog__');
      var msgHtml = '';
      var nmRows = rowsFor('__newmessage__');
      if(nmRows) msgHtml += subHeader('New Message') + nmRows;
      state.buddies.forEach(function(b){
        var rows = rowsFor(b.id, b.name);
        if(rows) msgHtml += subHeader(b.name) + rows;
      });
      var html = '';
      html += sectionHeader('Posts') + (blogRows || '<div class="bl-empty">No post drafts.</div>');
      html += sectionHeader('Messages') + (msgHtml || '<div class="bl-empty">No message drafts.</div>');
      return html;
    }
    createWindow({
      title: 'Drafts',
      extraClass: 'help-win',
      bodyHtml: '<div class="win-body" id="alldrafts-body-wrap">' + buildBody() + '</div>',
      type: 'alldrafts',
      onMount: function(el, id){
        function wireActions(){
          el.querySelectorAll('.sl-edit').forEach(function(btn){
            btn.onclick = function(){
              var row = btn.closest('[data-draft-id]');
              var key = row && row.getAttribute('data-draft-key');
              var draftId = row && row.getAttribute('data-draft-id');
              var draft = (state.drafts[key] || []).find(function(d){ return d.id === draftId; });
              if(!draft) return;
              closeWindow(id);
              if(key === '__blog__'){
                openBlogPostEditor(null, null, draft.html);
              } else if(key === '__newmessage__'){
                openNewMessageWindow();
                var composeEl = document.getElementById('nm-body');
                if(composeEl) composeEl.innerHTML = draft.html;
              } else {
                openIMWindow(key);
                var input = document.getElementById('input-'+key);
                if(input) input.innerHTML = draft.html;
              }
            };
          });
          el.querySelectorAll('.sl-del').forEach(function(btn){
            btn.onclick = function(){
              var row = btn.closest('[data-draft-id]');
              var key = row && row.getAttribute('data-draft-key');
              var draftId = row && row.getAttribute('data-draft-id');
              appConfirm('Delete this saved draft?', function(confirmed){
                if(!confirmed) return;
                state.drafts[key] = (state.drafts[key] || []).filter(function(d){ return d.id !== draftId; });
                saveState();
                el.querySelector('#alldrafts-body-wrap').innerHTML = buildBody();
                wireActions();
              });
            };
          });
        }
        wireActions();
      }
    });
  }

  function entryMatchesTypeFilter(entry, filter){
    if(!filter) return true;
    var content = (entry.html !== undefined) ? entry.html : (entry.text || '');
    if(filter === 'photo') return /<img/i.test(content);
    if(filter === 'voice') return /<audio/i.test(content);
    if(filter === 'prompt') return entry.kind === 'prompt';
    return true;
  }

  function entryMatchesSearch(entry, query){
    if(!query) return true;
    var content = (entry.html !== undefined) ? entry.html : (entry.text || '');
    var haystack = stripHtmlTags(content).toLowerCase() + ' ' + (entry.statusLabel || '').toLowerCase();
    return haystack.indexOf(query.toLowerCase()) !== -1;
  }

  function exportConversation(buddyId, buddyName){
    var fullList = state.entries[buddyId] || [];
    var lockedCount = fullList.filter(function(e){ return e.locked; }).length;

    function proceed(includeLocked){
      var list = fullList.filter(function(e){ return includeLocked || !e.locked; });
      if(!list.length){ openInfoWindow('Nothing to export yet.'); return; }
      generateConversationPDF(list, buddyName);
    }

    if(lockedCount > 0){
      appConfirm('This conversation has ' + lockedCount + ' locked ' + (lockedCount === 1 ? 'entry' : 'entries') + '. Include ' + (lockedCount === 1 ? 'it' : 'them') + ' in the export?', function(includeYes){
        if(includeYes){
          appPasscodePrompt(function(ok){ proceed(!!ok); });
        } else {
          proceed(false);
        }
      });
    } else {
      proceed(false);
    }
  }

  function generateConversationPDF(list, buddyName){
    var entriesHtml = list.map(function(e){
      var sender = e.kind === 'prompt' ? 'Prompt' : (e.author || state.account.screenName);
      var content = (e.html !== undefined) ? e.html : escapeHtml(e.text || '');
      return '<div style="margin-bottom:14px;padding-bottom:10px;border-bottom:1px solid #ddd;">' +
        '<div style="font-size:11px;color:#666;margin-bottom:4px;"><b>' + escapeHtml(sender) + '</b> &middot; ' + fmtDayDivider(e.ts) + ' ' + fmtTime(e.ts) + '</div>' +
        '<div style="font-size:14px;line-height:1.5;">' + content + '</div>' +
      '</div>';
    }).join('');

    var printHtml =
      '<!DOCTYPE html><html><head><meta charset="utf-8"><title>' + escapeHtml(buddyName) + ' Export</title>' +
      '<style>' +
        'body{font-family:Georgia,serif;padding:24px;color:#222;}' +
        'h1{font-size:20px;margin:0 0 2px;}' +
        '.meta{font-size:11px;color:#888;margin-bottom:20px;}' +
        'img{max-width:100%;}' +
        '@media print{ body{padding:0;} }' +
      '</style>' +
      '</head><body>' +
        '<h1>' + escapeHtml(buddyName) + '</h1>' +
        '<div class="meta">Exported ' + escapeHtml(new Date().toLocaleString()) + '</div>' +
        entriesHtml +
      '</body></html>';

    var iframe = document.createElement('iframe');
    iframe.style.cssText = 'position:fixed;right:0;bottom:0;width:0;height:0;border:0;';
    document.body.appendChild(iframe);
    var doc = iframe.contentWindow.document;
    doc.open();
    doc.write(printHtml);
    doc.close();

    function cleanup(){ if(iframe.parentNode) iframe.parentNode.removeChild(iframe); }
    iframe.onload = function(){
      iframe.contentWindow.focus();
      iframe.contentWindow.print();
    };
    try{ iframe.contentWindow.addEventListener('afterprint', cleanup); }catch(e){}
    setTimeout(cleanup, 60000);
  }

  function renderLog(buddyId){
    var el = document.getElementById('log-'+buddyId);
    if(!el) return;
    var fullList = state.entries[buddyId] || [];
    var typeFilter = logFilterByBuddy[buddyId] || null;
    var query = searchQueryByBuddy[buddyId] || '';
    var list = fullList.filter(function(e){
      if(!entryMatchesTypeFilter(e, typeFilter)) return false;
      if(!entryMatchesSearch(e, query)) return false;
      return true;
    });
    var html = '';
    var lastDay = null;
    list.forEach(function(entry){
      var divider = fmtDayDivider(entry.ts);
      if(divider !== lastDay){
        html += '<div class="im-day-divider">&mdash; ' + divider + ' &mdash;</div>';
        lastDay = divider;
      }
      var isPrompt = entry.kind === 'prompt';
      var sender = isPrompt ? 'Prompt' : escapeHtml(entry.author || state.account.screenName);
      var content = (entry.html !== undefined) ? entry.html : escapeHtml(entry.text || '');
      var statusTag = entry.statusLabel !== undefined
        ? ('<span class="status-tag">Status' + (entry.statusLabel ? ': ' + escapeHtml(entry.statusLabel) : '') + '</span><br>')
        : '';
      var txtStyle = entry.bg ? (' style="background:' + escapeHtml(entry.bg) + '; padding:4px 6px; border-radius:4px;"') : '';
      html += '<div class="im-entry' + (isPrompt ? ' prompt-entry' : '') + '" data-entry-id="' + entry.id + '">' +
                '<span class="who' + (isPrompt ? ' prompt-who' : '') + '">' + sender + '</span> ' +
                '<span class="ts">(' + fmtTime(entry.ts) + '):</span> ' +
                '<span class="entry-actions">' +
                  '<span class="entry-action" data-action="edit">' + iconSVG('pencil') + '</span>' +
                  '<span class="entry-action" data-action="delete">' + iconSVG('trash') + '</span>' +
                '</span>' +
                (entry.locked
                  ? '<div class="txt locked-content"' + txtStyle + '>' + statusTag + content + '</div>'
                  : '<div class="txt"' + txtStyle + '>' + statusTag + content + '</div>') +
              '</div>';
    });
    if(!list.length){
      html = '<div class="im-day-divider">No entries yet &mdash; write the first one below.</div>';
    }
    el.innerHTML = html;
    el.scrollTop = el.scrollHeight;
  }

  function sendFromIM(buddyId){
    var input = document.getElementById('input-'+buddyId);
    if(!input) return;
    if(isRichEmpty(input)) return;
    var html = sanitizeHTML(input.innerHTML);
    var entry = { id: uid(), html: html, ts: Date.now(), kind: 'entry', author: state.account.screenName };
    state.entries[buddyId] = state.entries[buddyId] || [];
    state.entries[buddyId].push(entry);
    saveState();
    input.innerHTML = '';
    renderLog(buddyId);
    renderStats(buddyId);
    renderBuddyList();
    playDing();
  }

  function insertPromptMessage(buddyId){
    var p = WRITING_PROMPTS[Math.floor(Math.random()*WRITING_PROMPTS.length)];
    state.entries[buddyId] = state.entries[buddyId] || [];
    state.entries[buddyId].push({ id: uid(), html: escapeHtml(p), ts: Date.now(), kind: 'prompt', author: state.account.screenName });
    saveState();
    renderLog(buddyId);
    renderStats(buddyId);
  }

    var prefillMatch = prefillName ? findBuddyByName(prefillName) : null;

        richComposeHtml('nm-body', '') +
        '<div class="im-action-row" style="justify-content:flex-start;">' +
          '<button class="action-btn" title="Insert photo" id="nm-photo-btn">'+iconSVG('photo')+'<span>Photo</span></button>' +

        '</div>' +
        '<div class="pct-key" style="display:flex;justify-content:space-between;align-items:center;">' +
          '<span><span class="nm-ins-ts" style="cursor:pointer;text-decoration:underline;">%t = time</span> &nbsp; <span class="nm-ins-date" style="cursor:pointer;text-decoration:underline;">%d = date</span></span>' +
          '<span class="draft-save-link" style="color:#0850d0;text-decoration:underline;cursor:pointer;">Save Draft</span>' +
        '</div>' +
        '<div class="nm-send-row"><button class="btn" id="nm-send">Send</button></div>' +
      '</div>';

    createWindow({
      title: 'Send Message',
      extraClass: 'nm-win',
      bodyHtml: body,
      type: 'newmsg',
      onMount: function(el, id){
        wireRichToolbar(el, 'nm-body');
        var composeEl = el.querySelector('#nm-body');
        composeEl.focus();
        var toSelect = el.querySelector('#nm-to-select');
        var newRow = el.querySelector('#nm-newbuddy-row');
        var newInput = el.querySelector('#nm-to-new');

        if(prefillMatch){
          toSelect.value = prefillMatch.id;
        } else if(prefillName){
          toSelect.value = '__new__';
          newRow.style.display = 'flex';
        }
        toSelect.addEventListener('change', function(){
          newRow.style.display = (toSelect.value === '__new__') ? 'flex' : 'none';
        });

        el.querySelector('#nm-photo-btn').addEventListener('click', function(){ composeEl._insertPhoto && composeEl._insertPhoto(); });
        el.querySelector('#nm-voice-btn').addEventListener('click', function(){ startVoiceRecording(composeEl, el.querySelector('#nm-voice-btn')); });
        el.querySelector('.nm-ins-ts').addEventListener('click', function(){ appendPlainText(composeEl, (isRichEmpty(composeEl)?'':' ') + fmtTime(Date.now()) + ' '); });
        el.querySelector('.nm-ins-date').addEventListener('click', function(){ appendPlainText(composeEl, (isRichEmpty(composeEl)?'':' ') + fmtDateShort(Date.now()) + ' '); });
        el.querySelector('#nm-send').addEventListener('click', function(){
          var buddy = null;
          if(toSelect.value === '__new__'){
            var newName = newInput.value.trim();
            if(!newName){ newInput.focus(); return; }
            buddy = ensureBuddy(newName);
          } else if(toSelect.value){
            buddy = state.buddies.find(function(b){ return b.id === toSelect.value; });
          }
          if(!buddy){ toSelect.focus(); return; }
          if(isRichEmpty(composeEl)) { composeEl.focus(); return; }
          var html = sanitizeHTML(composeEl.innerHTML);
          state.entries[buddy.id] = state.entries[buddy.id] || [];
          state.entries[buddy.id].push({ id: uid(), html: html, ts: Date.now(), kind: 'entry', author: state.account.screenName });

          playDing();
          renderBuddyList();
          closeWindow(id);
          openIMWindow(buddy.id);

        el.querySelector('.draft-save-link').addEventListener('click', function(){
          if(isRichEmpty(composeEl)){ openInfoWindow('Nothing to save \u2014 the compose box is empty.'); return; }
          var recipientName = null;
          if(toSelect.value === '__new__'){
            recipientName = newInput.value.trim() || null;
          } else if(toSelect.value){
            var b = state.buddies.find(function(x){ return x.id === toSelect.value; });
            recipientName = b ? b.name : null;
          }
          saveDraftFor('__newmessage__', sanitizeHTML(composeEl.innerHTML), recipientName);
          openInfoWindow('Draft saved. Find it later under Edit \u2192 Drafts on the Buddy List.');
        });
      }
    });
  }

            saveBtn.textContent = 'Add Buddy';
          } else {
            var b = state.buddies.find(function(x){ return x.id === select.value; });
            if(b){ nameInput.value = b.name; groupSelect.value = b.groupId || 'default'; }
            deleteBtn.style.display = '';
            saveBtn.textContent = 'Save';
          }
          updateGroupButtons();
        }
        loadCurrent();
        select.addEventListener('change', loadCurrent);
        groupSelect.addEventListener('change', function(){
          newGroupRow.style.display = (groupSelect.value === '__new__') ? 'flex' : 'none';
          updateGroupButtons();
        });
        groupRenameBtn.addEventListener('click', function(){
          var group = state.groups.find(function(g){ return g.id === groupSelect.value; });
          if(!group) return;
          appTextPrompt('Rename category', group.name, function(newName){
            if(newName === null) return;
            newName = newName.trim();
            if(!newName) return;
            group.name = newName;
            saveState();
            renderBuddyList();
            var opt = groupSelect.querySelector('option[value="'+group.id+'"]');
            if(opt) opt.textContent = newName;
          });
        });
        groupDeleteBtn.addEventListener('click', function(){
          var group = state.groups.find(function(g){ return g.id === groupSelect.value; });
          if(!group) return;
          appConfirm('Delete category "' + group.name + '"? Its buddies will move to "Buddies".', function(confirmed){
            if(!confirmed) return;
            state.buddies.forEach(function(b){
              if(b.groupId === group.id) b.groupId = 'default';
            });
            state.groups = state.groups.filter(function(g){ return g.id !== group.id; });
            saveState();
            renderBuddyList();
            var opt = groupSelect.querySelector('option[value="'+group.id+'"]');
            if(opt) opt.remove();
            loadCurrent();
          });
        });
        nameInput.focus();
        function submit(){
          var name = nameInput.value.trim();
          if(!name) return;
          var groupId = groupSelect.value;
          if(groupId === '__new__'){
            var newName = el.querySelector('#bw-newgroup-name').value.trim();
            if(!newName){ el.querySelector('#bw-newgroup-name').focus(); return; }
            var newGroup = { id: uid(), name: newName };
            state.groups.push(newGroup);
            groupId = newGroup.id;
          }
          if(select.value === '__new__'){
            ensureBuddy(name, groupId);
          } else {
            var b = state.buddies.find(function(x){ return x.id === select.value; });
            if(b){ b.name = name; b.groupId = groupId; }
          }
          saveState();
          renderBuddyList();
          closeWindow(id);
        }
        saveBtn.addEventListener('click', submit);
        nameInput.addEventListener('keydown', function(e){ if(e.key === 'Enter') submit(); });
        deleteBtn.addEventListener('click', function(){
          if(select.value === '__new__') return;
          var b = state.buddies.find(function(x){ return x.id === select.value; });
          if(!b) return;
          appConfirm('Delete "' + b.name + '" and all their entries? This can\'t be undone.', function(confirmed){
            if(!confirmed) return;
            state.buddies = state.buddies.filter(function(x){ return x.id !== b.id; });
            delete state.entries[b.id];
            delete state.drafts[b.id];
            delete logFilterByBuddy[b.id];
            delete searchQueryByBuddy[b.id];
            var openW = openWindows.find(function(w){ return w.type === 'im' && w.buddyId === b.id; });
            if(openW) closeWindow(openW.id);
            saveState(); renderBuddyList(); closeWindow(id);
          });
        });
      }
    });
  }

  // ================= STATUS WINDOWS =================
  // ---- mood colors must be declared before openSetStatusWindow which references them ----
  var MOOD_COLORS = {
    Happy: '#f4c542', Sad: '#4a6fa5', Tired: '#8a8a8a', Excited: '#ff7f2a',
    Anxious: '#a259c4', Angry: '#e0472e', Calm: '#4caf82', Stressed: '#c2185b'
  };
  function moodColor(mood){
    if(state.customMoodColors && state.customMoodColors[mood]) return state.customMoodColors[mood];
    return MOOD_COLORS[mood] || '#5a8fd6';
  }

  function openSetStatusWindow(){
    var buddyOptions = state.buddies.map(function(b){ return '<option value="'+escapeHtml(b.id)+'">'+escapeHtml(b.name)+'</option>'; }).join('');

    function allMoodNames(){
      return ['Happy','Sad','Tired','Excited','Anxious','Angry','Calm','Stressed'].concat(state.customMoods||[]);
    }
    function buildPresetOptions(){
      return '<option value="">— pick a preset —</option>' +
        allMoodNames().map(function(m){ return '<option value="'+escapeHtml(m)+'">'+escapeHtml(m)+'</option>'; }).join('') +
        '<option value="__manage__">⚙ Manage Moods</option>';
    }

    var body =
      '<div class="win-body nm-body">' +
        '<div class="nm-row"><label>Status:</label><input type="text" id="status-label" placeholder="e.g. Feeling good" value="'+(state.status&&state.status.label?escapeHtml(state.status.label):'')+'"></div>' +
        '<div class="nm-row" style="align-items:center;gap:6px;">' +
          '<label>Mood:</label>' +
          '<span id="mood-indicator" class="mood-dot" style="background:#ddd;flex-shrink:0;"></span>' +
          '<input type="text" id="mood-text" placeholder="Type a mood..." style="flex:1;min-width:0;">' +
          '<input type="color" id="mood-color" value="#5a8fd6" title="Mood color" style="width:32px;height:28px;border:1px solid #aaa;border-radius:4px;padding:0;cursor:pointer;flex-shrink:0;">' +
        '</div>' +
        '<div class="nm-row"><label></label><select id="mood-preset" style="flex:1;font-size:11px;">'+buildPresetOptions()+'</select></div>' +
        '<div class="nm-row"><label>Buddy:</label><select id="status-buddy-select"><option value="">— None —</option>'+buddyOptions+'<option value="__new__">+ New Buddy</option></select></div>' +
        '<div class="nm-row" id="status-newbuddy-row" style="display:none;"><label>New:</label><input type="text" id="status-buddy-new" placeholder="Name"></div>' +
        '<div class="nm-send-row" style="gap:6px;margin-top:10px;">' +
          '<button class="btn" id="status-clear">Clear Status</button>' +
          '<button class="btn" id="status-save">Set Status</button>' +
        '</div>' +
      '</div>';

    createWindow({
      title: 'Set Status',
      extraClass: 'status-win',
      bodyHtml: body,
      type: 'setstatus',
      onMount: function(el, id){
        var labelInput = el.querySelector('#status-label');
        var moodText = el.querySelector('#mood-text');
        var moodColorInput = el.querySelector('#mood-color');
        var moodIndicator = el.querySelector('#mood-indicator');
        var moodPreset = el.querySelector('#mood-preset');
        var buddySelect = el.querySelector('#status-buddy-select');
        var newRow = el.querySelector('#status-newbuddy-row');
        var newInput = el.querySelector('#status-buddy-new');

        function updateIndicator(mood, color){
          var c = color || (mood ? moodColor(mood) : '#ddd');
          moodIndicator.style.background = c;
        }

        // pre-fill current mood
        if(state.status && state.status.mood){
          moodText.value = state.status.mood;
          var savedColor = (state.customMoodColors && state.customMoodColors[state.status.mood]) || MOOD_COLORS[state.status.mood] || '#5a8fd6';
          moodColorInput.value = savedColor;
          updateIndicator(state.status.mood, savedColor);
        }
        labelInput.focus();

        // live color preview as user types mood name or changes color
        moodText.addEventListener('input', function(){
          var m = moodText.value.trim();
          var c = (state.customMoodColors&&state.customMoodColors[m]) || MOOD_COLORS[m] || moodColorInput.value;
          moodColorInput.value = c;
          updateIndicator(m, c);
        });
        moodColorInput.addEventListener('input', function(){
          updateIndicator(moodText.value.trim(), moodColorInput.value);
        });

        // preset picker — fills the text field and sets color, no logging yet
        moodPreset.addEventListener('change', function(){
          var val = moodPreset.value;
          if(val === '__manage__'){
            moodPreset.value = '';
            openManageMoodsWindow();
            return;
          }
          if(val){
            moodText.value = val;
            var c = (state.customMoodColors&&state.customMoodColors[val]) || MOOD_COLORS[val] || '#5a8fd6';
            moodColorInput.value = c;
            updateIndicator(val, c);
            if(!labelInput.value.trim()) labelInput.value = val;
          }
          moodPreset.value = ''; // reset so same item can be re-picked
        });

        buddySelect.addEventListener('change', function(){
          newRow.style.display = (buddySelect.value === '__new__') ? 'flex' : 'none';
        });

        function applyStatus(label, closeAfter){
          var currentMood = moodText.value.trim();
          var currentColor = moodColorInput.value;
          var previousMood = (state.status && state.status.mood) || '';
          // save custom mood color if it's a new mood or color changed
          if(currentMood){
            if(!state.customMoods.includes(currentMood) && !MOOD_COLORS[currentMood]){
              state.customMoods.push(currentMood);
            }
            state.customMoodColors[currentMood] = currentColor;
          }
          state.status = { label: label, html: '', ts: Date.now(), mood: currentMood };
          var newMoodLogId = null;
          // only add a Mood Log entry when the mood actually changed from what it was before —
          // re-saving a status with the same mood (e.g. just editing the label) shouldn't log again
          if(currentMood && currentMood !== previousMood){
            newMoodLogId = uid();
            state.moodLog.push({ id: newMoodLogId, mood: currentMood, ts: Date.now(), author: state.account.screenName });
          }
          if(label || currentMood){
            state.statusLog.push({ id: uid(), label: label, html: '', ts: Date.now(), author: state.account.screenName, mood: currentMood, moodLogId: newMoodLogId });
          }
          var taggedBuddy = null;
          if(buddySelect.value === '__new__'){
            var newName = newInput.value.trim();
            if(newName) taggedBuddy = ensureBuddy(newName);
          } else if(buddySelect.value){
            taggedBuddy = state.buddies.find(function(b){ return b.id === buddySelect.value; });
          }
          if(taggedBuddy && label){
            state.entries[taggedBuddy.id] = state.entries[taggedBuddy.id] || [];
            state.entries[taggedBuddy.id].push({ id: uid(), html: label, ts: Date.now(), kind: 'entry', statusLabel: label, author: state.account.screenName });
            renderLog(taggedBuddy.id);
            renderStats(taggedBuddy.id);
          }
          saveState();
          refreshMyStatus();
          renderBuddyList();
          if(closeAfter) closeWindow(id);
        }

        el.querySelector('#status-save').addEventListener('click', function(){ applyStatus(labelInput.value.trim(), true); });
        labelInput.addEventListener('keydown', function(e){ if(e.key === 'Enter') applyStatus(labelInput.value.trim(), true); });
        el.querySelector('#status-clear').addEventListener('click', function(){
          // clearing is not "setting a mood" — wipe the status directly without touching Mood Log/Status Log
          state.status = { label: '', html: '', ts: Date.now(), mood: '' };
          saveState();
          refreshMyStatus();
          renderBuddyList();
          labelInput.value = ''; moodText.value = ''; moodColorInput.value = '#5a8fd6';
          updateIndicator('', '#ddd'); moodPreset.value = '';
          buddySelect.value = ''; newRow.style.display = 'none';
          labelInput.focus();
        });
      }
    });
  }

  function renderStatusLogBody(){
    var log = state.statusLog.slice().reverse();
    if(!log.length) return '<div class="bl-empty">No status changes yet.</div>';
    return log.map(function(entry){
      var name = escapeHtml(entry.author || (state.account && state.account.screenName) || '');
      var moodDot = entry.mood ? '<span class="mood-dot" style="background:'+moodColor(entry.mood)+';margin-right:4px;vertical-align:middle;"></span>' : '';
      var moodLine = entry.mood ? '<div class="slr-text">' + moodDot + name + ' is <b>' + escapeHtml(entry.mood) + '</b></div>' : '';
      var statusText = entry.label ? '<div class="sl-status-label">' + escapeHtml(entry.label) + '</div>' : '';
      var richBody = (entry.html && entry.html !== entry.label) ? '<div class="sl-body">' + entry.html + '</div>' : '';
      var entryId = entry.id || '';
      return '<div class="status-log-row" data-slid="'+escapeHtml(entryId)+'">' +
        '<div class="slr-ts">' + fmtDayDivider(entry.ts) + ' &middot; ' + fmtTime(entry.ts) +
          (entryId ? '<span class="sl-actions"><span class="sl-edit">✎</span><span class="sl-del">✕</span></span>' : '') +
        '</div>' +
        moodLine +
        statusText +
        richBody +
      '</div>';
    }).join('');
  }

  function renderMoodLogBody(){
    var log = state.moodLog || [];
    if(!log.length) return '<div class="bl-empty">No moods logged yet. Pick one from Set Status to start tracking.</div>';

    // -- frequency counts --
    var counts = {};
    log.forEach(function(e){ counts[e.mood] = (counts[e.mood] || 0) + 1; });
    var sortedMoods = Object.keys(counts).sort(function(a,b){ return counts[b]-counts[a]; });
    var total = log.length;
    var topMood = sortedMoods[0];

    // -- donut chart via SVG --
    var cx = 54, cy = 54, r = 40, strokeW = 18;
    var circumference = 2 * Math.PI * r;
    var offset = 0;
    var donutSegments = sortedMoods.map(function(m){
      var pct = counts[m] / total;
      var dash = pct * circumference;
      var seg = '<circle cx="'+cx+'" cy="'+cy+'" r="'+r+'" fill="none" stroke="'+moodColor(m)+'" stroke-width="'+strokeW+'" stroke-dasharray="'+dash+' '+(circumference-dash)+'" stroke-dashoffset="'+(-offset)+'" transform="rotate(-90 '+cx+' '+cy+')" style="transition:stroke-dasharray 0.6s;"><title>'+escapeHtml(m)+': '+Math.round(pct*100)+'%</title></circle>';
      offset += dash;
      return seg;
    }).join('');
    var donutSvg = '<svg width="108" height="108" viewBox="0 0 108 108">'+donutSegments+
      '<text x="54" y="50" text-anchor="middle" font-size="11" fill="#555">Top</text>'+
      '<text x="54" y="63" text-anchor="middle" font-size="12" font-weight="bold" fill="'+moodColor(topMood)+'">'+escapeHtml(topMood)+'</text>'+
    '</svg>';

    // -- bar chart --
    var maxCount = counts[sortedMoods[0]];
    var barsHtml = sortedMoods.map(function(m){
      var pct = Math.round((counts[m]/maxCount)*100);
      var emoji = {Happy:'😊',Sad:'😢',Tired:'😴',Excited:'🤩',Anxious:'😬',Angry:'😤',Calm:'😌',Stressed:'😰'}[m] || '●';
      return '<div class="mood-bar-row">' +
        '<span class="mood-bar-label" title="'+escapeHtml(m)+'">'+emoji+' '+escapeHtml(m)+'</span>' +
        '<span class="mood-bar-track"><span class="mood-bar-fill" style="width:'+pct+'%;background:'+moodColor(m)+';border-radius:4px;"></span></span>' +
        '<span class="mood-bar-count">'+counts[m]+'</span>' +
      '</div>';
    }).join('');

    // -- current streak --
    var streak = 0, streakMood = '', lastDate = '';
    log.slice().reverse().forEach(function(e){
      var d = fmtDayDivider(e.ts);
      if(!lastDate){ lastDate = d; streakMood = e.mood; streak = 1; }
      else if(e.mood === streakMood){ streak++; }
      else { return; }
    });
    var streakHtml = '<div class="mood-streak">🔥 Current streak: <b>'+streak+'</b> entries of <b style="color:'+moodColor(streakMood)+'">'+escapeHtml(streakMood)+'</b></div>';

    // -- recent 30 dots timeline (newest right) --
    var recent30 = log.slice(-30);
    var dotsHtml = recent30.map(function(e){
      return '<span class="mood-dot mood-dot-lg" data-mood-id="'+escapeHtml(e.id)+'" style="background:'+moodColor(e.mood)+';cursor:pointer;" title="'+escapeHtml(e.mood)+' · '+fmtDayDivider(e.ts)+' · tap to delete"></span>';
    }).join('');

    return '<div style="padding:10px;">' +
        '<div class="mood-section-title">Your Most Common Mood</div>' +
        '<div style="display:flex;align-items:center;gap:12px;margin-bottom:4px;">' +
          donutSvg +
          '<div class="mood-bars" style="flex:1;">' + barsHtml + '</div>' +
        '</div>' +
        streakHtml +
        '<div class="mood-section-title" style="margin-top:10px;">Recent Journey (last 30)</div>' +
        '<div class="mood-timeline" style="gap:4px;">' + dotsHtml + '</div>' +
        '<div style="font-size:10px;color:#aaa;margin-top:4px;">← older &nbsp; newer →</div>' +
      '</div>';
  }

  // ================= LOGS WINDOW (Status Log + Mood Log combined, tabbed) =================
  function openLogsWindow(initialTab){
    var body =
      '<div class="win-body" id="logs-body-wrap" style="padding:0;">' +
        '<div class="logs-tabs" style="display:flex;gap:4px;padding:6px 8px;border-bottom:1px solid #ccc;">' +
          '<button class="btn logs-tab-btn" data-tab="status" style="flex:1;">Status Log</button>' +
          '<button class="btn logs-tab-btn" data-tab="mood" style="flex:1;">Mood Log</button>' +
        '</div>' +
        '<div id="logs-content"></div>' +
      '</div>';
    createWindow({
      title: 'Log',
      extraClass: 'help-win',
      bodyHtml: body,
      type: 'logs',
      onMount: function(el, id){
        var contentEl = el.querySelector('#logs-content');
        var tabBtns = el.querySelectorAll('.logs-tab-btn');
        function wireStatusActions(){
          contentEl.querySelectorAll('.sl-del').forEach(function(btn){
            btn.onclick = function(){
              var row = btn.closest('.status-log-row');
              var slid = row && row.getAttribute('data-slid');
              if(!slid) return;
              appConfirm('Delete this status entry?', function(ok){
                if(!ok) return;
                var entry = state.statusLog.find(function(e){ return e.id === slid; });
                if(entry && entry.moodLogId){
                  state.moodLog = state.moodLog.filter(function(m){ return m.id !== entry.moodLogId; });
                }
                state.statusLog = state.statusLog.filter(function(e){ return e.id !== slid; });
                saveState();
                contentEl.innerHTML = renderStatusLogBody();
                wireStatusActions();
              });
            };
          });
          contentEl.querySelectorAll('.sl-edit').forEach(function(btn){
            btn.onclick = function(){
              var row = btn.closest('.status-log-row');
              var slid = row && row.getAttribute('data-slid');
              var entry = state.statusLog.find(function(e){ return e.id === slid; });
              if(!entry) return;
              openEditStatusEntryWindow(entry, function(){
                contentEl.innerHTML = renderStatusLogBody();
                wireStatusActions();
              });
            };
          });
        }
        function wireMoodActions(){
          contentEl.querySelectorAll('.mood-dot[data-mood-id]').forEach(function(dot){
            dot.onclick = function(){
              var mid = dot.getAttribute('data-mood-id');
              if(!mid) return;
              appConfirm('Delete this mood entry?', function(ok){
                if(!ok) return;
                state.moodLog = (state.moodLog || []).filter(function(m){ return m.id !== mid; });
                saveState();
                contentEl.innerHTML = renderMoodLogBody();
                wireMoodActions();
              });
            };
          });
        }
        function showTab(tab){
          tabBtns.forEach(function(b){
            var active = b.getAttribute('data-tab') === tab;
            b.style.background = active ? '#316ac5' : '';
            b.style.color = active ? '#fff' : '';
          });
          if(tab === 'mood'){
            contentEl.innerHTML = renderMoodLogBody();
            wireMoodActions();
          } else {
            contentEl.innerHTML = renderStatusLogBody();
            wireStatusActions();
          }
        }
        tabBtns.forEach(function(b){
          b.addEventListener('click', function(){ showTab(b.getAttribute('data-tab')); });
        });
        showTab(initialTab || 'status');
      }
    });
  }

      '<div class="win-body nm-body">' +

  function openManageMoodsWindow(){
    function buildBody(){
      var allMoods = Object.keys(MOOD_COLORS).concat(state.customMoods || []);
      var rows = allMoods.map(function(m){

        var color = moodColor(m);
        return '<div class="mood-manage-row" data-mood="'+escapeHtml(m)+'">' +
          '<input type="color" class="mm-color" value="'+color+'" title="Color for '+escapeHtml(m)+'">' +
          '<span class="mm-name">'+escapeHtml(m)+'</span>' +
          (!isBuiltin ? '<button class="mm-del" title="Delete">&times;</button>' : '<span style="width:20px;"></span>') +
        '</div>';
      }).join('');
      return '<div class="win-body nm-body" style="overflow-y:auto;">' + rows +

        '</div>';

      title: 'Manage Moods',
      extraClass: 'addbuddy-win',
      bodyHtml: buildBody(),
      type: 'managemoods',
      onMount: function(el, id){
        el.querySelectorAll('.mm-color').forEach(function(inp){
          inp.addEventListener('input', function(){
            var mood = inp.closest('.mood-manage-row').getAttribute('data-mood');
            state.customMoodColors[mood] = inp.value;
            saveState();
          });
        });
        el.querySelectorAll('.mm-del').forEach(function(btn){
          btn.addEventListener('click', function(){
            var mood = btn.closest('.mood-manage-row').getAttribute('data-mood');
            state.customMoods = state.customMoods.filter(function(m){ return m !== mood; });
            delete state.customMoodColors[mood];
            saveState();
            btn.closest('.mood-manage-row').remove();
          });
        });
      }
    });
  }

  function openHelpWindow(){

      '<div class="win-body" style="font-size:12px; line-height:1.6; padding:10px;">' +

  // More permissive than entry sanitizing (this is the user's own creative page),
  // but still strips <script>, event handlers, and javascript: URLs so a synced
  // or shared profile can't run malicious code.
  function sanitizeProfileHTML(rawHtml){
    var container = document.createElement('div');
    container.innerHTML = rawHtml;
    var blockedTags = { SCRIPT:1, IFRAME:1, OBJECT:1, EMBED:1, LINK:1, META:1, BASE:1, FORM:1 };
    (function clean(node){
      Array.prototype.slice.call(node.childNodes).forEach(function(child){
        if(child.nodeType === 1){
          var tag = child.tagName;
          if(blockedTags[tag]){ node.removeChild(child); return; }
          Array.prototype.slice.call(child.attributes || []).forEach(function(attr){
            var name = attr.name.toLowerCase();
            var val = (attr.value || '');
            if(name.indexOf('on') === 0){ child.removeAttribute(attr.name); return; }
            if((name === 'href' || name === 'src' || name === 'style') && /javascript:/i.test(val)){
              child.removeAttribute(attr.name); return;
            }
          });
          clean(child);
        }
      });
    })(container);
    return container.innerHTML;
  }

            var file = input.files && input.files[0];

              var reader = new FileReader();
              reader.onload = function(e){
                var im = new Image();
                im.onload = function(){
                  var maxDim = 300;
                  var w = im.width, h = im.height;
                  if(w > maxDim || h > maxDim){
                    if(w >= h){ h = Math.round(h*maxDim/w); w = maxDim; }
                    else { w = Math.round(w*maxDim/h); h = maxDim; }
                  }
                  var canvas = document.createElement('canvas');
                  canvas.width = w; canvas.height = h;
                  canvas.getContext('2d').drawImage(im, 0, 0, w, h);
                  picData = canvas.toDataURL('image/jpeg', 0.8);
                  showPic();
                };
                im.src = e.target.result;
              };
              reader.readAsDataURL(file);
            }
            input.remove();
          });
          input.click();
        });

              openBlogPostEditor(null, function(){
                var wb = el.querySelector('.win-body');
                if(wb) wb.outerHTML = buildBlogBody();
                wireActions();
              });
            };

              var postEl = btn.closest('.blog-post');
              var postId = postEl && postEl.getAttribute('data-post-id');

              openBlogPostEditor(post, function(){
                var wb = el.querySelector('.win-body');
                if(wb) wb.outerHTML = buildBlogBody();
                wireActions();
              });
            };
          });
          el.querySelectorAll('.bp-del').forEach(function(btn){

              var postEl = btn.closest('.blog-post');
              var postId = postEl && postEl.getAttribute('data-post-id');

                var wb = el.querySelector('.win-body');
                if(wb) wb.outerHTML = buildBlogBody();
                wireActions();
              });
            };
          });
        }
        wireActions();
      }
    });
  }

  // ================= CALENDAR =================
  var calendarViewDate = new Date();
  var MONTH_NAMES = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  var WEEKDAYS = ['S','M','T','W','T','F','S'];

  function toggleCalendarPopup(){
    var popup = document.getElementById('calendar-popup');
    if(popup.classList.contains('open')){
      popup.classList.remove('open');
    } else {
      calendarViewDate = new Date();
      renderCalendarPopup();
      popup.classList.add('open');
    }
  }

  function renderCalendarPopup(){
    var year = calendarViewDate.getFullYear();
    var month = calendarViewDate.getMonth();
    var firstDay = new Date(year, month, 1).getDay();
    var daysInMonth = new Date(year, month + 1, 0).getDate();

    // which days this month have at least one entry, across every buddy
    var activeDays = {};
    Object.keys(state.entries).forEach(function(bid){
      (state.entries[bid] || []).forEach(function(e){
        var d = new Date(e.ts);
        if(d.getFullYear() === year && d.getMonth() === month){
          activeDays[d.getDate()] = true;
        }
      });
    });

    var today = new Date();
    var isCurrentMonth = today.getFullYear() === year && today.getMonth() === month;

    var cells = '';
    for(var i = 0; i < firstDay; i++){ cells += '<div class="cal-cell cal-empty"></div>'; }
    for(var day = 1; day <= daysInMonth; day++){
      var isToday = isCurrentMonth && day === today.getDate();
      cells += '<div class="cal-cell' + (isToday ? ' cal-today' : '') + '" data-day="' + day + '">' +
        day + (activeDays[day] ? '<span class="cal-dot"></span>' : '') +
      '</div>';
    }

    var RAINBOW = ['#e74c3c','#e67e22','#f1c40f','#2ecc71','#3498db','#5b2c9d','#9b59b6'];
    var themePreset = state.theme && state.theme.preset;
    var isSilver = themePreset === 'silver';
    var isRainbowTheme = themePreset === 'rainbow';
    var isCustomTheme = themePreset === 'custom' || (themePreset && themePreset.indexOf('custom-') === 0);
    var customDayColors = (isCustomTheme && state.theme.calDaysColors && state.theme.calDaysColors.length === 7) ? state.theme.calDaysColors : null;
    document.getElementById('cal-title').textContent = MONTH_NAMES[month] + ' ' + year;
    document.getElementById('cal-grid').innerHTML =
      WEEKDAYS.map(function(w, i){
        var style = '';
        if(customDayColors) style = ' style="background:' + customDayColors[i] + ';"';
        else if(isSilver) style = ' style="background:' + RAINBOW[i] + ';"';
        else if(isRainbowTheme) style = ' style="background:#888;"';
        return '<div class="cal-wd"' + style + '>' + w + '</div>';
      }).join('') + cells;

    document.querySelectorAll('#calendar-popup .cal-cell[data-day]').forEach(function(cell){
      cell.addEventListener('click', function(e){
        e.stopPropagation();
        document.getElementById('calendar-popup').classList.remove('open');
        openCalendarDayWindow(year, month, parseInt(cell.getAttribute('data-day'), 10));
      });
    });
  }

  document.getElementById('cal-prev').addEventListener('click', function(e){
    e.stopPropagation();
    calendarViewDate.setMonth(calendarViewDate.getMonth() - 1);
    renderCalendarPopup();
  });
  document.getElementById('cal-next').addEventListener('click', function(e){
    e.stopPropagation();
    calendarViewDate.setMonth(calendarViewDate.getMonth() + 1);
    renderCalendarPopup();
  });

  function openCalendarDayWindow(year, month, day){
    var results = [];
    state.buddies.forEach(function(b){
      var dayEntries = (state.entries[b.id] || []).filter(function(e){
        var d = new Date(e.ts);
        return d.getFullYear() === year && d.getMonth() === month && d.getDate() === day;
      });
      if(dayEntries.length) results.push({ buddy: b, entries: dayEntries });
    });

    var dateLabel = new Date(year, month, day).toLocaleDateString(undefined, { weekday: 'long', month: 'long', day: 'numeric', year: 'numeric' });
    var bodyHtml;
    if(!results.length){
      bodyHtml = '<div class="bl-empty">No entries on this day.</div>';
    } else {
      bodyHtml = results.map(function(r){
        var rows = r.entries.map(function(e){
          var preview = stripHtmlTags(e.html !== undefined ? e.html : (e.text || '')).trim();
          if(preview.length > 70) preview = preview.slice(0, 70) + '\u2026';
          return '<div class="status-log-row cal-day-entry" data-buddy-id="' + escapeHtml(r.buddy.id) + '">' +
            '<div class="slr-ts">' + fmtTime(e.ts) + '</div>' +
            '<div class="sl-status-label">' + (escapeHtml(preview) || '<i>(empty)</i>') + '</div>' +
          '</div>';
        }).join('');
        return '<div style="font-weight:bold;padding:6px 8px 2px;border-bottom:1px solid #ccc;">' + escapeHtml(r.buddy.name) + ' (' + r.entries.length + ')</div>' + rows;
      }).join('');
    }

    createWindow({
      title: dateLabel,
      extraClass: 'help-win',
      bodyHtml: '<div class="win-body">' + bodyHtml + '</div>',
      type: 'calday',
      onMount: function(el, id){
        el.querySelectorAll('.cal-day-entry').forEach(function(row){
          row.style.cursor = 'pointer';
          row.addEventListener('click', function(){
            openIMWindow(row.getAttribute('data-buddy-id'));
          });
        });
      }
    });
  }

  // ================= BOOT =================
  loadState().then(function(){
    try {
      normalizeState();
      applyBackground();
      applyTheme();
      (state.customFonts || []).forEach(function(f){ registerCustomFont(f); });
      tickClock();
      if(state.account && state.autoLogin){
        enterDesktop();
      } else {
        showSignon();
      }
    } catch(bootErr){
      // show the real error on screen so it's visible on iPhone without dev tools
      var errDiv = document.createElement('div');
      errDiv.style.cssText = 'position:fixed;top:0;left:0;right:0;background:#c0392b;color:#fff;padding:12px;font-size:13px;z-index:999999;font-family:monospace;white-space:pre-wrap;';
      errDiv.textContent = 'Boot error: ' + (bootErr && bootErr.message ? bootErr.message : String(bootErr));
      document.body.appendChild(errDiv);
    }
  }).catch(function(loadErr){
    var errDiv = document.createElement('div');
    errDiv.style.cssText = 'position:fixed;top:0;left:0;right:0;background:#c0392b;color:#fff;padding:12px;font-size:13px;z-index:999999;font-family:monospace;white-space:pre-wrap;';
    errDiv.textContent = 'Load error: ' + (loadErr && loadErr.message ? loadErr.message : String(loadErr));
    document.body.appendChild(errDiv);
  });

})();
} catch(e){
  var _ed = document.createElement('div');
  _ed.style.cssText = 'position:fixed;top:0;left:0;right:0;background:#c0392b;color:#fff;padding:10px;font-size:12px;z-index:999999;font-family:monospace;white-space:pre-wrap;word-break:break-all;';
  _ed.textContent = 'Top-level error: ' + (e && e.message ? e.message : String(e)) + (e && e.stack ? '\n' + e.stack.split('\n').slice(0,4).join('\n') : '');
  document.body.appendChild(_ed);
}
</script>
</body>
</html>
