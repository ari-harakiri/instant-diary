<!doctype html>
<html>
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
<title>Notebook</title>
<link rel="manifest" href="notebook-manifest.json" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Notebook" />
<link rel="apple-touch-icon" href="notepad1.png" />
<meta name="theme-color" content="#0054e3" />
<style>
  @font-face {
    font-family: 'DiaryMinecraft';
    src: url(assets/fonts/diary-minecraft.ttf) format('truetype');
    font-display: swap;
  }
  @font-face {
    font-family: 'DiaryComicSans';
    src: url(assets/fonts/diary-comic-sans.ttf) format('truetype');
    font-display: swap;
  }
  @font-face {
    font-family: 'DiaryEmoji';
    src: url(assets/fonts/diary-emoji.ttf) format('truetype');
    font-display: swap;
  }
  @font-face {
    font-family: 'DiaryOldEnglish';
    src: url(assets/fonts/diary-old-english.otf) format('opentype');
    font-display: swap;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    margin: 0; padding: 0; height: 100%; overflow: hidden;
    background: url('app-background.jpg') center / cover no-repeat;
    font-family: Tahoma, Arial, sans-serif;
  }
  #stage {
    position: fixed; inset: 0;
    display: flex; flex-direction: column;
    padding: env(safe-area-inset-top, 0px) 0 env(safe-area-inset-bottom, 0px);
  }
  #app-header {
    flex: 0 0 auto;
    display: flex; align-items: center; justify-content: space-between;
    padding: 10px 16px;
    color: #fff;
    text-shadow: 0 1px 2px rgba(0,0,0,.35);
  }
  #app-title { font-size: 15px; font-weight: 700; letter-spacing: .3px; }
  #notebook-stage {
    flex: 1;
    display: flex; align-items: center; justify-content: center;
    padding: 8px 16px;
    min-height: 0;
  }
  #app-footer {
    flex: 0 0 auto;
    padding: 10px 12px calc(10px + env(safe-area-inset-bottom, 0px));
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .dock-row {
    display: flex; align-items: center; gap: 8px; overflow-x: auto;
    -webkit-overflow-scrolling: touch;
  }
  .dock-row::-webkit-scrollbar { display: none; }
  .dock-divider {
    flex: 0 0 auto;
    width: 1px; height: 20px;
    background: rgba(255,255,255,.5);
    margin: 0 2px;
  }
  .font-pill {
    flex: 0 0 auto;
    border: 1px solid rgba(255,255,255,.7);
    background: rgba(255,255,255,.25);
    color: #1a3350;
    border-radius: 14px;
    padding: 7px 14px;
    font-size: 13px;
    cursor: pointer;
    white-space: nowrap;
  }
  .font-pill.active {
    background: #fff;
    border-color: #fff;
    font-weight: 700;
  }
  .bg-pill, .size-pill {
    flex: 0 0 auto;
    border: 1px solid rgba(255,255,255,.7);
    background: rgba(255,255,255,.25);
    color: #1a3350;
    border-radius: 8px;
    padding: 6px 12px;
    font-size: 12px;
    cursor: pointer;
    white-space: nowrap;
  }
  .bg-pill.active, .size-pill.active {
    background: #fff; border-color: #fff; font-weight: 700;
  }
  #color-picker {
    flex: 0 0 auto;
    -webkit-appearance: none;
    appearance: none;
    width: 34px; height: 34px;
    border: 2px solid #fff;
    border-radius: 50%;
    padding: 0;
    background: conic-gradient(red, yellow, lime, cyan, blue, magenta, red);
    cursor: pointer;
  }
  #color-picker::-webkit-color-swatch-wrapper { padding: 0; border-radius: 50%; }
  #color-picker::-webkit-color-swatch { border: none; border-radius: 50%; }
  #recent-colors { display: flex; align-items: center; gap: 6px; }
  .recent-swatch {
    flex: 0 0 auto;
    width: 24px; height: 24px;
    border-radius: 50%;
    border: 2px solid rgba(255,255,255,.8);
    cursor: pointer;
    padding: 0;
  }
  #notebook {
    position: relative;
    width: 100%;
    max-width: 428px;
    aspect-ratio: 428 / 512;
    background: url('notepad1.png') center / cover no-repeat;
  }
  #paper-hue-overlay {
    position: absolute;
    inset: 10% 3% 3% 3%;
    mix-blend-mode: hue;
    pointer-events: none;
    z-index: 1;
    border-radius: 6px;
  }
  #hue-row { gap: 10px; }
  #hue-slider {
    flex: 1;
    -webkit-appearance: none;
    appearance: none;
    height: 22px;
    border-radius: 11px;
    background: linear-gradient(to right,
      hsl(0,70%,55%), hsl(60,70%,55%), hsl(120,70%,55%),
      hsl(180,70%,55%), hsl(240,70%,55%), hsl(300,70%,55%), hsl(360,70%,55%));
  }
  #hue-slider::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 24px; height: 24px;
    border-radius: 50%;
    background: #fff;
    border: 2px solid rgba(0,0,0,.3);
    box-shadow: 0 1px 3px rgba(0,0,0,.4);
  }
  #save-btn {
    position: absolute;
    top: 38px; right: 19px;
    z-index: 5;
    width: 34px; height: 30px;
    border: 1px solid rgba(0,0,0,.35);
    border-radius: 4px;
    background: rgba(255,255,255,.6);
    font-size: 17px;
    line-height: 1;
    color: #333;
    cursor: pointer;
    z-index: 5;
  }
  #save-btn:active { background: rgba(255,255,255,.85); }
  #edit-area {
    position: absolute;
    z-index: 5;
    inset: 12% 6% 13.7% 10%;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  #title-input {
    border: 2px solid red !important;
    box-shadow: none !important;
    background: transparent !important;
    outline: none;
    font-size: 17px;
    font-weight: 700;
    font-family: Tahoma, Arial, sans-serif;
    padding: 2px 4px;
    color: #262626;
    transform: translate(15px, 25px);
  }
  #title-input::placeholder { color: #7a7a7a; }
  #body-input {
    border: 2px solid red !important;
    box-shadow: none !important;
    background: transparent !important;
    outline: none;
    flex: 1;
    resize: none;
    font-size: 16px;
    font-family: "DiaryComicSans", "Comic Sans MS", "Comic Sans", cursive;
    color: #262626;
    padding: 2px 4px;
    line-height: 1.4;
    transform: translate(15px, 16px);
  }
  #footer {
    position: absolute;
    z-index: 5;
    left: 7%; right: 11%; bottom: 5%;
    display: flex;
    align-items: center;
    justify-content: space-between;
    font-size: 13px;
    color: #3f3f3f;
  }
  #page-label { font-size: 12px; display: inline-block; transform: translate(-10px, 10px); }
  #nav { display: flex; gap: 14px; }
  #nav button {
    border: none; background: transparent; cursor: pointer;
    font-size: 22px; color: #3f3f3f; padding: 4px 6px; line-height: 1;
    transform: translate(5px, 8px);
  }
  #trash-btn {
    border: none; background: transparent; cursor: pointer;
    font-size: 15px; color: #3b3b3b; padding: 4px;
    transform: translate(26px, 9px);
  }
  #sync-dot {
    position: absolute;
    top: 38px; left: 16px;
    width: 8px; height: 8px;
    border-radius: 50%;
    background: #999;
    z-index: 5;
    transition: background .25s ease;
  }
  #sync-dot.online { background: #3ba33b; }
  #sync-dot.saving { background: #e0a000; }
</style>
</head>
<body>
<div id="stage">
  <div id="app-header">
    <span id="app-title">Notebook</span>
  </div>
  <div id="notebook-stage">
    <div id="notebook">
      <div id="paper-hue-overlay"></div>
      <button id="save-btn" title="Save as image">💾</button>
      <div id="edit-area">
        <input id="title-input" type="text" placeholder="Title" maxlength="120" autocomplete="off" />
        <textarea id="body-input" placeholder=""></textarea>
      </div>
      <div id="footer">
        <span id="page-label"></span>
        <div id="nav">
          <button id="prev-btn" title="Previous page">‹</button>
          <button id="next-btn" title="Next page">›</button>
        </div>
        <button id="trash-btn" title="Delete this page">🗑</button>
      </div>
      <div id="sync-dot" title="Sync status"></div>
    </div>
  </div>
  <div id="app-footer">
    <div id="font-row" class="dock-row">
      <button class="font-pill" data-font="inherit">Default</button>
      <button class="font-pill active" data-font="DiaryComicSans">Comic Sans</button>
      <button class="font-pill" data-font="DiaryOldEnglish">Old English</button>
      <button class="font-pill" data-font="DiaryMinecraft">Minecraft</button>
      <button class="font-pill" data-font="DiaryEmoji">Art</button>
    </div>
    <div id="paper-size-row" class="dock-row">
      <button class="bg-pill active" data-bg="notepad1.png">Plain</button>
      <span class="dock-divider"></span>
      <button class="size-pill" data-size="13">Small</button>
      <button class="size-pill active" data-size="16">Medium</button>
      <button class="size-pill" data-size="20">Large</button>
      <button class="size-pill" data-size="25">X-Large</button>
    </div>
    <div id="hue-row" class="dock-row">
      <span style="color:#fff;font-size:12px;text-shadow:0 1px 2px rgba(0,0,0,.4);">Paper hue</span>
      <input type="range" id="hue-slider" min="0" max="360" value="0" />
    </div>
    <div id="color-dock" class="dock-row">
      <input type="color" id="color-picker" value="#262626" title="Pick a text color" />
      <div id="recent-colors"></div>
    </div>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-firestore-compat.js"></script>
<script>
(function(){
  "use strict";

  var LOCAL_KEY = 'notebook-app-standalone-v1';
  var firebaseConfig = {
    apiKey: "AIzaSyD2zxq7c33ff6CnLlNrVolPGtaqHRJhaa0",
    authDomain: "instantdiary-14474.firebaseapp.com",
    projectId: "instantdiary-14474",
    storageBucket: "instantdiary-14474.firebasestorage.app",
    messagingSenderId: "20644051614",
    appId: "1:20644051614:web:50d2be0d77cbec02a7998f"
  };

  function freshPages(){
    return [{ id: 'page-1', title: '', text: '', createdAt: Date.now() }];
  }

  var state = { pages: freshPages(), currentPageIndex: 0, font: 'DiaryComicSans', paper: 'notepad1.png', fontSize: 16, fontColor: '#262626', recentColors: ['#262626', '#0054e3', '#1a7d1a', '#c62828', '#8e24aa'], paperHue: 0 };
  var cloudUser = null;
  var db = null;
  var saveTimer = null;

  var titleInput = document.getElementById('title-input');
  var bodyInput = document.getElementById('body-input');
  var pageLabel = document.getElementById('page-label');
  var prevBtn = document.getElementById('prev-btn');
  var nextBtn = document.getElementById('next-btn');
  var trashBtn = document.getElementById('trash-btn');
  var saveBtn = document.getElementById('save-btn');
  var syncDot = document.getElementById('sync-dot');
  var notebookEl = document.getElementById('notebook');
  var fontRow = document.getElementById('font-row');
  var sizeRow = document.getElementById('paper-size-row');
  var bgRow = document.getElementById('paper-size-row');
  var colorPicker = document.getElementById('color-picker');
  var hueSlider = document.getElementById('hue-slider');
  var paperHueOverlay = document.getElementById('paper-hue-overlay');
  var hueSaveTimer = null;
  var recentColorsEl = document.getElementById('recent-colors');

  function getCurrentPage(){
    if(!state.pages.length) state.pages = freshPages();
    if(state.currentPageIndex >= state.pages.length) state.currentPageIndex = state.pages.length - 1;
    if(state.currentPageIndex < 0) state.currentPageIndex = 0;
    return state.pages[state.currentPageIndex];
  }

  function applyPreferences(){
    var fontValue = state.font || 'DiaryComicSans';
    bodyInput.style.fontFamily = fontValue === 'inherit'
      ? ''
      : '"' + fontValue + '", "Comic Sans MS", "Comic Sans", cursive';
    Array.prototype.forEach.call(fontRow.querySelectorAll('.font-pill'), function(btn){
      btn.classList.toggle('active', btn.getAttribute('data-font') === fontValue);
    });

    var paperValue = state.paper || 'notepad1.png';
    notebookEl.style.backgroundImage = "url('" + paperValue + "')";
    Array.prototype.forEach.call(bgRow.querySelectorAll('.bg-pill'), function(btn){
      btn.classList.toggle('active', btn.getAttribute('data-bg') === paperValue);
    });

    var sizeValue = state.fontSize || 16;
    bodyInput.style.fontSize = sizeValue + 'px';
    Array.prototype.forEach.call(sizeRow.querySelectorAll('.size-pill'), function(btn){
      btn.classList.toggle('active', Number(btn.getAttribute('data-size')) === sizeValue);
    });

    var colorValue = state.fontColor || '#262626';
    bodyInput.style.color = colorValue;
    colorPicker.value = colorValue;
    renderRecentColors();

    var hueValue = Number.isFinite(state.paperHue) ? state.paperHue : 0;
    hueSlider.value = hueValue;
    paperHueOverlay.style.background = hueValue === 0 ? 'transparent' : 'hsl(' + hueValue + ', 65%, 55%)';
  }

  function renderRecentColors(){
    recentColorsEl.innerHTML = '';
    (state.recentColors || []).forEach(function(c){
      var swatch = document.createElement('button');
      swatch.className = 'recent-swatch';
      swatch.style.background = c;
      swatch.title = c;
      swatch.addEventListener('click', function(){
        setColor(c);
      });
      recentColorsEl.appendChild(swatch);
    });
  }

  function setColor(c){
    state.fontColor = c;
    if(!state.recentColors) state.recentColors = [];
    state.recentColors = [c].concat(state.recentColors.filter(function(x){ return x !== c; })).slice(0, 6);
    applyPreferences();
    persistLocal();
    pushToCloudIfSignedIn();
  }

  function renderCurrentPage(){
    var page = getCurrentPage();
    titleInput.value = page.title || '';
    bodyInput.value = page.text || '';
    pageLabel.textContent = 'pg ' + (state.currentPageIndex + 1);
    if(prevBtn) prevBtn.disabled = state.currentPageIndex === 0;
    if(nextBtn) nextBtn.disabled = false;
  }

  function captureCurrentPage(){
    var page = getCurrentPage();
    page.title = titleInput.value;
    page.text = bodyInput.value;
  }

  function persistLocal(){
    try{
      localStorage.setItem(LOCAL_KEY, JSON.stringify(state));
    } catch(e){}
  }

  function loadLocal(){
    try{
      var raw = localStorage.getItem(LOCAL_KEY);
      if(raw){
        var parsed = JSON.parse(raw);
        if(parsed && Array.isArray(parsed.pages) && parsed.pages.length){
          state = parsed;
        }
      }
    } catch(e){}
  }

  function setSyncStatus(mode){
    syncDot.className = mode;
    syncDot.title = mode === 'online' ? 'Synced to cloud' : (mode === 'saving' ? 'Saving…' : 'Local only (not signed in)');
  }

  function pushToCloudIfSignedIn(){
    if(!db || !cloudUser) { persistLocal(); return; }
    setSyncStatus('saving');
    var metaRef = db.collection('users').doc(cloudUser.uid).collection('diary').doc('meta');
    metaRef.set({
      notebook: { pages: state.pages, currentPageIndex: state.currentPageIndex, font: state.font, paper: state.paper, fontSize: state.fontSize, fontColor: state.fontColor, recentColors: state.recentColors, paperHue: state.paperHue },
      updatedAt: Date.now()
    }, { merge: true }).then(function(){
      setSyncStatus('online');
    }).catch(function(){
      setSyncStatus('offline');
    });
    persistLocal();
  }

  function queueSave(){
    captureCurrentPage();
    persistLocal();
    if(saveTimer) clearTimeout(saveTimer);
    saveTimer = setTimeout(pushToCloudIfSignedIn, 1500);
  }

  function pullFromCloud(){
    if(!db || !cloudUser) return;
    var metaRef = db.collection('users').doc(cloudUser.uid).collection('diary').doc('meta');
    metaRef.get().then(function(snap){
      if(!snap.exists) { setSyncStatus('online'); return; }
      var data = snap.data() || {};
      var nb = data.notebook;
      if(nb && Array.isArray(nb.pages) && nb.pages.length){
        state.pages = nb.pages;
        state.currentPageIndex = Number.isFinite(nb.currentPageIndex) ? nb.currentPageIndex : 0;
        if(nb.font) state.font = nb.font;
        if(nb.paper) state.paper = nb.paper;
        if(Number.isFinite(nb.fontSize)) state.fontSize = nb.fontSize;
        if(nb.fontColor) state.fontColor = nb.fontColor;
        if(Array.isArray(nb.recentColors)) state.recentColors = nb.recentColors;
        if(Number.isFinite(nb.paperHue)) state.paperHue = nb.paperHue;
        renderCurrentPage();
        applyPreferences();
      }
      setSyncStatus('online');
    }).catch(function(){
      setSyncStatus('offline');
    });
  }

  // --- Navigation ---
  prevBtn.addEventListener('click', function(){
    captureCurrentPage();
    if(state.currentPageIndex > 0){
      state.currentPageIndex--;
      renderCurrentPage();
      persistLocal();
    }
  });
  nextBtn.addEventListener('click', function(){
    captureCurrentPage();
    if(state.currentPageIndex < state.pages.length - 1){
      state.currentPageIndex++;
    } else {
      state.pages.push({ id: 'page-' + (state.pages.length + 1) + '-' + Date.now(), title: '', text: '', createdAt: Date.now() });
      state.currentPageIndex = state.pages.length - 1;
    }
    renderCurrentPage();
    persistLocal();
  });
  trashBtn.addEventListener('click', function(){
    if(state.pages.length <= 1){
      state.pages = freshPages();
      state.currentPageIndex = 0;
    } else {
      state.pages.splice(state.currentPageIndex, 1);
      if(state.currentPageIndex >= state.pages.length) state.currentPageIndex = state.pages.length - 1;
    }
    renderCurrentPage();
    persistLocal();
    pushToCloudIfSignedIn();
  });

  Array.prototype.forEach.call(fontRow.querySelectorAll('.font-pill'), function(btn){
    btn.addEventListener('click', function(){
      state.font = btn.getAttribute('data-font');
      applyPreferences();
      persistLocal();
      pushToCloudIfSignedIn();
    });
  });

  Array.prototype.forEach.call(bgRow.querySelectorAll('.bg-pill'), function(btn){
    btn.addEventListener('click', function(){
      state.paper = btn.getAttribute('data-bg');
      applyPreferences();
      persistLocal();
      pushToCloudIfSignedIn();
    });
  });

  Array.prototype.forEach.call(sizeRow.querySelectorAll('.size-pill'), function(btn){
    btn.addEventListener('click', function(){
      state.fontSize = Number(btn.getAttribute('data-size'));
      applyPreferences();
      persistLocal();
      pushToCloudIfSignedIn();
    });
  });

  colorPicker.addEventListener('input', function(){
    setColor(colorPicker.value);
  });

  hueSlider.addEventListener('input', function(){
    state.paperHue = Number(hueSlider.value);
    var hueValue = state.paperHue;
    paperHueOverlay.style.background = hueValue === 0 ? 'transparent' : 'hsl(' + hueValue + ', 65%, 55%)';
    persistLocal();
    if(hueSaveTimer) clearTimeout(hueSaveTimer);
    hueSaveTimer = setTimeout(pushToCloudIfSignedIn, 800);
  });

  titleInput.addEventListener('input', queueSave);
  bodyInput.addEventListener('input', queueSave);
  titleInput.addEventListener('keydown', function(e){
    if(e.key === 'Enter'){
      e.preventDefault();
      bodyInput.focus();
    }
  });

  // --- Mobile keyboard avoidance ---
  var savedScrollBeforeKeyboard = null;
  function scrollAboveKeyboard(){
    if(window.visualViewport){
      window.scrollTo(0, 0);
      notebookEl.scrollIntoView({ block: 'center', behavior: 'smooth' });
    }
  }
  titleInput.addEventListener('focus', function(){ setTimeout(scrollAboveKeyboard, 60); });
  bodyInput.addEventListener('focus', function(){ setTimeout(scrollAboveKeyboard, 60); });

  // --- Save as image ---
  saveBtn.addEventListener('click', function(){
    captureCurrentPage();
    var fontReady = (document.fonts && document.fonts.load)
      ? document.fonts.load('16px DiaryComicSans').catch(function(){})
      : Promise.resolve();
    fontReady.then(function(){
    var img = new Image();
    img.onload = function(){
      var canvas = document.createElement('canvas');
      canvas.width = img.naturalWidth;
      canvas.height = img.naturalHeight;
      var ctx = canvas.getContext('2d');
      ctx.drawImage(img, 0, 0);

      var scale = img.naturalWidth / 220;
      var editLeft = 22 * scale, editTop = 26 * scale;
      var editRight = canvas.width - (13 * scale);
      var editBottom = canvas.height - (34 * scale);
      var editWidth = editRight - editLeft;

      var page = getCurrentPage();
      var title = (page.title || '').trim();
      var titleY = editTop;
      var titleFontSize = 15 * scale;
      if(title){
        ctx.fillStyle = '#262626';
        ctx.font = 'bold ' + titleFontSize + 'px Tahoma, Arial, sans-serif';
        ctx.textBaseline = 'top';
        ctx.fillText(title, editLeft, titleY, editWidth);
      }

      var bodyY = titleY + titleFontSize + (10 * scale);
      var bodyFontSize = (state.fontSize || 14) * scale;
      var lineHeight = bodyFontSize * 1.3;
      ctx.fillStyle = state.fontColor || '#262626';
      ctx.font = bodyFontSize + 'px "DiaryComicSans", "Comic Sans MS", "Comic Sans", cursive';
      ctx.textBaseline = 'top';

      var y = bodyY;
      (page.text || '').split('\n').forEach(function(rawLine){
        var words = rawLine.split(' ');
        var line = '';
        for(var i = 0; i < words.length; i++){
          var test = line ? line + ' ' + words[i] : words[i];
          if(ctx.measureText(test).width > editWidth && line){
            if(y + lineHeight <= editBottom) ctx.fillText(line, editLeft, y);
            y += lineHeight;
            line = words[i];
          } else {
            line = test;
          }
        }
        if(y + lineHeight <= editBottom) ctx.fillText(line, editLeft, y);
        y += lineHeight;
      });

      var titleForFile = title ? title.replace(/[^a-z0-9]+/gi, '-').toLowerCase().slice(0, 40) : 'page';
      var a = document.createElement('a');
      a.download = 'notebook-' + titleForFile + '-' + new Date().toISOString().slice(0, 10) + '.png';
      a.href = canvas.toDataURL('image/png');
      document.body.appendChild(a);
      a.click();
      a.remove();
    };
    img.src = 'notepad1.png';
    });
  });

  // --- Boot ---
  loadLocal();
  renderCurrentPage();
  applyPreferences();
  setSyncStatus('offline');

  try {
    if(!window.firebase.apps || !window.firebase.apps.length){
      firebase.initializeApp(firebaseConfig);
    }
    firebase.auth().setPersistence(firebase.auth.Auth.Persistence.LOCAL).catch(function(){});
    db = firebase.firestore();
    firebase.auth().onAuthStateChanged(function(user){
      if(user){
        cloudUser = user;
        pullFromCloud();
      } else {
        cloudUser = null;
        setSyncStatus('offline');
      }
    });
  } catch(e){
    setSyncStatus('offline');
  }
})();
</script>
</body>
</html>
